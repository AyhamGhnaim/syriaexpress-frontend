<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>معلومات المشتري — سوريا إكسبريس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>
<style>
:root {
  --bg:#0F0E0C;--bg2:#1a1814;--bg3:#222018;
  --gold:#C9A84C;--gold2:#e8c96a;
  --text:#f0ece4;--text2:#a09880;
  --border:#2e2b24;--border-gold:rgba(201,168,76,0.25);
  --success:#4CAF50;--danger:#e05555;
}
[data-theme="light"]{
  --bg:#F5F3EF;--bg2:#FFFFFF;--bg3:#E8E4DC;
  --text:#1A1814;--text2:#6B6358;
  --border:#D0C8BC;--border-gold:rgba(201,168,76,0.35);
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;padding-bottom:80px;}

/* HEADER */
.header{
  background:rgba(15,14,12,0.95);backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border-gold);
  padding:0 16px;height:56px;
  display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:100;
}
[data-theme="light"] .header{background:rgba(245,243,239,0.95);}
.header-logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.header-logo img{height:42px;width:42px;object-fit:contain;}
.header-logo-text{text-align:center;}
.header-logo-text .ar{font-family:'Amiri',serif;color:var(--gold);font-size:17px;line-height:1;}
.header-logo-text .en{color:var(--text2);font-size:9px;letter-spacing:2px;}
.back-btn{
  background:var(--bg3);border:1px solid var(--border);
  color:var(--text);padding:8px 14px;border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:13px;
  cursor:pointer;text-decoration:none;white-space:nowrap;
}

/* CONTAINER */
.container{padding:16px;max-width:600px;margin:0 auto;}

/* AVATAR */
.avatar-section{text-align:center;padding:28px 16px 20px;}
.avatar{
  width:80px;height:80px;border-radius:50%;
  background:var(--bg3);border:3px solid var(--gold);
  display:flex;align-items:center;justify-content:center;
  font-size:32px;margin:0 auto 12px;
  overflow:visible;position:relative;cursor:pointer;
}
.avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%;}
.avatar-overlay{
  position:absolute;inset:0;border-radius:50%;
  background:rgba(0,0,0,0.5);display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity 0.2s;font-size:20px;
}
.avatar:hover .avatar-overlay{opacity:1;}
#avatarInput{display:none;}
.avatar-delete{
  position:absolute;top:-4px;left:-4px;
  width:22px;height:22px;border-radius:50%;
  background:#f87171;color:#fff;
  border:2px solid var(--bg);
  display:none;align-items:center;justify-content:center;
  font-size:12px;cursor:pointer;z-index:10;
}
.avatar:hover .avatar-delete{display:flex;}
.user-name{font-size:20px;font-weight:700;margin-bottom:4px;}
.user-email{font-size:13px;color:var(--text2);margin-bottom:8px;}
.user-since{font-size:11px;color:var(--text2);}

/* SECTION */
.section{
  background:var(--bg2);border:1px solid var(--border);
  border-radius:12px;padding:16px;margin-bottom:16px;
}
.section-title{
  font-size:14px;font-weight:700;color:var(--gold);
  margin-bottom:14px;display:flex;align-items:center;gap:8px;
}

/* FORM */
.form-group{margin-bottom:14px;}
.form-label{font-size:12px;color:var(--text2);margin-bottom:6px;display:block;}
.form-input{
  width:100%;background:var(--bg3);border:1px solid var(--border);
  border-radius:8px;color:var(--text);font-family:'Cairo',sans-serif;
  font-size:14px;padding:10px 12px;outline:none;
  transition:border-color 0.2s;direction:rtl;
}
.form-input:focus{border-color:var(--gold);}
.form-input:disabled{opacity:0.5;cursor:not-allowed;}
.form-input.readonly{border-color:transparent;background:transparent;padding-right:0;color:var(--text);}

/* EDIT TOGGLE */
.edit-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.edit-btn{
  background:transparent;border:1px solid var(--gold);
  color:var(--gold);padding:6px 14px;border-radius:8px;
  font-family:'Cairo',sans-serif;font-size:12px;cursor:pointer;transition:all 0.2s;
}
.edit-btn:hover{background:rgba(201,168,76,0.1);}
.edit-btn.cancel{border-color:var(--border);color:var(--text2);}

/* SAVE BTN */
.save-btn{
  width:100%;background:var(--gold);color:#000;border:none;
  border-radius:10px;padding:13px;font-family:'Cairo',sans-serif;
  font-size:15px;font-weight:700;cursor:pointer;transition:background 0.2s;margin-top:4px;
}
.save-btn:hover{background:var(--gold2);}
.save-btn:disabled{opacity:0.5;cursor:not-allowed;}

/* STATS */
.stats-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.stat-card{
  background:var(--bg3);border:1px solid var(--border);
  border-radius:10px;padding:14px;text-align:center;
}
.stat-icon{font-size:22px;margin-bottom:6px;}
.stat-value{font-size:20px;font-weight:700;color:var(--gold);margin-bottom:2px;}
.stat-label{font-size:11px;color:var(--text2);}

/* PASSWORD */
.password-input-wrap{position:relative;}
.toggle-pw{
  position:absolute;left:12px;top:50%;transform:translateY(-50%);
  background:none;border:none;color:var(--text2);cursor:pointer;font-size:16px;
}

/* MESSAGES */
.success-msg{
  background:rgba(76,175,80,0.1);border:1px solid var(--success);
  border-radius:8px;padding:10px 14px;font-size:13px;color:var(--success);
  margin-bottom:12px;display:none;
}
.error-msg{
  background:rgba(224,85,85,0.1);border:1px solid var(--danger);
  border-radius:8px;padding:10px 14px;font-size:13px;color:var(--danger);
  margin-bottom:12px;display:none;
}

/* LOGOUT */
.logout-btn{
  width:100%;background:transparent;border:1px solid var(--danger);
  color:var(--danger);padding:13px;border-radius:10px;
  font-family:'Cairo',sans-serif;font-size:14px;cursor:pointer;
  transition:all 0.2s;margin-bottom:16px;
}
.logout-btn:hover{background:rgba(224,85,85,0.1);}

/* LOADING */
.loading-state{text-align:center;padding:60px 20px;color:var(--text2);}
.spinner{
  width:36px;height:36px;border:3px solid var(--border);
  border-top-color:var(--gold);border-radius:50%;
  animation:spin 0.8s linear infinite;margin:0 auto 12px;
}
@keyframes spin{to{transform:rotate(360deg);}}
.loading-inline{
  display:inline-block;width:14px;height:14px;
  border:2px solid rgba(0,0,0,0.3);border-top-color:#000;
  border-radius:50%;animation:spin 0.6s linear infinite;
  vertical-align:middle;margin-left:6px;
}

/* BOTTOM NAV */
.bottom-nav{
  position:fixed;bottom:0;left:0;right:0;
  background:var(--bg2);border-top:1px solid var(--border);
  display:flex;padding:8px 0 20px;z-index:100;
}
.nav-item{
  flex:1;display:flex;flex-direction:column;align-items:center;
  gap:2px;text-decoration:none;color:var(--text2);
  font-size:10px;padding:6px 0;transition:color 0.2s;
}
.nav-item:hover,.nav-item.active{color:var(--gold);}
.nav-icon{font-size:20px;}

/* ── RESPONSIVE ── */
@media(min-width:768px){
  .container{max-width:900px;}
  .avatar-section{
    display:flex;align-items:center;gap:24px;
    text-align:right;padding:28px 16px 20px;
    max-width:900px;margin:0 auto;
  }
  .avatar{margin:0;flex-shrink:0;}
  .stats-grid{grid-template-columns:repeat(4,1fr);}
  .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0 16px;}
}
@media(min-width:1200px){
  .container{max-width:1100px;}
  .avatar-section{max-width:1100px;}
  .page-grid{display:grid;grid-template-columns:1fr 1fr;gap:20px;align-items:start;}
  .page-grid .section{margin-bottom:0;}
}
</style>
</head>

  <a href="syriaexpress-buyer.html" class="back-btn">← رجوع</a>
  <a href="syriaexpress-landing.html" class="header-logo">

<!-- CONTENT -->
<div id="pageContent" style="display:none">

  <div class="avatar-section">

            <div class="stat-card">

            <div class="stat-card">

            <div class="stat-card">
              <div class="stat-icon">💰</div>

<script>
const API = 'https://syriaexpress-backend.onrender.com';
let userData = null;
let isEditing = false;

function getToken() { return localStorage.getItem('token'); }

function formatDate(d) {
  if (!d) return '';
  const date = d instanceof Date ? d : new Date(d);
  if (isNaN(date)) return '';
  return 'عضو منذ ' + date.toLocaleDateString('ar-SY', { year:'numeric', month:'long' });
}

function formatPrice(p) {
  const num = parseFloat(p);
  if (isNaN(num) || num === 0) return '0 ل.س';
  return num.toLocaleString('ar-SY', { maximumFractionDigits: 0 }) + ' ل.س';
}

async function loadProfile() {
  const token = getToken();
  if (!token) { window.location.href = 'login.html'; return; }

  try {
    // بيانات الطلبات لحساب الإحصائيات
    const ordersRes = await fetch(`${API}/api/orders/my`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const ordersData = ordersRes.ok ? await ordersRes.json() : [];
    const orders = ordersData.orders || ordersData || [];

    const total     = orders.length;
    const delivered = orders.filter(o => o.status === 'delivered').length;
    const pending   = orders.filter(o => ['pending','confirmed','shipped'].includes(o.status)).length;

    // إصلاح حساب إجمالي المشتريات — تجنّب NaN
    const spent = orders
      .filter(o => o.status !== 'cancelled')
      .reduce((sum, o) => {
        const qty      = parseFloat(o.quantity)      || 0;
        const price    = parseFloat(o.price)         || 0;
        const shipping = parseFloat(o.shipping_price)|| 0;
        return sum + (qty * price) + shipping;
      }, 0);

    document.getElementById('statTotal').textContent     = total;
    document.getElementById('statDelivered').textContent = delivered;
    document.getElementById('statPending').textContent   = pending;
    document.getElementById('statSpent').textContent     = formatPrice(spent);

    // بيانات المستخدم من API
    const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
    let payload = {};
    try { payload = JSON.parse(atob(token.split('.')[1])); } catch(e) {}
    try {
      const meRes = await fetch(`${API}/api/auth/me`, {
        headers: { 'Authorization': `Bearer ${token}` }
      });
      if (meRes.ok) {
        const meData = await meRes.json();
        userData = { ...payload, ...storedUser, ...meData };
      } else {
        userData = { ...payload, ...storedUser };
      }
    } catch(e) {
      userData = { ...payload, ...storedUser };
    }

    renderProfile();
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageContent').style.display  = 'block';

  } catch (err) {
    const storedUser = JSON.parse(localStorage.getItem('user') || '{}');
    let payload = {};
    try { payload = JSON.parse(atob(getToken().split('.')[1])); } catch(e) {}
    userData = { ...payload, ...storedUser };
    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageContent').style.display  = 'block';
    renderProfile();
  }
}

function renderProfile() {
  if (!userData) return;
  const name = userData.name || userData.full_name || '—';
  const initials = name !== '—' ? name.charAt(0) : '👤';

  const avatarEl = document.getElementById('userAvatar');
  if (userData.avatar_url) {
    avatarEl.innerHTML = `<img src="${userData.avatar_url}" alt="صورة الملف"><div class="avatar-overlay">📷</div>`;
  } else {
    avatarEl.innerHTML = `${initials}<div class="avatar-overlay">📷</div>`;
  }
  document.getElementById('userName').textContent    = name;
  document.getElementById('userEmail').textContent   = userData.email || '—';

  // تاريخ التسجيل
  const createdAt = userData.created_at
    ? new Date(userData.created_at)
    : (userData.iat ? new Date(userData.iat * 1000) : null);
  document.getElementById('userSince').textContent = formatDate(createdAt);

  document.getElementById('fieldName').value  = name !== '—' ? name : '';
  document.getElementById('fieldEmail').value = userData.email || '';
  document.getElementById('fieldPhone').value = userData.phone || '';
  document.getElementById('fieldGov').value   = userData.governorate || '';
}

function toggleEdit() {
  isEditing = true;
  ['fieldName','fieldPhone','fieldGov'].forEach(id => {
    const el = document.getElementById(id);
    el.disabled = false;
    el.classList.remove('readonly');
  });
  document.getElementById('saveBtn').style.display   = 'block';
  document.getElementById('cancelBtn').style.display = 'block';
}

function cancelEdit() {
  isEditing = false;
  ['fieldName','fieldPhone','fieldGov'].forEach(id => {
    const el = document.getElementById(id);
    el.disabled = true;
    el.classList.add('readonly');
  });
  renderProfile();
  document.getElementById('saveBtn').style.display   = 'none';
  document.getElementById('cancelBtn').style.display = 'none';
  hideMessages();
}

async function saveProfile() {
  const token = getToken();
  const btn = document.getElementById('saveBtn');
  btn.disabled = true;
  btn.innerHTML = 'جارٍ الحفظ... <span class="loading-inline"></span>';
  hideMessages();

  const body = {
    name:        document.getElementById('fieldName').value.trim(),
    phone:       document.getElementById('fieldPhone').value.trim(),
    governorate: document.getElementById('fieldGov').value.trim(),
  };

  try {
    const res = await fetch(`${API}/api/users/me`, {
      method:'PUT',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify(body)
    });
    const updated = res.ok ? await res.json() : {};
    userData = { ...userData, ...body, ...updated };
    localStorage.setItem('user', JSON.stringify(userData));
  } catch(e) {
    userData = { ...userData, ...body };
    localStorage.setItem('user', JSON.stringify(userData));
  }

  renderProfile();
  cancelEdit();
  showSuccess('تم حفظ المعلومات بنجاح ✓');
  btn.disabled = false;
  btn.textContent = 'حفظ التغييرات';
}

async function changePassword() {
  const current = document.getElementById('currentPw').value;
  const newPw   = document.getElementById('newPw').value;
  const confirm = document.getElementById('confirmPw').value;

  document.getElementById('pwError').style.display   = 'none';
  document.getElementById('pwSuccess').style.display = 'none';

  if (!current || !newPw || !confirm) { showPwError('يرجى ملء جميع الحقول'); return; }
  if (newPw.length < 6) { showPwError('كلمة المرور الجديدة يجب أن تكون 6 أحرف على الأقل'); return; }
  if (newPw !== confirm) { showPwError('كلمة المرور الجديدة غير متطابقة'); return; }

  const token = getToken();
  try {
    const res = await fetch(`${API}/api/auth/change-password`, {
      method:'POST',
      headers:{'Content-Type':'application/json','Authorization':`Bearer ${token}`},
      body: JSON.stringify({ current_password:current, new_password:newPw })
    });
    if (res.ok) {
      document.getElementById('pwSuccess').textContent   = 'تم تغيير كلمة المرور بنجاح ✓';
      document.getElementById('pwSuccess').style.display = 'block';
      document.getElementById('currentPw').value = '';
      document.getElementById('newPw').value     = '';
      document.getElementById('confirmPw').value = '';
    } else {
      const data = await res.json();
      showPwError(data.error || 'فشل تغيير كلمة المرور');
    }
  } catch(e) {
    showPwError('فشل الاتصال بالخادم');
  }
}

function togglePw(id, btn) {
  const input = document.getElementById(id);
  if (input.type === 'password') { input.type = 'text'; btn.textContent = '🙈'; }
  else { input.type = 'password'; btn.textContent = '👁'; }
}

function showSuccess(msg) {
  const el = document.getElementById('successMsg');
  el.textContent = msg; el.style.display = 'block';
  setTimeout(() => { el.style.display = 'none'; }, 3000);
}
function showPwError(msg) {
  const el = document.getElementById('pwError');
  el.textContent = msg; el.style.display = 'block';
}
function hideMessages() {
  document.getElementById('successMsg').style.display    = 'none';
  document.getElementById('profileError').style.display = 'none';
}

function logout() {
  if (!confirm('هل تريد تسجيل الخروج؟')) return;
  localStorage.removeItem('token');
  localStorage.removeItem('user');
  window.location.href = 'login.html';
}

loadProfile();

async function deleteAvatar() {
  if (!confirm('هل تريد حذف الصورة؟')) return;
  const token = localStorage.getItem('token');
  const avatarEl = document.getElementById('userAvatar');
  try {
    const res = await fetch(API + '/api/auth/avatar', {
      method: 'DELETE',
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (res.ok) {
      userData.avatar_url = null;
      const initials = (userData.name || '—').charAt(0);
      avatarEl.innerHTML = initials + '<div class="avatar-overlay">📷</div><div class="avatar-delete" onclick="event.stopPropagation();deleteAvatar()">✕</div>';
    } else {
      alert('فشل حذف الصورة');
    }
  } catch (e) {
    alert('فشل الاتصال بالخادم');
  }
}

async function uploadAvatar(input) {
  if (!input.files || !input.files[0]) return;
  const file = input.files[0];
  input.value = '';
  if (file.size > 5 * 1024 * 1024) { alert('الصورة كبيرة جداً (الحد 5MB)'); return; }

  const formData = new FormData();
  formData.append('avatar', file);

  const token = localStorage.getItem('token');
  const avatarEl = document.getElementById('userAvatar');
  avatarEl.innerHTML = '⏳<div class="avatar-overlay">📷</div>';

  try {
    const res = await fetch(API + '/api/auth/avatar', {
      method: 'POST',
      headers: { 'Authorization': 'Bearer ' + token },
      body: formData
    });
    const data = await res.json();
    if (res.ok) {
      userData.avatar_url = data.avatar_url;
      avatarEl.innerHTML = `<img src="${data.avatar_url}" alt="صورة الملف"><div class="avatar-overlay">📷</div>`;
    } else {
      alert(data.error || 'فشل رفع الصورة');
      renderProfile();
    }
  } catch (e) {
    alert('فشل الاتصال بالخادم');
    renderProfile();
  }
}
</script>
</body>
