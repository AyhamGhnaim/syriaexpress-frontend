<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>لوحة المشتري — SyriaExpress</title>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --gold:#c9a84c;--gold-light:#e8c96d;
      --bg:#0f0f0f;--bg2:#181614;--card:#1a1814;--card2:#1e1b17;
      --text:#f0e8d0;--text-muted:#8a7a5a;
      --border:rgba(201,168,76,0.15);
      --green:#4caf50;--orange:#ff9800;--blue:#2196f3;--red:#e05555;--purple:#9c27b0;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    body{background:var(--bg);color:var(--text);font-family:'Cairo',sans-serif;min-height:100vh;}

    /* TOPBAR */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;
      padding:0.9rem 1.2rem;
      background:rgba(15,15,15,0.96);
      border-bottom:1px solid var(--border);
      position:sticky;top:0;z-index:100;
    }
    .topbar-title{font-size:1rem;font-weight:700;}
    .topbar-actions{display:flex;gap:0.6rem;align-items:center;}
    .btn-new{
      padding:0.45rem 1rem;background:var(--gold);color:#0f0f0f;
      border:none;border-radius:8px;font-family:'Cairo',sans-serif;
      font-size:0.85rem;font-weight:700;cursor:pointer;transition:all 0.2s;
    }
    .btn-new:hover{background:var(--gold-light);}
    .btn-bell{
      width:36px;height:36px;background:var(--card);
      border:1px solid var(--border);border-radius:8px;
      display:flex;align-items:center;justify-content:center;
      cursor:pointer;font-size:1rem;transition:all 0.2s;position:relative;
    }
    .btn-bell:hover{border-color:var(--gold);}
    .bell-dot{
      position:absolute;top:4px;right:4px;
      width:8px;height:8px;border-radius:50%;background:var(--red);
    }

    /* TABS */
    .tabs{
      display:flex;gap:0;
      padding:0 1.2rem;
      background:var(--bg2);
      border-bottom:1px solid var(--border);
    }
    .tab{
      padding:0.7rem 1.2rem;font-size:0.88rem;font-weight:600;
      color:var(--text-muted);cursor:pointer;
      border-bottom:2px solid transparent;transition:all 0.2s;
    }
    .tab:hover{color:var(--text);}
    .tab.active{color:var(--gold);border-bottom-color:var(--gold);}

    /* CONTENT */
    .content{padding:1.2rem;}

    /* STAT CARDS GRID */
    .stats-grid{
      display:grid;grid-template-columns:1fr 1fr;
      gap:0.8rem;margin-bottom:1.2rem;
    }

    .stat-card{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:1.2rem;
      position:relative;overflow:hidden;
      animation:fadeUp 0.5s ease both;
    }

    .stat-card::before{
      content:'';position:absolute;top:0;right:0;left:0;height:3px;
      border-radius:14px 14px 0 0;
    }
    .card-green::before{background:linear-gradient(90deg,var(--green),#81c784);}
    .card-gold::before{background:linear-gradient(90deg,var(--gold),var(--gold-light));}
    .card-orange::before{background:linear-gradient(90deg,var(--orange),#ffb74d);}
    .card-blue::before{background:linear-gradient(90deg,var(--blue),#64b5f6);}

    .card-icon{font-size:1.8rem;margin-bottom:0.6rem;}
    .card-value{
      font-size:2.2rem;font-weight:900;line-height:1;margin-bottom:0.3rem;
    }
    .card-green .card-value{color:var(--green);}
    .card-gold .card-value{color:var(--gold);}
    .card-orange .card-value{color:var(--orange);}
    .card-blue .card-value{color:var(--blue);}

    .card-label{font-size:0.82rem;color:var(--text-muted);margin-bottom:0.4rem;}
    .card-sub{font-size:0.72rem;display:flex;align-items:center;gap:0.3rem;}
    .card-green .card-sub{color:var(--green);}
    .card-gold .card-sub{color:var(--gold);}
    .card-orange .card-sub{color:var(--orange);}
    .card-blue .card-sub{color:var(--blue);}

    /* ORDERS SECTION */
    .orders-section{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;overflow:hidden;
      animation:fadeUp 0.5s 0.1s ease both;
    }

    .orders-header{
      display:flex;align-items:center;justify-content:space-between;
      padding:1rem 1.2rem;border-bottom:1px solid var(--border);
    }

    .orders-title{
      display:flex;align-items:center;gap:0.5rem;
      font-size:0.9rem;font-weight:700;
    }

    .orders-title::before{
      content:'●';font-size:0.5rem;color:var(--gold);
      animation:pulse 2s infinite;
    }
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}

    .view-all{
      color:var(--gold);font-size:0.78rem;cursor:pointer;
      display:flex;align-items:center;gap:0.3rem;
    }

    .orders-cols{
      display:grid;grid-template-columns:2fr 1fr 1fr 1fr;
      padding:0.6rem 1.2rem;
      font-size:0.7rem;color:var(--text-muted);
      border-bottom:1px solid var(--border);
      text-align:left;
    }
    .orders-cols>*:first-child{text-align:right;}

    .order-row{
      display:grid;grid-template-columns:2fr 1fr 1fr 1fr;
      padding:0.9rem 1.2rem;border-bottom:1px solid var(--border);
      align-items:center;transition:background 0.15s;
      animation:fadeUp 0.4s ease both;
    }
    .order-row:last-child{border-bottom:none;}
    .order-row:hover{background:rgba(201,168,76,0.03);}

    .order-product{display:flex;align-items:center;gap:0.6rem;}
    .order-img{
      width:32px;height:32px;border-radius:6px;
      background:var(--card2);display:flex;align-items:center;justify-content:center;
      font-size:1rem;flex-shrink:0;
    }
    .order-name{font-size:0.85rem;font-weight:600;}
    .order-company{font-size:0.72rem;color:var(--text-muted);}
    .order-num{font-size:0.78rem;color:var(--text-muted);text-align:left;}
    .order-qty{font-size:0.82rem;text-align:left;}
    .order-date{font-size:0.75rem;color:var(--text-muted);text-align:left;}

    .status-badge{
      display:inline-flex;align-items:center;gap:0.3rem;
      padding:0.2rem 0.6rem;border-radius:20px;
      font-size:0.7rem;font-weight:700;
    }
    .s-pending{background:rgba(255,152,0,0.15);color:var(--orange);}
    .s-confirmed{background:rgba(33,150,243,0.15);color:var(--blue);}
    .s-shipped{background:rgba(156,39,176,0.15);color:#ab47bc;}
    .s-delivered{background:rgba(76,175,80,0.15);color:var(--green);}
    .s-cancelled{background:rgba(224,85,85,0.15);color:var(--red);}

    .btn-action{
      padding:0.25rem 0.6rem;border-radius:5px;
      font-family:'Cairo',sans-serif;font-size:0.72rem;font-weight:600;
      cursor:pointer;transition:all 0.15s;border:none;
    }
    .btn-track{background:rgba(201,168,76,0.15);color:var(--gold);}
    .btn-detail{background:var(--card2);color:var(--text-muted);}

    /* FORM */
    .form-section{
      background:var(--card);border:1px solid var(--border);
      border-radius:14px;padding:1.2rem;
      animation:fadeUp 0.5s ease both;
    }
    .form-title{font-size:0.92rem;font-weight:700;margin-bottom:1rem;}
    .form-grid{display:grid;grid-template-columns:1fr 1fr;gap:0.8rem;}
    .form-group{margin-bottom:0;}
    .form-full{grid-column:1/-1;}
    label{display:block;font-size:0.75rem;font-weight:600;color:var(--text-muted);margin-bottom:0.35rem;}
    input,select,textarea{
      width:100%;background:var(--card2);border:1px solid var(--border);
      border-radius:8px;padding:0.65rem 0.9rem;color:var(--text);
      font-family:'Cairo',sans-serif;font-size:0.85rem;outline:none;transition:border-color 0.2s;
    }
    input:focus,select:focus,textarea:focus{border-color:var(--gold);}
    input::placeholder,textarea::placeholder{color:var(--text-muted);opacity:0.5;}
    select option{background:var(--card);}
    textarea{resize:vertical;min-height:70px;}
    .btn-submit{
      width:100%;padding:0.8rem;background:var(--gold);color:#0f0f0f;
      border:none;border-radius:8px;font-family:'Cairo',sans-serif;
      font-size:0.95rem;font-weight:700;cursor:pointer;transition:all 0.2s;margin-top:0.8rem;
    }
    .btn-submit:hover:not(:disabled){background:var(--gold-light);}
    .btn-submit:disabled{opacity:0.6;cursor:not-allowed;}

    .alert{
      padding:0.75rem 1rem;border-radius:8px;font-size:0.85rem;
      margin-bottom:0.8rem;display:none;
    }
    .alert.error{background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.3);color:var(--red);display:block;}
    .alert.success{background:rgba(76,175,80,0.1);border:1px solid rgba(76,175,80,0.3);color:var(--green);display:block;}

    .loading{text-align:center;padding:2rem;color:var(--text-muted);}
    .spinner{display:inline-block;width:20px;height:20px;border:2px solid var(--border);border-top-color:var(--gold);border-radius:50%;animation:spin 0.7s linear infinite;}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}

    .empty{text-align:center;padding:2.5rem;color:var(--text-muted);}
    .empty-icon{font-size:2rem;opacity:0.3;margin-bottom:0.6rem;}
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">نظرة عامة</div>
  <div class="topbar-actions">
    <button class="btn-new" onclick="showTab('new-order')">+ طلب جديد</button>
    <div class="btn-bell">🔔<div class="bell-dot"></div></div>
  </div>
</div>

<div id="mobile-logout" style="display:flex;align-items:center;justify-content:space-between;padding:0.6rem 1.2rem;background:#1a1814;border-bottom:1px solid rgba(201,168,76,0.15);">
  <span id="mobile-username" style="font-size:0.82rem;color:#8a7a5a;"></span>
  <button onclick="logout()" style="padding:0.35rem 0.9rem;background:rgba(224,85,85,0.1);color:#e05555;border:1px solid rgba(224,85,85,0.2);border-radius:6px;font-family:Cairo,sans-serif;font-size:0.78rem;font-weight:600;cursor:pointer;">تسجيل الخروج</button>
</div>

<div class="tabs">
  <div class="tab active" onclick="showTab('overview',this)">نظرة عامة</div>
  <div class="tab" onclick="showTab('orders',this)">طلباتي</div>
  <div class="tab" onclick="showTab('new-order',this)">طلب جديد</div>
</div>

<div class="content">

  <!-- OVERVIEW -->
  <div id="tab-overview">
    <div class="stats-grid">
      <div class="stat-card card-green" style="animation-delay:0s">
        <div class="card-icon">✅</div>
        <div class="card-value" id="s-done">—</div>
        <div class="card-label">طلبات مكتملة</div>
        <div class="card-sub" id="s-done-sub">⬆ جاري التحميل</div>
      </div>
      <div class="stat-card card-gold" style="animation-delay:0.05s">
        <div class="card-icon">📦</div>
        <div class="card-value" id="s-total">—</div>
        <div class="card-label">إجمالي الطلبات</div>
        <div class="card-sub" id="s-total-sub">⬆ جاري التحميل</div>
      </div>
      <div class="stat-card card-orange" style="animation-delay:0.1s">
        <div class="card-icon">⏳</div>
        <div class="card-value" id="s-pending">—</div>
        <div class="card-label">بانتظار التأكيد</div>
        <div class="card-sub">تأكيد خلال 24 ساعة</div>
      </div>
      <div class="stat-card card-blue" style="animation-delay:0.15s">
        <div class="card-icon">🚚</div>
        <div class="card-value" id="s-shipped">—</div>
        <div class="card-label">قيد التوصيل</div>
        <div class="card-sub">⏱ متوسط 3 أيام</div>
      </div>
    </div>

    <div class="orders-section">
      <div class="orders-header">
        <div class="orders-title">آخر الطلبات</div>
        <div class="view-all" onclick="showTab('orders',null)">عرض الكل ←</div>
      </div>
      <div class="orders-cols">
        <div>المنتج</div><div>رقم الطلب</div><div>الحالة</div><div>التاريخ</div>
      </div>
      <div id="recent-orders"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- ORDERS -->
  <div id="tab-orders" style="display:none">
    <div class="orders-section">
      <div class="orders-header">
        <div class="orders-title">طلباتي</div>
      </div>
      <div class="orders-cols">
        <div>المنتج</div><div>رقم الطلب</div><div>الحالة</div><div>التاريخ</div>
      </div>
      <div id="all-orders"><div class="loading"><div class="spinner"></div></div></div>
    </div>
  </div>

  <!-- NEW ORDER -->
  <div id="tab-new-order" style="display:none">
    <div class="form-section">
      <div class="form-title">+ إنشاء طلب جديد</div>
      <div id="order-alert" class="alert"></div>
      <div class="form-grid">
        <div class="form-group">
          <label>رقم المنتج (ID)</label>
          <input type="number" id="product_id" placeholder="مثال: 1"/>
        </div>
        <div class="form-group">
          <label>الكمية</label>
          <input type="number" id="quantity" placeholder="100" min="1"/>
        </div>
        <div class="form-group">
          <label>نوع الشحن</label>
          <select id="shipping_type">
            <option value="inside">داخل سوريا</option>
            <option value="outside">خارج سوريا</option>
            <option value="international">دولي</option>
          </select>
        </div>
        <div class="form-group">
          <label>عنوان التسليم</label>
          <input type="text" id="shipping_address" placeholder="المدينة، الحي..."/>
        </div>
        <div class="form-group form-full">
          <label>ملاحظات</label>
          <textarea id="notes" placeholder="تعليمات إضافية..."></textarea>
        </div>
      </div>
      <button class="btn-submit" id="submit-order" onclick="submitOrder()">
        <span id="submit-text">إرسال الطلب</span>
      </button>
    </div>
  </div>

</div>

  const statusMap = {
    pending:{l:'بانتظار ⏳',c:'s-pending'},
    confirmed:{l:'مؤكد ✓',c:'s-confirmed'},
    shipped:{l:'قيد الشحن 🚚',c:'s-shipped'},
    delivered:{l:'تم التسليم ✅',c:'s-delivered'},
    cancelled:{l:'ملغي ✗',c:'s-cancelled'},
  };

  function showTab(name, el) {
    ['overview','orders','new-order'].forEach(t=>document.getElementById('tab-'+t).style.display='none');
    document.getElementById('tab-'+name).style.display='block';
    document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
    if(el) el.classList.add('active');
    document.querySelector('.topbar-title').textContent = name==='overview'?'نظرة عامة':name==='orders'?'طلباتي':'طلب جديد';
    if(name==='orders') renderAll();
  }

  function renderRows(orders, id) {
    const el = document.getElementById(id);
    if(!orders.length){el.innerHTML='<div class="empty"><div class="empty-icon">📭</div><p>لا توجد طلبات</p></div>';return;}
    el.innerHTML = orders.map((o,i)=>{
      const s = statusMap[o.status]||{l:o.status,c:''};
      const date = new Date(o.created_at).toLocaleDateString('ar-SY');
      const num = '#'+String(o.id||'').substring(0,4).toUpperCase();
      return `<div class="order-row" style="animation-delay:${i*0.04}s">
        <div class="order-product">
          <div class="order-img">📦</div>
          <div><div class="order-name">${o.name_ar||'منتج'}</div><div class="order-company">${o.company_name_ar||''}</div></div>
        </div>
        <div class="order-num">${num}</div>
        <div><span class="status-badge ${s.c}">${s.l}</span></div>
        <div class="order-date">${date}</div>
      </div>`;
    }).join('');
  }

  function renderAll(){renderRows(ordersData,'all-orders');}

  async function loadOrders(){
    try{
      const r = await fetch(`${API}/api/orders/my`,{headers:{'Authorization':'Bearer '+token}});
      ordersData = await r.json();
      if(!Array.isArray(ordersData)) ordersData=[];

      document.getElementById('s-total').textContent = ordersData.length;
      const done = ordersData.filter(o=>o.status==='delivered').length;
      const pend = ordersData.filter(o=>o.status==='pending').length;
      const ship = ordersData.filter(o=>o.status==='shipped').length;
      document.getElementById('s-done').textContent = done;
      document.getElementById('s-pending').textContent = pend;
      document.getElementById('s-shipped').textContent = ship;
      document.getElementById('s-done-sub').textContent = `⬆ ${Math.round(done/Math.max(ordersData.length,1)*100)}% معدل الإكمال`;
      document.getElementById('s-total-sub').textContent = `⬆ ${ordersData.filter(o=>{const d=new Date(o.created_at);return d.getMonth()===new Date().getMonth()}).length}+ هذا الشهر`;

      renderRows(ordersData.slice(0,5),'recent-orders');
    }catch(e){
      document.getElementById('recent-orders').innerHTML='<div class="empty"><div class="empty-icon">⚠️</div><p>تعذّر التحميل</p></div>';
    }
  }

  async function submitOrder(){
    const alertEl = document.getElementById('order-alert');
    alertEl.className='alert';
    const pid=parseInt(document.getElementById('product_id').value);
    const qty=parseInt(document.getElementById('quantity').value);
    const stype=document.getElementById('shipping_type').value;
    const addr=document.getElementById('shipping_address').value.trim();
    const notes=document.getElementById('notes').value.trim();
    if(!pid||!qty||!addr){alertEl.textContent='يرجى تعبئة الحقول المطلوبة';alertEl.className='alert error';return;}
    const btn=document.getElementById('submit-order');
    const txt=document.getElementById('submit-text');
    btn.disabled=true;txt.textContent='جاري الإرسال...';
    try{
      const r=await fetch(`${API}/api/orders`,{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+token},body:JSON.stringify({product_id:pid,quantity:qty,shipping_type:stype,shipping_address:addr,notes})});
      const d=await r.json();
      if(!r.ok){alertEl.textContent=d.error||'حدث خطأ';alertEl.className='alert error';return;}
      alertEl.textContent='تم إرسال الطلب بنجاح ✓';alertEl.className='alert success';
      document.getElementById('product_id').value='';document.getElementById('quantity').value='';document.getElementById('shipping_address').value='';document.getElementById('notes').value='';
      setTimeout(()=>showTab('orders',null),1500);
    }catch{alertEl.textContent='تعذّر الاتصال';alertEl.className='alert error';}
    finally{btn.disabled=false;txt.textContent='إرسال الطلب';}
  }

  function logout(){localStorage.clear();window.location.href='login.html';}
  loadOrders();
</script>
</body>
