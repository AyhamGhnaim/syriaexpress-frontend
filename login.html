<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول — SyriaExpress</title>
  <script>(function(){var s=localStorage.getItem('theme');if(s==='light')document.documentElement.setAttribute('data-theme','light');})()</script>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --gold-dark: #8a6a1f;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161410;
      --text: #f0e8d0;
      --text-muted: #8a7a5a;
      --border: rgba(201,168,76,0.2);
      --error: #e05555;
      --success: #4caf50;
    }

    [data-theme="light"] {
      --bg: #F5F3EF;
      --bg2: #FFFFFF;
      --bg3: #E8E4DC;
      --text: #1a1610;
      --text-muted: #6b5e3e;
      --border: rgba(139,90,20,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 60% at 80% 20%, rgba(201,168,76,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 50% 50% at 20% 80%, rgba(201,168,76,0.04) 0%, transparent 50%);
      pointer-events: none;
    }

    .container {
      width: 100%;
      max-width: 440px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.7s ease both;
    }

    /* LOGO */
    .logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .logo a { text-decoration: none; }

    .logo-icon {
      width: 90px;
      height: 90px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 0.8rem;
    }

    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--text);
    }

    .logo-text span { color: var(--gold); }

    .logo-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      margin-top: 0.2rem;
      letter-spacing: 2px;
      text-transform: uppercase;
    }

    /* CARD */
    .card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 2.5rem;
    }

    .card-title {
      font-family: 'Amiri', serif;
      font-size: 1.8rem;
      text-align: center;
      margin-bottom: 0.4rem;
    }

    .card-sub {
      text-align: center;
      color: var(--text-muted);
      font-size: 0.9rem;
      margin-bottom: 2rem;
    }

    /* FORM */
    .form-group {
      margin-bottom: 1.2rem;
    }

    label {
      display: block;
      font-size: 0.85rem;
      font-weight: 600;
      color: var(--text-muted);
      margin-bottom: 0.5rem;
    }

    input {
      width: 100%;
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.8rem 1rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem;
      transition: border-color 0.2s;
      outline: none;
    }

    input:focus {
      border-color: var(--gold);
      box-shadow: 0 0 0 3px rgba(201,168,76,0.1);
    }

    input::placeholder { color: var(--text-muted); opacity: 0.5; }

    .input-wrapper {
      position: relative;
    }

    .toggle-pass {
      position: absolute;
      left: 0.8rem;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 0.2rem;
    }

    /* ALERT */
    .alert {
      padding: 0.8rem 1rem;
      border-radius: 8px;
      font-size: 0.9rem;
      margin-bottom: 1.2rem;
      display: none;
    }

    .alert.error {
      background: rgba(224,85,85,0.1);
      border: 1px solid rgba(224,85,85,0.3);
      color: #e05555;
      display: block;
    }

    .alert.success {
      background: rgba(76,175,80,0.1);
      border: 1px solid rgba(76,175,80,0.3);
      color: #4caf50;
      display: block;
    }

    /* BUTTON */
    .btn-submit {
      width: 100%;
      padding: 0.9rem;
      background: var(--gold);
      color: #0a0a0a;
      border: none;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 1rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }

    .btn-submit:hover:not(:disabled) {
      background: var(--gold-light);
      transform: translateY(-1px);
      box-shadow: 0 6px 20px rgba(201,168,76,0.25);
    }

    .btn-submit:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid rgba(0,0,0,0.3);
      border-top-color: #0a0a0a;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    /* DIVIDER */
    .divider {
      text-align: center;
      margin: 1.5rem 0;
      position: relative;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .divider::before, .divider::after {
      content: '';
      position: absolute;
      top: 50%;
      width: 40%;
      height: 1px;
      background: var(--border);
    }

    .divider::before { right: 0; }
    .divider::after { left: 0; }

    /* FOOTER LINKS */
    .card-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .card-footer a {
      color: var(--gold);
      text-decoration: none;
      font-weight: 600;
    }

    .card-footer a:hover { color: var(--gold-light); }

    .back-home {
      text-align: center;
      margin-top: 1.5rem;
    }

    .back-home a {
      color: var(--text-muted);
      text-decoration: none;
      font-size: 0.85rem;
      transition: color 0.2s;
    }

    .back-home a:hover { color: var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    @media (min-width: 480px) {
      .container { max-width: 460px; }
      .card { padding: 3rem; }
      .card-title { font-size: 2rem; }
    }

    @media (min-width: 768px) {
      body { padding: 3rem; }
      .container { max-width: 480px; }
    }
  </style>
</head>

    <!-- CARD -->
    <div class="card">
      <h1 class="card-title">أهلاً بعودتك</h1>
      <p class="card-sub">سجّل دخولك للمتابعة</p>

      <div id="alert" class="alert"></div>

      <div class="form-group">
        <label for="email">البريد الإلكتروني</label>
        <input type="email" id="email" placeholder="example@email.com" autocomplete="email" />
      </div>

      <div class="form-group">
        <label for="password">كلمة المرور</label>
        <div class="input-wrapper">
          <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" />
          <button class="toggle-pass" onclick="togglePass()" type="button" id="toggleBtn">👁</button>
        </div>
      </div>

      <button class="btn-submit" id="loginBtn" onclick="handleLogin()">
        <div class="spinner" id="spinner"></div>
        <span id="btnText">تسجيل الدخول</span>
      </button>

      <div class="divider">أو</div>

      <div class="card-footer">
        ليس لديك حساب؟ <a href="register.html">سجّل الآن</a>
      </div>
    </div>

    <div class="back-home">
      <a href="syriaexpress-landing.html">← العودة للرئيسية</a>
    </div>
  </div>

  <script>
    const API_BASE = 'https://syriaexpress-backend.onrender.com';

    function showAlert(msg, type) {
      const el = document.getElementById('alert');
      el.textContent = msg;
      el.className = `alert ${type}`;
    }

    function hideAlert() {
      document.getElementById('alert').className = 'alert';
    }

    function setLoading(loading) {
      const btn = document.getElementById('loginBtn');
      const spinner = document.getElementById('spinner');
      const text = document.getElementById('btnText');
      btn.disabled = loading;
      spinner.style.display = loading ? 'block' : 'none';
      text.textContent = loading ? 'جارٍ التسجيل...' : 'تسجيل الدخول';
    }

    function togglePass() {
      const input = document.getElementById('password');
      const btn = document.getElementById('toggleBtn');
      if (input.type === 'password') {
        input.type = 'text';
        btn.textContent = '🙈';
      } else {
        input.type = 'password';
        btn.textContent = '👁';
      }
    }

    async function handleLogin() {
      hideAlert();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;

      if (!email || !password) {
        showAlert('يرجى تعبئة جميع الحقول', 'error');
        return;
      }

      setLoading(true);

      try {
        const res = await fetch(`${API_BASE}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (!res.ok) {
          showAlert(data.error || 'خطأ في تسجيل الدخول', 'error');
          return;
        }

        // Save token and user info
        localStorage.setItem('token', data.token);
        localStorage.setItem('user', JSON.stringify(data.user));

        showAlert('تم تسجيل الدخول بنجاح! جارٍ التحويل...', 'success');

        // Redirect based on user type
        setTimeout(() => {
          const userType = data.user?.user_type;
          if (userType === 'admin') {
            window.location.href = 'syriaexpress-admin.html';
          } else if (userType === 'seller') {
            window.location.href = 'syriaexpress-seller.html';
          } else {
            window.location.href = 'syriaexpress-buyer.html';
          }
        }, 1000);

      } catch (err) {
        showAlert('تعذّر الاتصال بالخادم، تحقق من اتصالك', 'error');
      } finally {
        setLoading(false);
      }
    }

    // Enter key support
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') handleLogin();
    });

    // Redirect if already logged in
    if (localStorage.getItem('token')) {
      const user = JSON.parse(localStorage.getItem('user') || '{}');
      if (user.user_type === 'admin') window.location.href = 'syriaexpress-admin.html';
      else if (user.user_type === 'seller') window.location.href = 'syriaexpress-seller.html';
      else if (user.user_type === 'buyer') window.location.href = 'syriaexpress-buyer.html';
    }
  </script>
