<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تصفح المنتجات — SyriaExpress</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet" />
  <style>
    :root {
      --gold: #c9a84c;
      --gold-light: #e8c96d;
      --gold-dark: #8a6a1f;
      --bg: #0a0a0a;
      --bg2: #111111;
      --bg3: #161410;
      --text: #f0e8d0;
      --text-muted: #8a7a5a;
      --border: rgba(201,168,76,0.2);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: var(--bg); color: var(--text); font-family: 'Cairo', sans-serif; }

    /* NAV */
    nav {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 2rem;
      background: rgba(10,10,10,0.92);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo { display: flex; align-items: center; gap: 0.6rem; text-decoration: none; }
    .nav-logo-icon {
      width: 36px; height: 36px;
      border: 2px solid var(--gold); border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-family: 'Amiri', serif; font-size: 1.1rem; color: var(--gold);
    }
    .nav-logo-text { font-size: 1.1rem; font-weight: 700; color: var(--text); }
    .nav-logo-text span { color: var(--gold); }

    .nav-actions { display: flex; gap: 0.6rem; align-items: center; }

    .btn-sm {
      padding: 0.45rem 1.1rem;
      border-radius: 6px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem; font-weight: 600;
      cursor: pointer; text-decoration: none;
      transition: all 0.2s;
    }
    .btn-outline { border: 1px solid var(--gold); color: var(--gold); background: transparent; }
    .btn-outline:hover { background: rgba(201,168,76,0.1); }
    .btn-gold { background: var(--gold); color: #0a0a0a; border: none; }
    .btn-gold:hover { background: var(--gold-light); }

    /* LAYOUT */
    .page-layout {
      display: grid;
      grid-template-columns: 260px 1fr;
      gap: 0;
      min-height: calc(100vh - 62px);
    }

    /* SIDEBAR */
    .sidebar {
      background: var(--bg2);
      border-left: 1px solid var(--border);
      padding: 1.5rem;
      position: sticky;
      top: 62px;
      height: calc(100vh - 62px);
      overflow-y: auto;
    }

    .filter-section { margin-bottom: 1.8rem; }

    .filter-title {
      font-size: 0.75rem;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--gold);
      font-weight: 700;
      margin-bottom: 0.8rem;
    }

    .filter-option {
      display: flex; align-items: center;
      gap: 0.6rem; padding: 0.45rem 0.6rem;
      border-radius: 6px; cursor: pointer;
      font-size: 0.88rem; color: var(--text-muted);
      transition: all 0.15s;
      user-select: none;
    }

    .filter-option:hover { background: rgba(201,168,76,0.06); color: var(--text); }
    .filter-option.active { background: rgba(201,168,76,0.1); color: var(--gold); font-weight: 600; }

    .filter-dot {
      width: 8px; height: 8px; border-radius: 50%;
      background: var(--border); flex-shrink: 0;
      transition: background 0.15s;
    }
    .filter-option.active .filter-dot { background: var(--gold); }

    .filter-divider {
      height: 1px; background: var(--border);
      margin: 1.2rem 0;
    }

    .btn-clear {
      width: 100%; padding: 0.6rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text-muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem; cursor: pointer;
      transition: all 0.2s;
    }
    .btn-clear:hover { border-color: var(--gold); color: var(--gold); }

    /* MAIN */
    .main { padding: 1.5rem 2rem; }

    /* SEARCH BAR */
    .search-bar {
      display: flex; gap: 0.8rem;
      margin-bottom: 1.5rem;
    }

    .search-input-wrap {
      flex: 1; position: relative;
    }

    .search-input-wrap input {
      width: 100%;
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.7rem 1rem 0.7rem 2.8rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.92rem;
      outline: none;
      transition: border-color 0.2s;
    }

    .search-input-wrap input:focus { border-color: var(--gold); }
    .search-input-wrap input::placeholder { color: var(--text-muted); opacity: 0.5; }

    .search-icon {
      position: absolute; left: 0.8rem; top: 50%;
      transform: translateY(-50%);
      color: var(--text-muted); font-size: 1rem;
    }

    /* RESULTS INFO */
    .results-info {
      display: flex; align-items: center;
      justify-content: space-between;
      margin-bottom: 1.2rem;
      flex-wrap: wrap; gap: 0.5rem;
    }

    .results-count {
      font-size: 0.88rem; color: var(--text-muted);
    }

    .results-count span { color: var(--gold); font-weight: 700; }

    .sort-select {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 0.4rem 0.8rem;
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      font-size: 0.82rem; outline: none;
    }

    /* PRODUCTS GRID */
    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 1.2rem;
    }

    /* PRODUCT CARD */
    .product-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: all 0.25s;
      cursor: pointer;
      text-decoration: none;
      color: var(--text);
      display: block;
      animation: fadeUp 0.5s ease both;
    }

    .product-card:hover {
      border-color: rgba(201,168,76,0.4);
      transform: translateY(-3px);
      box-shadow: 0 8px 30px rgba(0,0,0,0.4);
    }

    .product-image {
      width: 100%; height: 160px;
      background: var(--bg3);
      display: flex; align-items: center; justify-content: center;
      font-size: 2.5rem;
      position: relative;
      overflow: hidden;
    }

    .product-image img {
      width: 100%; height: 100%; object-fit: cover;
    }

    
    .tier-logo {
      position:absolute; top:0.5rem; right:0.5rem;
      width:32px; height:32px; object-fit:contain;
    }
    .partner-badge {
      position: absolute; top: 0.5rem; right: 0.5rem;
      padding: 0.2rem 0.6rem;
      border-radius: 4px;
      font-size: 0.7rem; font-weight: 700;
      text-transform: uppercase;
    }

    .badge-gold { background: var(--gold); color: #0a0a0a; }
    .badge-silver { background: #aaa; color: #0a0a0a; }

    .product-body { padding: 1rem; }

    .product-category {
      font-size: 0.72rem; color: var(--gold);
      letter-spacing: 1px; text-transform: uppercase;
      font-weight: 600; margin-bottom: 0.3rem;
    }

    .product-name {
      font-size: 1rem; font-weight: 700;
      margin-bottom: 0.3rem;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .product-seller {
      font-size: 0.8rem; color: var(--text-muted);
      margin-bottom: 0.8rem;
    }

    .product-footer {
      display: flex; align-items: center;
      justify-content: space-between;
      padding-top: 0.8rem;
      border-top: 1px solid var(--border);
    }

    .product-shipping {
      display: flex; gap: 0.3rem; flex-wrap: wrap;
    }

    .ship-tag {
      font-size: 0.68rem; padding: 0.15rem 0.5rem;
      border-radius: 4px;
      background: rgba(201,168,76,0.1);
      color: var(--gold);
      border: 1px solid rgba(201,168,76,0.2);
    }

    .product-moq {
      font-size: 0.75rem; color: var(--text-muted);
      text-align: left;
    }

    .product-moq span { color: var(--text); font-weight: 600; }

    /* SKELETON */
    .skeleton {
      background: linear-gradient(90deg, var(--bg2) 25%, var(--bg3) 50%, var(--bg2) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
      border-radius: 8px;
    }

    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .skeleton-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .skeleton-img { height: 160px; }
    .skeleton-body { padding: 1rem; display: flex; flex-direction: column; gap: 0.6rem; }
    .skeleton-line { height: 12px; border-radius: 4px; }

    /* EMPTY STATE */
    .empty-state {
      grid-column: 1/-1;
      text-align: center;
      padding: 4rem 2rem;
    }

    .empty-icon { font-size: 3rem; margin-bottom: 1rem; opacity: 0.4; }
    .empty-text { color: var(--text-muted); font-size: 1rem; }

    /* PAGINATION */
    .pagination {
      display: flex; justify-content: center;
      gap: 0.5rem; margin-top: 2rem; flex-wrap: wrap;
    }

    .page-btn {
      width: 36px; height: 36px;
      border-radius: 6px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text-muted);
      font-family: 'Cairo', sans-serif;
      font-size: 0.85rem; cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center;
    }

    .page-btn:hover { border-color: var(--gold); color: var(--gold); }
    .page-btn.active { background: var(--gold); color: #0a0a0a; border-color: var(--gold); font-weight: 700; }
    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* MODAL */
    .modal-overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(4px);
      z-index: 200;
      display: none; align-items: center; justify-content: center;
      padding: 1rem;
    }
    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 16px;
      width: 100%; max-width: 600px;
      max-height: 90vh;
      overflow-y: auto;
      animation: fadeUp 0.3s ease both;
    }

    .modal-header {
      padding: 1.5rem 1.5rem 0;
      display: flex; align-items: flex-start;
      justify-content: space-between;
      gap: 1rem;
    }

    .modal-close {
      background: none; border: none;
      color: var(--text-muted); font-size: 1.3rem;
      cursor: pointer; flex-shrink: 0;
      transition: color 0.2s;
    }
    .modal-close:hover { color: var(--text); }

    .modal-body { padding: 1rem 1.5rem 1.5rem; }

    .modal-image {
      width: 100%; height: 200px;
      background: var(--bg3);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 4rem; margin-bottom: 1.2rem;
      overflow: hidden;
    }

    .modal-image img { width: 100%; height: 100%; object-fit: cover; }

    .modal-category {
      font-size: 0.75rem; color: var(--gold);
      letter-spacing: 1px; text-transform: uppercase;
      font-weight: 600; margin-bottom: 0.4rem;
    }

    .modal-title {
      font-family: 'Amiri', serif;
      font-size: 1.6rem; margin-bottom: 0.5rem;
    }

    .modal-seller {
      font-size: 0.88rem; color: var(--text-muted);
      margin-bottom: 1rem;
      display: flex; align-items: center; gap: 0.4rem;
    }

    .modal-desc {
      font-size: 0.92rem; color: var(--text-muted);
      line-height: 1.8; margin-bottom: 1.2rem;
    }

    .modal-details {
      display: grid; grid-template-columns: 1fr 1fr;
      gap: 0.8rem; margin-bottom: 1.2rem;
    }

    .detail-item {
      background: var(--bg3);
      border-radius: 8px; padding: 0.8rem;
    }

    .detail-label {
      font-size: 0.72rem; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
      margin-bottom: 0.3rem;
    }

    .detail-value { font-size: 0.92rem; font-weight: 600; }

    .modal-actions {
      display: flex; gap: 0.8rem;
    }

    .btn-contact {
      flex: 1; padding: 0.8rem;
      background: var(--gold); color: #0a0a0a;
      border: none; border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 0.95rem; font-weight: 700;
      cursor: pointer; transition: all 0.2s;
    }
    .btn-contact:hover { background: var(--gold-light); }

    .btn-wishlist {
      padding: 0.8rem 1.2rem;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 8px; color: var(--text-muted);
      cursor: pointer; font-size: 1.1rem;
      transition: all 0.2s;
    }
    .btn-wishlist:hover { border-color: var(--gold); color: var(--gold); }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* MOBILE */
    @media (max-width: 768px) {
      .page-layout { grid-template-columns: 1fr; }
      .sidebar { position: static; height: auto; border-left: none; border-bottom: 1px solid var(--border); }
      .main { padding: 1rem; }
      nav { padding: 0.8rem 1rem; }
    }
  </style>
</head>

      <div class="filter-option" onclick="setFilter('governorate','دمشق')" id="gov-دمشق">
        <div class="filter-dot"></div> دمشق
      </div>
      <div class="filter-option" onclick="setFilter('governorate','حلب')" id="gov-حلب">
        <div class="filter-dot"></div> حلب
      </div>
      <div class="filter-option" onclick="setFilter('governorate','حمص')" id="gov-حمص">
        <div class="filter-dot"></div> حمص
      </div>
      <div class="filter-option" onclick="setFilter('governorate','حماة')" id="gov-حماة">
        <div class="filter-dot"></div> حماة
      </div>
      <div class="filter-option" onclick="setFilter('governorate','اللاذقية')" id="gov-اللاذقية">
        <div class="filter-dot"></div> اللاذقية
      </div>

<script>
  const API_BASE = 'https://syriaexpress-backend.onrender.com';

  let filters = { shipping: '', governorate: '', search: '', page: 1 };
  let searchTimer = null;
  let currentProduct = null;

  // Auth check
  const token = localStorage.getItem('token');
  const user = token ? JSON.parse(localStorage.getItem('user') || '{}') : null;
  if (user?.name) {
    document.getElementById('nav-user').textContent = `مرحباً، ${user.name}`;
    document.getElementById('nav-login').style.display = 'none';
    document.getElementById('nav-register').textContent = 'لوحتي';
    document.getElementById('nav-register').href =
      user.user_type === 'seller' ? 'seller-dashboard.html' :
      user.user_type === 'admin' ? 'admin-dashboard.html' : 'buyer-dashboard.html';
  }

  function setFilter(key, value) {
    filters[key] = value;
    filters.page = 1;

    // Update UI
    if (key === 'shipping') {
      document.querySelectorAll('[id^="ship-"]').forEach(el => el.classList.remove('active'));
      const id = value ? `ship-${value === 'inside' ? 'inside' : value === 'outside' ? 'outside' : 'intl'}` : 'ship-all';
      document.getElementById(id)?.classList.add('active');
    }
    if (key === 'governorate') {
      document.querySelectorAll('[id^="gov-"]').forEach(el => el.classList.remove('active'));
      document.getElementById(value ? `gov-${value}` : 'gov-all')?.classList.add('active');
    }

    loadProducts();
  }

  function clearFilters() {
    filters = { shipping: '', governorate: '', search: '', page: 1 };
    document.getElementById('searchInput').value = '';
    document.querySelectorAll('.filter-option').forEach(el => el.classList.remove('active'));
    document.getElementById('ship-all').classList.add('active');
    document.getElementById('gov-all').classList.add('active');
    loadProducts();
  }

  function debounceSearch() {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      filters.search = document.getElementById('searchInput').value.trim();
      filters.page = 1;
      loadProducts();
    }, 400);
  }

  async function loadProducts(page) {
    if (page) filters.page = page;
    const grid = document.getElementById('productsGrid');

    // Show skeletons
    grid.innerHTML = Array(8).fill(`
      <div class="skeleton-card">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton-body">
          <div class="skeleton skeleton-line" style="width:40%"></div>
          <div class="skeleton skeleton-line" style="width:80%"></div>
          <div class="skeleton skeleton-line" style="width:60%"></div>
        </div>
      </div>
    `).join('');

    try {
      const params = new URLSearchParams();
      if (filters.shipping) params.set('shipping', filters.shipping);
      if (filters.governorate) params.set('governorate', filters.governorate);
      if (filters.search) params.set('search', filters.search);
      params.set('page', filters.page);
      params.set('limit', '12');

      const res = await fetch(`${API_BASE}/api/products?${params}`);
      const data = await res.json();

      const products = data.products || [];
      const total = data.total || 0;
      const pages = data.pages || 1;

      document.getElementById('resultsCount').innerHTML =
        `وجدنا <span>${total}</span> منتج`;

      if (products.length === 0) {
        grid.innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">📦</div>
            <p class="empty-text">لا توجد منتجات مطابقة للبحث</p>
          </div>`;
        document.getElementById('pagination').innerHTML = '';
        return;

                حد أدنى<br><span>${p.min_order_quantity || 1} ${p.unit || ''}</span>
              </div>
            </div>
          </div>
        </div>
      `).join('');

      // Pagination
      renderPagination(filters.page, pages);

    } catch (err) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">⚠️</div>
          <p class="empty-text">تعذّر تحميل المنتجات. تحقق من اتصالك.</p>
        </div>`;
    }
  }

  function renderPagination(current, total) {
    const pag = document.getElementById('pagination');
    if (total <= 1) { pag.innerHTML = ''; return; }

    let html = `<button class="page-btn" onclick="loadProducts(${current - 1})" ${current === 1 ? 'disabled' : ''}>→</button>`;
    for (let i = 1; i <= total; i++) {
      if (i === 1 || i === total || Math.abs(i - current) <= 1) {
        html += `<button class="page-btn ${i === current ? 'active' : ''}" onclick="loadProducts(${i})">${i}</button>`;
      } else if (Math.abs(i - current) === 2) {
        html += `<span style="color:var(--text-muted);padding:0 0.3rem;">...</span>`;
      }
    }
    html += `<button class="page-btn" onclick="loadProducts(${current + 1})" ${current === total ? 'disabled' : ''}>←</button>`;
    pag.innerHTML = html;
  }

  async function openModal(id) {
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalTitle').textContent = 'جاري التحميل...';
    document.getElementById('modalCategory').textContent = '';
    document.getElementById('modalSeller').textContent = '';
    document.getElementById('modalDesc').textContent = '';
    document.getElementById('modalImage').innerHTML = '<span style="font-size:3rem;opacity:0.3">📦</span>';
    document.getElementById('modalDetails').innerHTML = '';

    try {
      const res = await fetch(`${API_BASE}/api/products/${id}`);
      const p = await res.json();
      currentProduct = p;

      document.getElementById('modalCategory').textContent = p.category_name_ar || '';
      document.getElementById('modalTitle').textContent = p.name_ar || p.name_en || '';
      document.getElementById('modalSeller').innerHTML = `🏭 ${p.company_name_ar || ''} • ${p.seller_governorate || ''}`;
      document.getElementById('modalDesc').textContent = p.description_ar || p.description_en || 'لا يوجد وصف';
      document.getElementById('modalImage').innerHTML = '<span style="font-size:4rem">📦</span>';

      const shipping = [
        p.ship_inside ? `داخل سوريا` : null,
        p.ship_outside ? `خارج سوريا` : null,
        p.ship_international ? `دولي` : null,
      ].filter(Boolean).join(' • ') || 'غير محدد';

      document.getElementById('modalDetails').innerHTML = `
        <div class="detail-item">
          <div class="detail-label">الحد الأدنى للطلب</div>
          <div class="detail-value">${p.min_order_quantity || 1} ${p.unit || ''}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">الشحن</div>
          <div class="detail-value" style="font-size:0.82rem">${shipping}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">المحافظة</div>
          <div class="detail-value">${p.seller_governorate || '—'}</div>
        </div>
        <div class="detail-item">
          <div class="detail-label">الحالة</div>
          <div class="detail-value" style="color:var(--gold)">نشط ✓</div>
        </div>
      `;
    } catch {
      document.getElementById('modalTitle').textContent = 'تعذّر تحميل المنتج';
    }
  }

  function closeModal(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModalDirect();
  }

  function closeModalDirect() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function contactSeller() {
    if (!token) {
      window.location.href = 'login.html';
      return;
    }
    alert('سيتم إضافة نظام المراسلة قريباً');
  }

  // Load on start
  loadProducts();
</script>

</body>
</html>
