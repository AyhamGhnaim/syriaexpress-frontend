<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>سوريا إكسبريس — صفحة البائع</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #0F0E0C;
      --bg2: #1a1917;
      --bg3: #252320;
      --gold: #C9A84C;
      --gold-dim: #a68a3a;
      --text: #fff;
      --text2: #b5b0a5;
      --text3: #7a7670;
      --green: #4CAF50;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,.4);
    }

    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      direction: rtl;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--bg2);
      border-bottom: 1px solid var(--bg3);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    .header-back {
      background: none;
      border: none;
      color: var(--gold);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
    }
    .header-logo {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .header-logo img {
      height: 32px;
      width: 32px;
      object-fit: contain;
    }
    .header-logo-text {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }
    .header-logo-text span:first-child {
      font-family: 'Amiri', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.1;
    }
    .header-logo-text span:last-child {
      font-size: 8px;
      color: var(--text3);
      letter-spacing: 2px;
      font-weight: 600;
    }
    .header-spacer { width: 30px; }

    /* ===== Loading ===== */
    .loading {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .loading .spinner {
      width: 40px; height: 40px;
      border: 3px solid var(--bg3);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ===== Error ===== */
    .error-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .error-state .icon { font-size: 48px; margin-bottom: 12px; }

    /* ===== Seller Card ===== */
    .seller-card {
      margin: 20px 16px;
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--bg3);
      overflow: hidden;
    }
    .seller-top {
      padding: 24px 20px;
      text-align: center;
      border-bottom: 1px solid var(--bg3);
    }
    .seller-avatar {
      width: 72px; height: 72px;
      background: var(--bg3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      margin: 0 auto 12px;
      border: 2px solid var(--gold-dim);
      color: var(--gold);
    }
    .seller-name {
      font-family: 'Amiri', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 4px;
    }
    .seller-activity {
      font-size: 13px;
      color: var(--text2);
      margin-bottom: 8px;
    }
    .seller-badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 700;
    }
    .badge-verified {
      background: rgba(76,175,80,.15);
      color: var(--green);
    }
    .badge-gold {
      background: rgba(201,168,76,.15);
      color: var(--gold);
    }
    .badge-silver {
      background: rgba(180,180,180,.15);
      color: #bbb;
    }

    .seller-info {
      padding: 16px 20px;
    }
    .info-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg3);
      font-size: 14px;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row .icon {
      font-size: 16px;
      width: 24px;
      text-align: center;
      color: var(--gold);
    }
    .info-row .label {
      color: var(--text3);
      min-width: 80px;
    }
    .info-row .value {
      color: var(--text);
      flex: 1;
    }

    /* ===== Contact Buttons ===== */
    .contact-btns {
      display: flex;
      gap: 10px;
      padding: 0 16px 16px;
    }
    .btn-contact {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px;
      border-radius: 10px;
      border: none;
      font-family: 'Cairo', sans-serif;
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      text-decoration: none;
      transition: transform .15s, opacity .15s;
    }
    .btn-contact:active { transform: scale(.97); }
    .btn-whatsapp {
      background: #25D366;
      color: #fff;
    }
    .btn-call {
      background: var(--gold);
      color: var(--bg);
    }

    /* ===== Products Section ===== */
    .products-section {
      padding: 0 16px 24px;
    }
    .section-title {
      font-family: 'Amiri', serif;
      font-size: 20px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 14px;
    }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .filters::-webkit-scrollbar { display: none; }
    .filter-btn {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--bg3);
      background: var(--bg2);
      color: var(--text2);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .filter-btn.active {
      background: var(--gold);
      color: var(--bg);
      border-color: var(--gold);
    }

    /* Product Grid */
    .products-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }
    .product-card {
      background: var(--bg2);
      border-radius: var(--radius);
      border: 1px solid var(--bg3);
      overflow: hidden;
      cursor: pointer;
      transition: transform .2s, border-color .2s;
      text-decoration: none;
      color: inherit;
      display: block;
    }
    .product-card:active { transform: scale(.97); }
    .product-card:hover { border-color: var(--gold-dim); }
    .product-img {
      width: 100%;
      aspect-ratio: 1;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      color: var(--text3);
      overflow: hidden;
    }
    .product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .product-info {
      padding: 10px 12px;
    }
    .product-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      margin-bottom: 4px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .product-price {
      font-size: 14px;
      font-weight: 700;
      color: var(--gold);
    }
    .product-orders {
      font-size: 11px;
      color: var(--text3);
      margin-top: 2px;
    }

    .empty-products {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
      grid-column: 1 / -1;
    }
    .empty-products .icon { font-size: 40px; margin-bottom: 8px; }
  </style>
</head>
<body>

  <!-- Header -->
  <div class="header">
    <button class="header-back" onclick="history.back()">→</button>
    <div class="header-logo">
      <div class="header-logo-text">
        <span>سوريا إكسبريس</span>
        <span>B2B MARKETPLACE</span>
      </div>
      <img id="headerLogo" src="" alt="logo">
    </div>
    <div class="header-spacer"></div>
  </div>

  <!-- Content -->
  <div id="content">
    <div class="loading" id="loadingState">
      <div class="spinner"></div>
      <div>جارٍ التحميل...</div>
    </div>
  </div>

  <script src="logos.js"></script>
  <script>
    const API_BASE = 'https://syriaexpress-backend-production.up.railway.app';

    // Logo
    if (typeof LOGOS !== 'undefined' && LOGOS.main) {
      document.getElementById('headerLogo').src = LOGOS.main;
    }

    // Get seller ID from URL
    const params = new URLSearchParams(window.location.search);
    const sellerId = params.get('id');

    if (!sellerId) {
      showError('لم يتم تحديد البائع');
    } else {
      loadSeller();
    }

    async function loadSeller() {
      try {
        // Fetch seller info + products in parallel
        const [sellerRes, productsRes] = await Promise.all([
          fetch(`${API_BASE}/api/sellers/${sellerId}`),
          fetch(`${API_BASE}/api/sellers/${sellerId}/products`)
        ]);

        if (!sellerRes.ok) throw new Error('البائع غير موجود');

        const seller = await sellerRes.json();
        const products = productsRes.ok ? await productsRes.json() : [];

        renderPage(seller, products);
      } catch (err) {
        console.error(err);
        showError('تعذّر تحميل بيانات البائع');
      }
    }

    function showError(msg) {
      document.getElementById('content').innerHTML = `
        <div class="error-state">
          <div class="icon">⚠️</div>
          <div>${msg}</div>
        </div>`;
    }

    function getActivityLabel(type) {
      const map = {
        factory: 'مصنع',
        manufacturer: 'مصنع',
        distributor: 'موزّع',
        wholesaler: 'تاجر جملة',
        importer: 'مستورد'
      };
      return map[type] || type || '—';
    }

    function getTierBadge(tier) {
      if (tier === 'gold') return '<span class="seller-badge badge-gold">⭐ شريك ذهبي</span>';
      if (tier === 'silver') return '<span class="seller-badge badge-silver">🥈 شريك فضي</span>';
      return '';
    }

    function formatPhone(phone) {
      if (!phone) return null;
      // Remove spaces and normalize
      return phone.replace(/\s+/g, '');
    }

    function renderPage(seller, products) {
      const phone = formatPhone(seller.phone);
      const whatsappNum = phone ? phone.replace(/[^0-9]/g, '') : null;

      let contactHTML = '';
      if (phone) {
        contactHTML = `
          <div class="contact-btns">
            <a class="btn-contact btn-whatsapp" href="https://wa.me/${whatsappNum}" target="_blank">
              <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347z"/><path d="M12 0C5.373 0 0 5.373 0 12c0 2.14.561 4.148 1.543 5.89L0 24l6.29-1.498A11.94 11.94 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 21.75c-1.97 0-3.834-.53-5.445-1.455l-.39-.232-3.735.89.94-3.57-.258-.405A9.7 9.7 0 012.25 12c0-5.385 4.365-9.75 9.75-9.75s9.75 4.365 9.75 9.75-4.365 9.75-9.75 9.75z"/></svg>
              واتساب
            </a>
            <a class="btn-contact btn-call" href="tel:${phone}">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor"><path d="M6.62 10.79c1.44 2.83 3.76 5.14 6.59 6.59l2.2-2.2c.27-.27.67-.36 1.02-.24 1.12.37 2.33.57 3.57.57.55 0 1 .45 1 1V20c0 .55-.45 1-1 1-9.39 0-17-7.61-17-17 0-.55.45-1 1-1h3.5c.55 0 1 .45 1 1 0 1.25.2 2.45.57 3.57.11.35.03.74-.25 1.02l-2.2 2.2z"/></svg>
              اتصال
            </a>
          </div>`;
      }

      document.getElementById('content').innerHTML = `
        <!-- Seller Card -->
        <div class="seller-card">
          <div class="seller-top">
            <div class="seller-avatar">${(seller.company_name || seller.business_name || 'ب')[0]}</div>
            <div class="seller-name">${seller.company_name || seller.business_name || '—'}</div>
            <div class="seller-activity">${getActivityLabel(seller.activity_type)}</div>
            ${seller.is_verified ? '<span class="seller-badge badge-verified">✓ بائع موثّق</span>' : ''}
            ${getTierBadge(seller.partner_tier)}
          </div>
          <div class="seller-info">
            ${seller.city ? `<div class="info-row"><span class="icon">📍</span><span class="label">المحافظة</span><span class="value">${seller.city}</span></div>` : ''}
            ${seller.year_established ? `<div class="info-row"><span class="icon">📅</span><span class="label">التأسيس</span><span class="value">${seller.year_established}</span></div>` : ''}
            ${seller.activity_type ? `<div class="info-row"><span class="icon">🏭</span><span class="label">النشاط</span><span class="value">${getActivityLabel(seller.activity_type)}</span></div>` : ''}
            ${phone ? `<div class="info-row"><span class="icon">📞</span><span class="label">الاتصال</span><span class="value" dir="ltr">${seller.phone}</span></div>` : ''}
          </div>
        </div>

        <!-- Contact Buttons -->
        ${contactHTML}

        <!-- Products -->
        <div class="products-section">
          <div class="section-title">المنتجات</div>
          <div class="filters">
            <button class="filter-btn active" data-filter="all">جميع المنتجات</button>
            <button class="filter-btn" data-filter="newest">منتجات جديدة</button>
            <button class="filter-btn" data-filter="popular">الأكثر طلباً</button>
          </div>
          <div class="products-grid" id="productsGrid">
            ${renderProducts(products)}
          </div>
        </div>
      `;

      // Store products for filtering
      window._allProducts = products;

      // Filter buttons
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          applyFilter(btn.dataset.filter);
        });
      });
    }

    function applyFilter(filter) {
      let filtered = [...window._allProducts];
      if (filter === 'newest') {
        // Products from last 30 days, sorted newest first
        const thirtyDaysAgo = new Date();
        thirtyDaysAgo.setDate(thirtyDaysAgo.getDate() - 30);
        filtered = filtered
          .filter(p => new Date(p.created_at) >= thirtyDaysAgo)
          .sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
      } else if (filter === 'popular') {
        filtered = filtered.sort((a, b) => (b.order_count || 0) - (a.order_count || 0));
      }
      document.getElementById('productsGrid').innerHTML = renderProducts(filtered);
    }

    function renderProducts(products) {
      if (!products || products.length === 0) {
        return `<div class="empty-products">
          <div class="icon">📦</div>
          <div>لا توجد منتجات حالياً</div>
        </div>`;
      }

      return products.map(p => {
        const imgHTML = p.image_url
          ? `<img src="${p.image_url}" alt="${p.name}" loading="lazy">`
          : '📦';
        const price = p.price ? `${Number(p.price).toLocaleString()} ل.س` : '';
        const orders = (p.order_count && p.order_count > 0) ? `${p.order_count} طلب` : '';

        return `
          <a class="product-card" href="syriaexpress-product.html?id=${p.id}">
            <div class="product-img">${imgHTML}</div>
            <div class="product-info">
              <div class="product-name">${p.name}</div>
              ${price ? `<div class="product-price">${price}</div>` : ''}
              ${orders ? `<div class="product-orders">${orders}</div>` : ''}
            </div>
          </a>`;
      }).join('');
    }
  </script>
</body>
</html>
