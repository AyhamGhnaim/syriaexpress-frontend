<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#C9A84C">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الطلبات الواردة — سوريا إكسبريس</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700&family=Amiri:wght@400;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0E0C;
    --bg2: #1a1814;
    --bg3: #222018;
    --gold: #C9A84C;
    --gold2: #e8c96a;
    --text: #f0ece4;
    --text2: #a09880;
    --border: #2e2b24;
    --success: #4CAF50;
    --warning: #FF9800;
    --danger: #e05555;
    --info: #2196F3;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  [data-theme="light"] {
    --bg: #F5F3EF;
    --bg2: #FFFFFF;
    --bg3: #E8E4DC;
    --text: #1a1917;
    --text2: #5a5650;
    --border: #d5d0c8;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
    transition: background .3s, color .3s;
  }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid rgba(201,168,76,0.25);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
    transition: background .3s;
  }
  @media (min-width: 768px) {
    .header { padding: 14px 32px; }
  }
  .header-logo { display: flex; align-items: center; gap: 10px; text-decoration: none; }
  .header-logo img { height: 42px; width: 42px; object-fit: contain; }
  @media (min-width: 768px) {
    .header-logo img { height: 48px; width: 48px; }
  }
  .header-logo-text { text-align: center; }
  .header-logo-text .ar { font-family: 'Amiri', serif; color: var(--gold); font-size: 17px; font-weight: 700; line-height: 1.2; }
  @media (min-width: 768px) {
    .header-logo-text .ar { font-size: 20px; }
  }
  .header-logo-text .en { color: var(--text2); font-size: 9px; letter-spacing: 2px; font-weight: 600; }
  .header-spacer { width: 70px; }
  .back-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    text-decoration: none;
  }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  @media (min-width: 768px) {
    .container { max-width: 900px; padding: 24px 32px; }
  }
  @media (min-width: 1200px) {
    .container { max-width: 1100px; }
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 8px;
    text-align: center;
  }
  .stat-value { font-size: 18px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    overflow-x: auto;
    padding-bottom: 4px;
    margin-bottom: 16px;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 14px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
    font-weight: 700;
  }
  [data-theme="light"] .filter-btn.active { color: #fff; }

  /* Order Card */
  .order-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 12px;
  }
  .order-header {
    padding: 12px 14px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .order-meta { }
  .order-id { font-size: 11px; color: var(--text2); }
  .order-id span { color: var(--gold); font-weight: 700; }
  .order-date { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 4px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 700;
    white-space: nowrap;
  }
  .status-pending   { background: rgba(255,152,0,0.15); color: var(--warning); border: 1px solid rgba(255,152,0,0.3); }
  .status-confirmed { background: rgba(33,150,243,0.15); color: var(--info); border: 1px solid rgba(33,150,243,0.3); }
  .status-shipped   { background: rgba(156,39,176,0.15); color: #CE93D8; border: 1px solid rgba(156,39,176,0.3); }
  .status-delivered { background: rgba(76,175,80,0.15); color: var(--success); border: 1px solid rgba(76,175,80,0.3); }
  .status-cancelled { background: rgba(224,85,85,0.15); color: var(--danger); border: 1px solid rgba(224,85,85,0.3); }

  /* Product Info */
  .order-product {
    padding: 12px 14px;
    display: flex;
    gap: 10px;
    align-items: center;
    border-bottom: 1px solid var(--border);
  }
  .product-img {
    width: 50px; height: 50px;
    border-radius: 8px;
    object-fit: cover;
    background: var(--bg3);
    flex-shrink: 0;
  }
  .product-placeholder {
    width: 50px; height: 50px;
    border-radius: 8px;
    background: var(--bg3);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .product-info { flex: 1; }
  .product-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; }
  .product-qty { font-size: 12px; color: var(--text2); }
  .product-qty span { color: var(--gold); font-weight: 600; }
  .product-total { font-size: 13px; color: var(--gold); font-weight: 700; margin-top: 2px; }

  /* Buyer Info */
  .buyer-info {
    padding: 10px 14px;
    border-bottom: 1px solid var(--border);
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
  }
  .buyer-field { font-size: 12px; }
  .buyer-field .lbl { color: var(--text2); margin-left: 4px; }
  .buyer-field .val { font-weight: 600; }

  /* Actions */
  .order-actions {
    padding: 10px 14px;
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }
  .action-btn {
    flex: 1;
    min-width: 80px;
    padding: 8px 10px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-confirm  { background: rgba(33,150,243,0.15); color: var(--info); border: 1px solid rgba(33,150,243,0.4); }
  .btn-ship     { background: rgba(156,39,176,0.15); color: #CE93D8; border: 1px solid rgba(156,39,176,0.4); }
  .btn-deliver  { background: rgba(76,175,80,0.15); color: var(--success); border: 1px solid rgba(76,175,80,0.4); }
  .btn-cancel   { background: rgba(224,85,85,0.1); color: var(--danger); border: 1px solid rgba(224,85,85,0.3); }
  .action-btn:hover { opacity: 0.8; transform: translateY(-1px); }

  /* Notes */
  .order-notes {
    padding: 8px 14px;
    font-size: 12px;
    color: var(--text2);
    border-top: 1px solid var(--border);
  }
  .order-notes span { color: var(--text); }

  /* Loading / Empty */
  .loading-state { text-align: center; padding: 60px 20px; color: var(--text2); }
  .spinner {
    width: 36px; height: 36px;
    border: 3px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty-state { text-align: center; padding: 60px 20px; }
  .empty-icon { font-size: 48px; margin-bottom: 14px; }
  .empty-title { font-size: 17px; font-weight: 700; margin-bottom: 6px; }
  .empty-sub { font-size: 13px; color: var(--text2); }

  .error-msg {
    background: rgba(224,85,85,0.1);
    border: 1px solid var(--danger);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: var(--danger);
    margin-bottom: 12px;
    display: none;
    text-align: center;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 90px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--bg2);
    border: 1px solid var(--gold);
    color: var(--gold);
    padding: 10px 20px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 600;
    z-index: 999;
    display: none;
    white-space: nowrap;
  }

  /* Cancel Modal */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.7);
    z-index: 200;
    display: none;
    align-items: flex-end;
    justify-content: center;
  }
  .modal-overlay.show { display: flex; }
  .modal {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 20px 16px 36px;
    width: 100%;
    max-width: 600px;
  }
  .modal-title { font-size: 16px; font-weight: 700; margin-bottom: 14px; color: var(--danger); }
  .modal-input {
    width: 100%;
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    padding: 10px 12px;
    outline: none;
    direction: rtl;
    margin-bottom: 12px;
  }
  .modal-input:focus { border-color: var(--danger); }
  .modal-actions { display: flex; gap: 8px; }
  .modal-actions button {
    flex: 1;
    padding: 11px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: none;
  }
  .modal-confirm { background: var(--danger); color: #fff; }
  .modal-cancel-btn { background: var(--bg3); color: var(--text2); border: 1px solid var(--border) !important; }

  /* Bottom Nav */
  .bottom-nav {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    display: flex;
    padding: 8px 0 20px;
    z-index: 100;
  }
  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 2px;
    text-decoration: none;
    color: var(--text2);
    font-size: 10px;
    padding: 6px 0;
    transition: color 0.2s;
  }
  .nav-item:hover, .nav-item.active { color: var(--gold); }
  .nav-icon { font-size: 20px; }

  /* ── Pull to Refresh ── */
  #ptr-indicator {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg2, #1a1917);
    z-index: 9999;
    transition: height 0.1s;
    border-bottom: 1px solid var(--border, rgba(201,168,76,0.2));
  }
  #ptr-indicator.visible { height: 56px; }
  #ptr-indicator.refreshing { height: 56px; }
  .ptr-spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: ptr-spin 0.7s linear infinite;
  }
  .ptr-arrow {
    font-size: 22px;
    transition: transform 0.2s;
    color: #C9A84C;
  }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
  </style>
</head>

<div class="header">

<script>
// ===== تطبيق الثيم تلقائياً من localStorage =====

  var saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

// ===== Logo =====

<script>
const API = 'https://syriaexpress-backend.onrender.com';
let allOrders = [];
let currentFilter = 'all';
let cancelOrderId = null;

function getToken() { return localStorage.getItem('token'); }

function formatPrice(p) {
  if (!p && p !== 0) return '—';
  return Number(p).toLocaleString('ar-SY') + ' ل.س';
}

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ar-SY', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
}

function getStatusInfo(s) {
  const map = {
    pending:   { label: 'انتظار',      icon: '⏳', cls: 'status-pending' },
    confirmed: { label: 'مؤكد',        icon: '✅', cls: 'status-confirmed' },
    shipped:   { label: 'مشحون',       icon: '🚚', cls: 'status-shipped' },
    delivered: { label: 'مكتمل',       icon: '✓',  cls: 'status-delivered' },
    cancelled: { label: 'ملغي',        icon: '✕',  cls: 'status-cancelled' },
  };
  return map[s] || { label: s, icon: '•', cls: 'status-pending' };
}

function getShippingLabel(t) {
  return { inside: 'محلي', outside: 'خارج المحافظة', international: 'دولي' }[t] || t;
}

function getNextActions(status) {
  const actions = {
    pending:   [
      { label: 'تأكيد الطلب ✅', cls: 'btn-confirm', status: 'confirmed' },
      { label: 'إلغاء ✕', cls: 'btn-cancel', status: 'cancelled' }
    ],
    confirmed: [
      { label: 'تم الشحن 🚚', cls: 'btn-ship', status: 'shipped' },
      { label: 'إلغاء ✕', cls: 'btn-cancel', status: 'cancelled' }
    ],
    shipped:   [
      { label: 'تم التسليم ✓', cls: 'btn-deliver', status: 'delivered' }
    ],
  };
  return actions[status] || [];
}

function buildOrderCard(order) {
  const st = getStatusInfo(order.status);
  const actions = getNextActions(order.status);
  const total = (order.quantity || 0) * (order.price || 0) + (order.shipping_price || 0);

  return `
    <div class="order-card" id="order-${order.id}">
      <div class="order-header">
        <div class="order-meta">
          <div class="order-id">طلب <span>#${order.id.slice(0,8)}</span></div>
          <div class="order-date">${formatDate(order.created_at)}</div>
        </div>
        <div class="status-badge ${st.cls}">${st.icon} ${st.label}</div>
      </div>

      <div class="order-product">
        ${order.product_image
          ? `<img class="product-img" src="${order.product_image}" onerror="this.style.display='none'" />`
          : `<div class="product-placeholder">📦</div>`}
        <div class="product-info">
          <div class="product-name">${order.name_ar || order.name_en || 'منتج'}</div>
          <div class="product-qty">الكمية: <span>${order.quantity} ${order.unit || ''}</span> &nbsp;|&nbsp; ${getShippingLabel(order.shipping_type)}</div>
          <div class="product-total">${formatPrice(total)}</div>
        </div>
      </div>

      <div class="buyer-info">
        <div class="buyer-field"><span class="lbl">المشتري:</span><span class="val">${order.buyer_name || '—'}</span></div>
        <div class="buyer-field"><span class="lbl">الهاتف:</span><span class="val">${order.buyer_phone || '—'}</span></div>
        <div class="buyer-field"><span class="lbl">العنوان:</span><span class="val">${order.shipping_address || '—'}</span></div>
      </div>

      ${order.notes ? `
      <div class="order-notes">ملاحظة: <span>${order.notes}</span></div>
      ` : ''}

      ${actions.length ? `
      <div class="order-actions">
        ${actions.map(a => `
          <button class="action-btn ${a.cls}" onclick="updateStatus('${order.id}', '${a.status}')">
            ${a.label}
          </button>
        `).join('')}
      </div>
      ` : ''}
    </div>
  `;
}

async function loadOrders() {
  const token = getToken();
  if (!token) { window.location.href = 'login.html'; return; }

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('ordersContainer').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await fetch(`${API}/api/orders/seller`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    document.getElementById('loadingState').style.display = 'none';

    if (!res.ok) {
      showError(data.error || 'حدث خطأ');
      return;
    }

    allOrders = data;
    updateStats();
    renderOrders();

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    showError('فشل الاتصال بالخادم');
  }
}

function updateStats() {
  document.getElementById('sTotal').textContent = allOrders.length;
  document.getElementById('sPending').textContent = allOrders.filter(o => o.status === 'pending').length;
  document.getElementById('sConfirmed').textContent = allOrders.filter(o => o.status === 'confirmed').length;
  document.getElementById('sDelivered').textContent = allOrders.filter(o => o.status === 'delivered').length;
}

function renderOrders() {
  const filtered = currentFilter === 'all'
    ? allOrders
    : allOrders.filter(o => o.status === currentFilter);

  if (!filtered.length) {
    document.getElementById('ordersContainer').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('ordersContainer').innerHTML = filtered.map(buildOrderCard).join('');
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderOrders();
}

async function updateStatus(orderId, status) {
  if (status === 'cancelled') {
    cancelOrderId = orderId;
    document.getElementById('cancelReason').value = '';
    document.getElementById('cancelModal').classList.add('show');
    return;
  }

  const token = getToken();
  try {
    const res = await fetch(`${API}/api/orders/${orderId}/status`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ status })
    });

    if (res.ok) {
      showToast('تم تحديث حالة الطلب ✓');
      loadOrders();
    } else {
      const data = await res.json();
      showError(data.error || 'فشل التحديث');
    }
  } catch (err) {
    showError('فشل الاتصال بالخادم');
  }
}

async function confirmCancel() {
  const reason = document.getElementById('cancelReason').value.trim();
  const token = getToken();
  closeModal();

  try {
    const res = await fetch(`${API}/api/orders/${cancelOrderId}/status`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ status: 'cancelled', cancel_reason: reason || 'إلغاء من البائع' })
    });

    if (res.ok) {
      showToast('تم إلغاء الطلب');
      loadOrders();
    } else {
      const data = await res.json();
      showError(data.error || 'فشل الإلغاء');
    }
  } catch (err) {
    showError('فشل الاتصال بالخادم');
  }
}

function closeModal() {
  document.getElementById('cancelModal').classList.remove('show');
  cancelOrderId = null;
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

loadOrders();
</script>
<script>
  // ── Pull to Refresh (iOS PWA compatible) ──
  (function() {
    let startY = 0, currentY = 0, pulling = false;
    const threshold = 65;

    const ind = document.createElement('div');
    ind.id = 'ptr-indicator';
    ind.innerHTML = '<div class="ptr-arrow">↓</div>';
    document.body.prepend(ind);

    function getScrollTop() {
      return window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }

    document.addEventListener('touchstart', function(e) {
      if (getScrollTop() <= 0) {
        startY = e.touches[0].pageY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!pulling) return;
      currentY = e.touches[0].pageY;
      const dy = currentY - startY;
      if (dy > 8 && getScrollTop() <= 0) {
        const arrow = ind.querySelector('.ptr-arrow');
        ind.classList.add('visible');
        const progress = Math.min(dy / threshold, 1);
        if (arrow) {
          arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
          arrow.style.opacity = 0.4 + progress * 0.6;
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (!pulling) return;
      pulling = false;
      const dy = (e.changedTouches[0].pageY - startY);
      if (dy >= threshold && getScrollTop() <= 0) {
        ind.innerHTML = '<div class="ptr-spinner"></div>';
        ind.classList.add('refreshing');
        setTimeout(function() { location.reload(true); }, 400);
      } else {
        ind.classList.remove('visible');
        setTimeout(function() {
          ind.innerHTML = '<div class="ptr-arrow">↓</div>';
        }, 200);
      }
    }, { passive: true });
  })();
</script>
