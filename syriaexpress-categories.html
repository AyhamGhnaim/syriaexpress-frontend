<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#C9A84C">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوريا إكسبريس — تصفّح الفئات</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>
  // قراءة الثيم قبل الرندر (بدون وميض)
  (function() {
    var saved = localStorage.getItem('theme');
    if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
  })();
</script>
<style>
  :root {
    --bg: #0F0E0C;
    --bg2: #1A1814;
    --bg3: #242018;
    --gold: #C9A84C;
    --gold-soft: #E0C878;
    --text: #F0EBE0;
    --text-dim: #A8A294;
    --border: rgba(201, 168, 76, 0.15);
    --border-strong: rgba(201, 168, 76, 0.35);
    --success: #4ade80;
    --success-bg: rgba(74, 222, 128, 0.12);
    --warn: #fbbf24;
    --warn-bg: rgba(251, 191, 36, 0.12);
    --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
  }

  [data-theme="light"] {
    --bg: #F5F3EF;
    --bg2: #FFFFFF;
    --bg3: #E8E4DC;
    --gold: #B8962F;
    --gold-soft: #D4B24E;
    --text: #1F1C15;
    --text-dim: #6B6454;
    --border: rgba(184, 150, 47, 0.22);
    --border-strong: rgba(184, 150, 47, 0.45);
    --success: #16a34a;
    --success-bg: rgba(22, 163, 74, 0.1);
    --warn: #d97706;
    --warn-bg: rgba(217, 119, 6, 0.1);
    --shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Cairo', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding-bottom: 80px;
    transition: background 0.3s ease, color 0.3s ease;
  }

  h1, h2, h3, .display {
    font-family: 'Amiri', serif;
  }

  /* النافبار السفلي */
  .navbar {
    position: fixed;
    bottom: 0;
    left: 0;
    right: 0;
    z-index: 100;
    background: var(--bg2);
    border-top: 1px solid var(--border);
    padding: 8px 0 20px;
    box-shadow: var(--shadow);
  }

  .nav-inner {
    max-width: 1100px;
    margin: 0 auto;
    display: flex;
    justify-content: space-around;
    align-items: center;
    gap: 8px;
  }

  .nav-item {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    padding: 6px 4px;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    border-radius: 8px;
    transition: all 0.2s ease;
    min-width: 0;
  }

  .nav-item:hover { color: var(--text); background: var(--bg3); }

  .nav-item.active {
    color: var(--gold);
    background: rgba(201, 168, 76, 0.08);
  }

  .nav-icon { font-size: 20px; line-height: 1; }

  /* الهيدر الداخلي (عنوان الصفحة) */
  .page-head {
    max-width: 1100px;
    margin: 48px auto 32px;
    padding: 0 20px;
    text-align: center;
  }

  .page-head h1 {
    font-size: 42px;
    color: var(--gold);
    margin-bottom: 10px;
    letter-spacing: 0.5px;
  }

  .page-head p {
    color: var(--text-dim);
    font-size: 16px;
    font-weight: 400;
  }

  /* الفلاتر */
  .filters {
    max-width: 1100px;
    margin: 0 auto 32px;
    padding: 0 20px;
    display: flex;
    justify-content: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .filter-btn {
    background: var(--bg2);
    color: var(--text);
    border: 1.5px solid var(--border);
    padding: 10px 24px;
    border-radius: 999px;
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .filter-btn:hover {
    border-color: var(--border-strong);
    transform: translateY(-1px);
  }

  .filter-btn.active {
    background: var(--gold);
    color: #1F1C15;
    border-color: var(--gold);
    box-shadow: 0 4px 14px rgba(201, 168, 76, 0.3);
  }

  /* شبكة الفئات */
  .grid {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 20px;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
  }

  .cat-card {
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: 18px;
    padding: 28px 20px;
    text-align: center;
    text-decoration: none;
    color: inherit;
    cursor: pointer;
    transition: transform 0.25s ease, border-color 0.25s ease, box-shadow 0.25s ease;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
    position: relative;
    overflow: hidden;
  }

  .cat-card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 60%, rgba(201, 168, 76, 0.06) 100%);
    opacity: 0;
    transition: opacity 0.25s ease;
  }

  .cat-card:hover {
    transform: translateY(-4px);
    border-color: var(--border-strong);
    box-shadow: var(--shadow);
  }

  .cat-card:hover::before { opacity: 1; }

  .cat-card.coming { cursor: not-allowed; opacity: 0.75; }
  .cat-card.coming:hover { transform: none; }

  .cat-icon {
    font-size: 48px;
    line-height: 1;
    margin-top: 8px;
  }

  .cat-name {
    font-family: 'Amiri', serif;
    font-size: 22px;
    font-weight: 700;
    color: var(--text);
  }

  .cat-sub {
    font-size: 13px;
    color: var(--text-dim);
    font-weight: 400;
  }

  .badge {
    display: inline-block;
    padding: 5px 14px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    margin-top: 4px;
  }

  .badge.available {
    background: var(--success-bg);
    color: var(--success);
    border: 1px solid var(--success);
  }

  .badge.soon {
    background: var(--warn-bg);
    color: var(--warn);
    border: 1px solid var(--warn);
  }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
    grid-column: 1 / -1;
  }

  .empty-icon { font-size: 48px; margin-bottom: 12px; }

  /* التابلت */
  @media (max-width: 1000px) {
    .grid { grid-template-columns: repeat(3, 1fr); }
  }

  @media (max-width: 720px) {
    .grid { grid-template-columns: repeat(2, 1fr); gap: 14px; }
    .page-head { margin: 32px auto 24px; }
    .page-head h1 { font-size: 34px; }
    .page-head p { font-size: 14px; }
    .cat-card { padding: 22px 14px; }
    .cat-icon { font-size: 40px; }
    .cat-name { font-size: 18px; }
    .filter-btn { padding: 8px 18px; font-size: 13px; }
    .nav-item { font-size: 11px; }
    .nav-icon { font-size: 18px; }
  }

  @media (max-width: 380px) {
    .grid { grid-template-columns: 1fr; }
  }

  /* ── Pull to Refresh ── */
  #ptr-indicator {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg2, #1a1917);
    z-index: 9999;
    transition: height 0.1s;
    border-bottom: 1px solid var(--border, rgba(201,168,76,0.2));
  }
  #ptr-indicator.visible { height: 56px; }
  #ptr-indicator.refreshing { height: 56px; }
  .ptr-spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: ptr-spin 0.7s linear infinite;
  }
  .ptr-arrow {
    font-size: 22px;
    transition: transform 0.2s;
    color: #C9A84C;
  }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>


<!-- HEADER -->
<div class="header" style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;background:var(--bg2);border-bottom:2px solid var(--gold);position:sticky;top:0;z-index:50;backdrop-filter:blur(12px);">
  <div style="width:72px"></div>
  <a href="syriaexpress-landing.html" style="display:flex;align-items:center;gap:10px;text-decoration:none;">
    <div style="text-align:center;">
      <div style="font-family:'Amiri',serif;color:var(--gold);font-size:17px;line-height:1;">SyriaExpress</div>
      <div style="color:#888;font-size:9px;letter-spacing:2px;font-family:'Cairo',sans-serif;">B2B MARKETPLACE</div>
    </div>
    <img id="headerLogo" src="" alt="logo" style="display:none;height:42px;width:42px;object-fit:contain;" onerror="this.style.display='none'">
  </a>
  <div style="width:72px"></div>
</div>

<!-- النافبار السفلي -->
<nav class="navbar">
  <div class="nav-inner">
    <a href="syriaexpress-landing.html" class="nav-item">
      <span class="nav-icon">🏠</span>
      <span>الرئيسية</span>
    </a>
    <a href="syriaexpress-categories.html" class="nav-item active">
      <span class="nav-icon">📂</span>
      <span>الفئات</span>
    </a>
    <a href="syriaexpress-cart.html" class="nav-item">
      <span class="nav-icon">🛒</span>
      <span>سلّتي</span>
    </a>
    <a id="accountNavLink" href="syriaexpress-buyer.html" class="nav-item">
      <span class="nav-icon">👤</span>
      <span>حسابي</span>
    </a>
  </div>
</nav>

<!-- عنوان الصفحة -->
<header class="page-head">
  <h1>تصفّح الفئات</h1>
  <p>ابحث عن أفضل الموردين السوريين حسب الفئة</p>
</header>

<!-- الفلاتر -->
<div class="filters" id="filters">
  <button class="filter-btn active" data-filter="all">الكل</button>
  <button class="filter-btn" data-filter="available">متاح الآن</button>
  <button class="filter-btn" data-filter="soon">قريباً</button>
</div>

<!-- شبكة الفئات -->
<section class="grid" id="grid"></section>

<script>
  // ===== ACCOUNT LINK =====
  (function() {
    try {
      const token = localStorage.getItem('token');
      if (!token) return;
      const payload = JSON.parse(atob(token.split('.')[1]));
      const type = payload.user_type || payload.type || payload.role || '';
      const map = { seller: 'syriaexpress-seller.html', admin: 'syriaexpress-admin.html', buyer: 'syriaexpress-buyer.html' };
      const el = document.getElementById('accountNavLink');
      if (el) el.href = map[type] || 'syriaexpress-buyer.html';
    } catch(e) {}
  })();

  const API_BASE = 'https://syriaexpress-backend.onrender.com';

  // أيقونات افتراضية احتياطية حسب الـ id
  const ICONS = {
    'd91a982a-4943-41d2-a10d-190bdcc46dbf': '🌾',
    'dbc84456-4a45-41bb-81b1-6c55866a84ae': '🧴',
    '9cd45ecd-7b06-4908-9e96-0e3e5182372a': '🧵',
    '022f9e74-b115-4ce0-ab15-5951dab17f10': '💊',
    '4a853f88-f000-4a81-ba5a-54f6b17f666f': '📱',
    '0450b35f-331b-4b91-b7d6-0fefbe0c3299': '🧱',
    '2c2ebbf1-d69b-4808-a24b-b24e95cbb81c': '🧺',
  };

  let allCategories = [];
  let currentFilter = 'all';
  const grid = document.getElementById('grid');

  // جلب الفئات من API
  async function loadCategories() {
    try {
      const res = await fetch(`${API_BASE}/api/categories`);
      const data = await res.json();
      allCategories = (Array.isArray(data) ? data : (data.categories || [])).map(cat => ({
        ...cat,
        name:   cat.name_ar || cat.name || '—',
        icon:   cat.icon    || ICONS[cat.id] || '📦',
        status: cat.status  || 'available',
      }));
    } catch(e) {
      // fallback محلي إذا فشل الـ API
      allCategories = Object.entries(ICONS).map(([id, icon]) => ({ id, icon, name: '—', status: 'available' }));
    }
    render();
  }

  function render() {
    const filtered = allCategories.filter(cat =>
      currentFilter === 'all' || cat.status === currentFilter
    );

    if (filtered.length === 0) {
      grid.innerHTML = `
        <div class="empty">
          <div class="empty-icon">📭</div>
          <div>لا توجد فئات ضمن هذا التصنيف</div>
        </div>
      `;
      return;
    }

    grid.innerHTML = filtered.map(cat => {
      const isAvailable = cat.status === 'available';
      const href = isAvailable ? `syriaexpress-products.html?cat=${cat.id}` : 'javascript:void(0)';
      const cls  = isAvailable ? 'cat-card' : 'cat-card coming';
      const badge = isAvailable
        ? '<span class="badge available">متاح</span>'
        : '<span class="badge soon">قريباً</span>';

      return `
        <a href="${href}" class="${cls}">
          <div class="cat-icon">${cat.icon}</div>
          <div class="cat-name">${cat.name}</div>
          <div class="cat-sub">${isAvailable ? 'متاح • بائعون موثّقون' : 'قريباً'}</div>
          ${badge}
        </a>
      `;
    }).join('');
  }

  // الفلاتر
  document.getElementById('filters').addEventListener('click', (e) => {
    const btn = e.target.closest('.filter-btn');
    if (!btn) return;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    render();
  });

  // تحميل البيانات
  loadCategories();
</script>
<script>
  // ── Pull to Refresh (iOS PWA compatible) ──
  (function() {
    let startY = 0, currentY = 0, pulling = false;
    const threshold = 65;

    const ind = document.createElement('div');
    ind.id = 'ptr-indicator';
    ind.innerHTML = '<div class="ptr-arrow">↓</div>';
    document.body.prepend(ind);

    function getScrollTop() {
      return window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }

    document.addEventListener('touchstart', function(e) {
      if (getScrollTop() <= 0) {
        startY = e.touches[0].pageY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!pulling) return;
      currentY = e.touches[0].pageY;
      const dy = currentY - startY;
      if (dy > 8 && getScrollTop() <= 0) {
        const arrow = ind.querySelector('.ptr-arrow');
        ind.classList.add('visible');
        const progress = Math.min(dy / threshold, 1);
        if (arrow) {
          arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
          arrow.style.opacity = 0.4 + progress * 0.6;
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (!pulling) return;
      pulling = false;
      const dy = (e.changedTouches[0].pageY - startY);
      if (dy >= threshold && getScrollTop() <= 0) {
        ind.innerHTML = '<div class="ptr-spinner"></div>';
        ind.classList.add('refreshing');
        setTimeout(function() { location.reload(true); }, 400);
      } else {
        ind.classList.remove('visible');
        setTimeout(function() {
          ind.innerHTML = '<div class="ptr-arrow">↓</div>';
        }, 200);
      }
    }, { passive: true });
  })();
</script>
<script src="https://ayhamghnaim.github.io/syriaexpress-frontend/logos.js"></script>
<script>
if (typeof LOGOS !== 'undefined' && LOGOS.main) {
  const el = document.getElementById('headerLogo');
  if (el) { el.src = LOGOS.main; el.style.display = 'block'; }
}
</script>
</body>
</html>
