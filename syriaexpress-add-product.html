<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سوريا إكسبريس — إضافة منتج</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@300;400;600;700&display=swap" rel="stylesheet">
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>
<style>
:root {
  --bg: #0F0E0C;
  --bg2: #1a1915;
  --bg3: #252320;
  --text: #e8e0d0;
  --text2: #a89880;
  --gold: #C9A84C;
  --gold2: #e8c96a;
  --border: rgba(201,168,76,0.2);
  --border2: rgba(255,255,255,0.07);
  --shadow: rgba(0,0,0,0.4);
  --red: #e05555;
  --green: #5eaa7a;
  --radius: 10px;
}
[data-theme="light"] {
  --bg: #F5F3EF;
  --bg2: #FFFFFF;
  --bg3: #E8E4DC;
  --text: #1a1610;
  --text2: #6b5f4a;
  --border: rgba(201,168,76,0.3);
  --border2: rgba(0,0,0,0.08);
  --shadow: rgba(0,0,0,0.12);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  direction: rtl;
}

/* ===== HEADER ===== */
.header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 20px;
  height: 64px;
  background: var(--bg2);
  border-bottom: 2px solid var(--gold);
  position: sticky;
  top: 0;
  z-index: 100;
}
.back-btn {
  font-family: 'Cairo', sans-serif;
  color: var(--gold);
  text-decoration: none;
  font-size: 0.9rem;
  font-weight: 600;
  display: flex;
  align-items: center;
  gap: 6px;
  white-space: nowrap;
  transition: opacity 0.2s;
}
.back-btn:hover { opacity: 0.75; }
.header-logo {
  display: flex;
  align-items: center;
  gap: 10px;
  text-decoration: none;
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
}
.header-logo-text { text-align: center; }
.header-logo-text .ar {
  font-family: 'Amiri', serif;
  font-size: 1.15rem;
  color: var(--gold);
  line-height: 1.1;
}
.header-logo-text .en {
  font-size: 0.6rem;
  color: var(--text2);
  letter-spacing: 1.5px;
}
#headerLogo { width: 42px; height: 42px; object-fit: contain; }
.header-spacer { width: 80px; }

/* ===== MAIN ===== */
main {
  max-width: 720px;
  margin: 0 auto;
  padding: 30px 20px 60px;
}

.page-title {
  font-family: 'Amiri', serif;
  font-size: 1.7rem;
  color: var(--gold);
  text-align: center;
  margin-bottom: 6px;
}
.page-subtitle {
  text-align: center;
  color: var(--text2);
  font-size: 0.88rem;
  margin-bottom: 30px;
}

/* ===== SECTION CARDS ===== */
.section-card {
  background: var(--bg2);
  border: 1px solid var(--border2);
  border-radius: var(--radius);
  padding: 24px;
  margin-bottom: 20px;
}
.section-title {
  display: flex;
  align-items: center;
  gap: 8px;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
.section-title span { font-size: 1.1rem; }

/* ===== FORM ===== */
.form-group {
  margin-bottom: 18px;
}
.form-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
}
label {
  display: block;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 7px;
}
label .required { color: var(--red); margin-right: 3px; }

input[type="text"],
input[type="number"],
textarea,
select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 10px 14px;
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  font-size: 0.9rem;
  direction: rtl;
  transition: border-color 0.2s;
  appearance: none;
  -webkit-appearance: none;
}
input:focus, textarea:focus, select:focus {
  outline: none;
  border-color: var(--gold);
}
input::placeholder, textarea::placeholder { color: var(--text2); opacity: 0.6; }
textarea { resize: vertical; min-height: 90px; }

.char-count {
  text-align: left;
  font-size: 0.75rem;
  color: var(--text2);
  margin-top: 4px;
}

/* Select wrapper for custom arrow */
.select-wrap {
  position: relative;
}
.select-wrap::after {
  content: '▾';
  position: absolute;
  left: 12px;
  top: 50%;
  transform: translateY(-50%);
  color: var(--gold);
  pointer-events: none;
  font-size: 0.85rem;
}
.select-wrap select { padding-left: 30px; }

/* ===== SHIPPING OPTIONS ===== */
.shipping-options { display: flex; flex-direction: column; gap: 10px; }
.shipping-option {
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: var(--bg3);
  border: 1px solid var(--border2);
  border-radius: 8px;
  padding: 14px 16px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.shipping-option:has(input:checked) {
  border-color: var(--gold);
}
.ship-info { display: flex; align-items: center; gap: 10px; }
.ship-icon { font-size: 1.3rem; }
.ship-label { font-weight: 600; font-size: 0.92rem; }
.ship-desc { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }

/* Custom checkbox */
.ship-check {
  width: 20px; height: 20px;
  accent-color: var(--gold);
  cursor: pointer;
  flex-shrink: 0;
}

/* ===== IMAGE UPLOAD ===== */
.upload-zone {
  border: 2px dashed var(--border);
  border-radius: var(--radius);
  padding: 36px 20px;
  text-align: center;
  cursor: pointer;
  transition: border-color 0.2s, background 0.2s;
  position: relative;
}
.upload-zone:hover {
  border-color: var(--gold);
  background: rgba(201,168,76,0.04);
}
.upload-zone input[type="file"] {
  position: absolute; inset: 0; opacity: 0; cursor: pointer; width: 100%; height: 100%;
}
.upload-icon { font-size: 2rem; margin-bottom: 10px; }
.upload-text { font-weight: 600; margin-bottom: 4px; }
.upload-hint { font-size: 0.78rem; color: var(--text2); }
.upload-preview {
  display: none;
  margin-top: 16px;
  position: relative;
  width: fit-content;
  margin-left: auto;
  margin-right: auto;
}
.upload-preview img {
  max-height: 160px;
  border-radius: 8px;
  border: 2px solid var(--gold);
}
.remove-img {
  position: absolute;
  top: -8px;
  left: -8px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: 50%;
  width: 24px; height: 24px;
  cursor: pointer;
  font-size: 0.8rem;
  line-height: 24px;
  text-align: center;
}

/* ===== SUBMIT ===== */
.submit-btn {
  width: 100%;
  background: var(--gold);
  color: #0F0E0C;
  border: none;
  border-radius: var(--radius);
  padding: 15px;
  font-family: 'Cairo', sans-serif;
  font-size: 1rem;
  font-weight: 700;
  cursor: pointer;
  transition: background 0.2s, transform 0.1s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  margin-top: 10px;
}
.submit-btn:hover { background: var(--gold2); }
.submit-btn:active { transform: scale(0.99); }
.submit-btn:disabled { opacity: 0.55; cursor: not-allowed; }

/* ===== TOAST ===== */
.toast {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%) translateY(80px);
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--text);
  padding: 12px 24px;
  border-radius: 30px;
  font-size: 0.9rem;
  font-weight: 600;
  box-shadow: 0 8px 30px var(--shadow);
  transition: transform 0.35s ease;
  z-index: 9999;
  white-space: nowrap;
}
.toast.show { transform: translateX(-50%) translateY(0); }
.toast.success { border-color: var(--green); color: var(--green); }
.toast.error { border-color: var(--red); color: var(--red); }

/* ===== RESPONSIVE ===== */
@media (max-width: 600px) {
  .form-row { grid-template-columns: 1fr; }
  main { padding: 20px 16px 50px; }
  .section-card { padding: 18px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="syriaexpress-seller.html" class="back-btn">← لوحة البائع</a>
  <a href="syriaexpress-landing.html" class="header-logo">
    <div class="header-logo-text">
      <div class="ar">سوريا إكسبريس</div>
      <div class="en">B2B MARKETPLACE</div>
    </div>
    <img id="headerLogo" src="" alt="logo" style="display:none" onerror="this.style.display='none'">
  </a>
  <div class="header-spacer"></div>
</div>

<!-- MAIN -->
<main>
  <h1 class="page-title">إضافة منتج جديد</h1>
  <p class="page-subtitle">أضف منتجك ليظهر للمشترين على المنصة</p>

  <!-- معلومات المنتج -->
  <div class="section-card">
    <div class="section-title"><span>📦</span> معلومات المنتج</div>

    <div class="form-group">
      <label>اسم المنتج (عربي) <span class="required">*</span></label>
      <input type="text" id="nameAr" maxlength="100" placeholder="مثال: زيت زيتون بكر ممتاز" oninput="updateCount('nameAr','countAr',100)">
      <div class="char-count"><span id="countAr">0</span>/100</div>
    </div>

    <div class="form-group">
      <label>اسم المنتج (إنجليزي)</label>
      <input type="text" id="nameEn" maxlength="100" placeholder="Extra Virgin Olive Oil" oninput="updateCount('nameEn','countEn',100)">
      <div class="char-count"><span id="countEn">0</span>/100</div>
    </div>

    <div class="form-group">
      <label>الفئة <span class="required">*</span></label>
      <div class="select-wrap">
        <select id="category">
          <option value="" disabled selected>اختر الفئة</option>
        </select>
      </div>
    </div>

    <div class="form-group">
      <label>وصف المنتج</label>
      <textarea id="description" maxlength="1000" placeholder="اكتب وصفاً تفصيلياً للمنتج..." oninput="updateCount('description','countDesc',1000)"></textarea>
      <div class="char-count"><span id="countDesc">0</span>/1000</div>
    </div>
  </div>

  <!-- السعر والكمية -->
  <div class="section-card">
    <div class="section-title"><span>💰</span> السعر والكمية</div>

    <div class="form-row">
      <div class="form-group" style="margin-bottom:0">
        <label>السعر (ل.س) <span class="required">*</span></label>
        <input type="number" id="price" min="0" placeholder="0">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>الوحدة <span class="required">*</span></label>
        <div class="select-wrap">
          <select id="unit">
            <option value="كيلو">كيلو (kg)</option>
            <option value="طن">طن (ton)</option>
            <option value="قطعة">قطعة (piece)</option>
            <option value="عبوة">عبوة (pack)</option>
            <option value="متر">متر (m)</option>
            <option value="متر مربع">متر مربع (m²)</option>
            <option value="لتر">لتر (L)</option>
            <option value="صندوق">صندوق (box)</option>
            <option value="كرتون">كرتون (carton)</option>
            <option value="طقم">طقم (set)</option>
          </select>
        </div>
      </div>
    </div>

    <div class="form-row" style="margin-top:16px">
      <div class="form-group" style="margin-bottom:0">
        <label>الحد الأدنى للطلب (MOQ) <span class="required">*</span></label>
        <input type="number" id="moq" min="1" value="1">
      </div>
      <div class="form-group" style="margin-bottom:0">
        <label>الكمية المتاحة</label>
        <input type="number" id="available" min="0" value="0">
      </div>
    </div>
  </div>

  <!-- خيارات الشحن -->
  <div class="section-card">
    <div class="section-title"><span>🚚</span> خيارات الشحن</div>
    <div class="shipping-options">
      <label class="shipping-option">
        <div class="ship-info">
          <div class="ship-icon">🏙️</div>
          <div>
            <div class="ship-label">شحن محلي</div>
            <div class="ship-desc">داخل نفس المحافظة</div>
          </div>
        </div>
        <input type="checkbox" class="ship-check" id="shipLocal" checked>
      </label>
      <label class="shipping-option">
        <div class="ship-info">
          <div class="ship-icon">🗺️</div>
          <div>
            <div class="ship-label">خارج المحافظة</div>
            <div class="ship-desc">لمحافظات أخرى داخل سوريا</div>
          </div>
        </div>
        <input type="checkbox" class="ship-check" id="shipNational">
      </label>
      <label class="shipping-option">
        <div class="ship-info">
          <div class="ship-icon">✈️</div>
          <div>
            <div class="ship-label">شحن دولي</div>
            <div class="ship-desc">خارج سوريا</div>
          </div>
        </div>
        <input type="checkbox" class="ship-check" id="shipIntl">
      </label>
    </div>
  </div>

  <!-- صورة المنتج -->
  <div class="section-card">
    <div class="section-title"><span>🖼️</span> صورة المنتج</div>
    <div class="upload-zone" id="uploadZone">
      <input type="file" id="imageInput" accept="image/jpeg,image/png,image/webp" onchange="handleImageSelect(event)">
      <div class="upload-icon">📷</div>
      <div class="upload-text">اضغط لرفع صورة المنتج</div>
      <div class="upload-hint">JPG, PNG — حد أقصى 5MB</div>
    </div>
    <div class="upload-preview" id="previewWrap">
      <img id="previewImg" src="" alt="معاينة">
      <button class="remove-img" onclick="removeImage()" title="حذف الصورة">✕</button>
    </div>
  </div>

  <!-- زر الإرسال -->
  <button class="submit-btn" id="submitBtn" onclick="submitProduct()">
    <span>+</span> إضافة المنتج
  </button>
</main>

<div class="toast" id="toast"></div>

<script src="logos.js"></script>
<script>
const API = 'https://syriaexpress-backend-production.up.railway.app';
let selectedImageFile = null;

// ===== Init =====
async function init() {
  const token = localStorage.getItem('token');
  if (!token) { location.href = 'login.html'; return; }

  await loadCategories();
}

async function loadCategories() {
  const FALLBACK_CATS = [
    { id: 'd91a982a-4943-41d2-a10d-190bdcc46dbf', name: 'غذائيات' },
    { id: 'dbc84456-4a45-41bb-81b1-6c55866a84ae', name: 'كيماويات ومنظفات' },
    { id: '9cd45ecd-7b06-4908-9e96-0e3e5182372a', name: 'ألبسة' },
    { id: '4a853f88-f000-4a81-ba5a-54f6b17f666f', name: 'كهربائيات' },
    { id: '0450b35f-331b-4b91-b7d6-0fefbe0c3299', name: 'مواد بناء' },
    { id: '2c2ebbf1-d69b-4808-a24b-b24e95cbb81c', name: 'بلاستيكيات' },
    { id: '022f9e74-b115-4ce0-ab15-5951dab17f10', name: 'مستلزمات طبية' },
  ];
  const sel = document.getElementById('category');
  try {
    const token = localStorage.getItem('token');
    const res = await fetch(`${API}/api/categories`, {
      headers: token ? { 'Authorization': `Bearer ${token}` } : {}
    });
    if (!res.ok) throw new Error('not ok');
    const data = await res.json();
    // handle array or {categories:[...]} or {data:[...]}
    const list = Array.isArray(data) ? data : (data.categories || data.data || []);
    if (list.length === 0) throw new Error('empty');
    list.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    console.warn('تعذّر تحميل الفئات من الـ API، جارٍ استخدام القائمة الثابتة');
    FALLBACK_CATS.forEach(c => {
      const opt = document.createElement('option');
      opt.value = c.id;
      opt.textContent = c.name;
      sel.appendChild(opt);
    });
  }
}

// ===== Char count =====
function updateCount(inputId, countId, max) {
  const len = document.getElementById(inputId).value.length;
  document.getElementById(countId).textContent = len;
}

// ===== Image =====
function handleImageSelect(e) {
  const file = e.target.files[0];
  if (!file) return;
  if (file.size > 5 * 1024 * 1024) { showToast('حجم الصورة يتجاوز 5MB', 'error'); return; }
  selectedImageFile = file;
  const reader = new FileReader();
  reader.onload = ev => {
    document.getElementById('previewImg').src = ev.target.result;
    document.getElementById('previewWrap').style.display = 'block';
    document.getElementById('uploadZone').style.opacity = '0.5';
  };
  reader.readAsDataURL(file);
}
function removeImage() {
  selectedImageFile = null;
  document.getElementById('imageInput').value = '';
  document.getElementById('previewWrap').style.display = 'none';
  document.getElementById('uploadZone').style.opacity = '1';
}

// ===== Submit =====
async function submitProduct() {
  const token = localStorage.getItem('token');
  const nameAr = document.getElementById('nameAr').value.trim();
  const category = document.getElementById('category').value;
  const price = parseFloat(document.getElementById('price').value);
  const unit = document.getElementById('unit').value;
  const moq = parseInt(document.getElementById('moq').value) || 1;

  if (!nameAr) { showToast('يرجى إدخال اسم المنتج', 'error'); return; }
  if (!category) { showToast('يرجى اختيار الفئة', 'error'); return; }
  if (!price || price <= 0) { showToast('يرجى إدخال سعر صحيح', 'error'); return; }

  const btn = document.getElementById('submitBtn');
  btn.disabled = true;
  btn.innerHTML = '<span style="animation:spin 1s linear infinite;display:inline-block">⟳</span> جارٍ الإضافة...';

  try {
    const shipping = [];
    if (document.getElementById('shipLocal').checked) shipping.push('local');
    if (document.getElementById('shipNational').checked) shipping.push('national');
    if (document.getElementById('shipIntl').checked) shipping.push('international');

    const body = {
      name: nameAr,
      name_en: document.getElementById('nameEn').value.trim() || null,
      category_id: category,
      description: document.getElementById('description').value.trim() || null,
      price,
      unit,
      min_order_quantity: moq,
      available_quantity: parseInt(document.getElementById('available').value) || 0,
      shipping_options: shipping
    };

    const res = await fetch(`${API}/api/products`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify(body)
    });

    if (!res.ok) {
      const err = await res.json();
      throw new Error(err.message || 'فشل إضافة المنتج');
    }

    const data = await res.json();
    const productId = data.product?.id || data.id;

    // Upload image if selected
    if (selectedImageFile && productId) {
      const fd = new FormData();
      fd.append('image', selectedImageFile);
      await fetch(`${API}/api/products/${productId}/image`, {
        method: 'POST',
        headers: { 'Authorization': `Bearer ${token}` },
        body: fd
      });
    }

    showToast('تمت إضافة المنتج بنجاح ✓', 'success');
    setTimeout(() => location.href = 'syriaexpress-seller.html', 1800);

  } catch(e) {
    showToast(e.message || 'حدث خطأ ما', 'error');
    btn.disabled = false;
    btn.innerHTML = '<span>+</span> إضافة المنتج';
  }
}

// ===== Toast =====
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type;
  void t.offsetWidth;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 3000);
}

// ===== Spin animation =====
const style = document.createElement('style');
style.textContent = '@keyframes spin { to { transform: rotate(360deg); } }';
document.head.appendChild(style);

// ===== Logo =====
function applyLogo() {
  const img = document.getElementById('headerLogo');
  if (!img) return;
  // logos.js may expose the base64 directly or via a function
  if (typeof window.setSyriaExpressLogo === 'function') {
    window.setSyriaExpressLogo('headerLogo');
    img.style.display = 'inline-block';
  } else if (window.syriaExpressLogo) {
    img.src = window.syriaExpressLogo;
    img.style.display = 'inline-block';
  } else if (window.LOGOS && window.LOGOS.main) {
    img.src = window.LOGOS.main;
    img.style.display = 'inline-block';
  }
}
// Try immediately (if logos.js already ran synchronously)
applyLogo();
// Also listen for async load
document.addEventListener('logosReady', applyLogo);
window.addEventListener('load', applyLogo);

init();
</script>
</body>
</html>
