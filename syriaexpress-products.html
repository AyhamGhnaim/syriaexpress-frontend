<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المنتجات — سوريا إكسبريس</title>

<!-- قراءة الثيم قبل الرندر (يمنع وميض الأبيض) -->
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0F0E0C;
  --bg2: #1a1814;
  --bg3: #222018;
  --bg4: #2a2620;
  --gold: #C9A84C;
  --gold2: #e8c96a;
  --gold-dim: rgba(201,168,76,0.25);
  --text: #f0ece4;
  --text2: #a09880;
  --border: #2e2b24;
  --success: #4CAF50;
  --warning: #FF9800;
  --danger: #e05555;
  --info: #2196F3;
}

[data-theme="light"] {
  --bg: #F5F3EF;
  --bg2: #FFFFFF;
  --bg3: #FFFFFF;
  --bg4: #E8E4DC;
  --gold: #C9A84C;
  --gold2: #b8922e;
  --gold-dim: rgba(201,168,76,0.35);
  --text: #1a1814;
  --text2: #6b6456;
  --border: #d4cfc4;
  --success: #2e7d32;
  --warning: #e65100;
  --danger: #c62828;
  --info: #1565c0;
}

body {
  font-family: 'Cairo', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  transition: background .3s, color .3s;
  padding-bottom: 80px;
}

a { color: inherit; text-decoration: none; }
button { font-family: inherit; cursor: pointer; border: none; background: none; color: inherit; }

/* ═══════════════════ HEADER ═══════════════════ */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg2);
  border-bottom: 2px solid var(--gold);
  backdrop-filter: blur(12px);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.7rem 1rem;
  transition: background .3s, border-color .3s;
}

.back-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  padding: 0.5rem 0.9rem;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text);
  background: var(--bg3);
  transition: all .2s;
}
.back-btn:hover { border-color: var(--gold); color: var(--gold); }

.header-logo {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  flex-direction: row-reverse;
}
.header-logo img {
  width: 48px;
  height: 48px;
  object-fit: contain;
}
.header-logo-text { text-align: center; }
.header-logo-text .ar {
  font-family: 'Amiri', serif;
  font-size: 1.05rem;
  font-weight: 700;
  color: var(--gold);
  line-height: 1;
}
.header-logo-text .en {
  font-size: 0.6rem;
  letter-spacing: 2.5px;
  color: var(--text2);
  margin-top: 2px;
}
.header-spacer { width: 70px; }

/* ═══════════════════ MAIN ═══════════════════ */
main {
  max-width: 1200px;
  margin: 0 auto;
  padding: 1rem 1rem 2rem;
}

.breadcrumbs {
  display: flex;
  align-items: center;
  gap: 0.4rem;
  font-size: 0.85rem;
  color: var(--text2);
  margin-bottom: 1.2rem;
  flex-wrap: wrap;
}
.breadcrumbs a { color: var(--text2); transition: color .2s; }
.breadcrumbs a:hover { color: var(--gold); }
.breadcrumbs .sep { color: var(--border); }
.breadcrumbs .current { color: var(--gold); font-weight: 600; }

.category-header {
  display: flex;
  align-items: center;
  gap: 1rem;
  padding: 1.2rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  margin-bottom: 1.5rem;
  transition: background .3s, border-color .3s;
}
.category-icon {
  width: 64px;
  height: 64px;
  border-radius: 14px;
  background: linear-gradient(135deg, var(--gold-dim), transparent);
  border: 1px solid var(--gold-dim);
  display: grid;
  place-items: center;
  font-size: 2rem;
  flex-shrink: 0;
}
.category-info h1 {
  font-family: 'Amiri', serif;
  font-size: 1.6rem;
  color: var(--gold);
  margin-bottom: 0.2rem;
}
.category-info .count {
  font-size: 0.9rem;
  color: var(--text2);
}
.category-info .count b { color: var(--text); font-weight: 700; }

/* ═══════════════════ SEARCH ═══════════════════ */
.search-box {
  position: relative;
  margin-bottom: 1rem;
}
.search-box input {
  width: 100%;
  padding: 0.9rem 2.8rem 0.9rem 1rem;
  font-family: inherit;
  font-size: 0.95rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text);
  transition: border-color .2s, background .3s;
}
.search-box input:focus {
  outline: none;
  border-color: var(--gold);
}
.search-box input::placeholder { color: var(--text2); }
.search-box .search-icon {
  position: absolute;
  right: 1rem;
  top: 50%;
  transform: translateY(-50%);
  font-size: 1.1rem;
  color: var(--text2);
  pointer-events: none;
}

/* ═══════════════════ FILTERS ═══════════════════ */
.filters {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  margin-bottom: 1.5rem;
}
.filter-chip {
  padding: 0.5rem 1rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 999px;
  font-size: 0.85rem;
  font-weight: 600;
  color: var(--text2);
  transition: all .2s;
  white-space: nowrap;
}
.filter-chip:hover { border-color: var(--gold-dim); color: var(--text); }
.filter-chip.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #0F0E0C;
}

.results-bar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 1rem;
  font-size: 0.88rem;
  color: var(--text2);
  margin-bottom: 1rem;
  flex-wrap: wrap;
}
.results-bar b { color: var(--gold); font-weight: 700; }

/* ═══════════════════ VIEW TOGGLE ═══════════════════ */
.view-toggle {
  display: inline-flex;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 3px;
  gap: 2px;
}
.view-btn {
  display: inline-flex;
  align-items: center;
  gap: 0.35rem;
  padding: 0.45rem 0.8rem;
  font-size: 0.8rem;
  font-weight: 600;
  color: var(--text2);
  border-radius: 7px;
  transition: all .2s;
}
.view-btn:hover { color: var(--text); }
.view-btn.active {
  background: var(--gold);
  color: #0F0E0C;
}
.view-btn svg {
  width: 16px;
  height: 16px;
  stroke: currentColor;
  fill: none;
  stroke-width: 2;
}

/* ═══════════════════ LIST VIEW MODE ═══════════════════ */
.products-grid.list-view {
  grid-template-columns: 1fr !important;
  gap: 0.8rem;
}
.products-grid.list-view .product-card {
  flex-direction: row;
  align-items: stretch;
}
.products-grid.list-view .product-image {
  width: 180px;
  min-width: 180px;
  aspect-ratio: 1 / 1;
  flex-shrink: 0;
}
.products-grid.list-view .product-body {
  padding: 1rem 1.2rem;
  gap: 0.5rem;
}
.products-grid.list-view .product-name {
  font-size: 1.05rem;
  -webkit-line-clamp: 2;
}
.products-grid.list-view .product-price {
  font-size: 1.2rem;
  margin-top: 0.3rem;
}
.products-grid.list-view .product-seller { font-size: 0.85rem; }
.products-grid.list-view .product-moq { font-size: 0.82rem; }
.products-grid.list-view .product-footer { margin-top: 0.4rem; }

@media (max-width: 600px) {
  .products-grid.list-view .product-image {
    width: 120px;
    min-width: 120px;
  }
  .products-grid.list-view .product-body { padding: 0.7rem 0.85rem; }
  .products-grid.list-view .product-name { font-size: 0.9rem; }
  .products-grid.list-view .product-price { font-size: 1rem; }
}

/* ═══════════════════ PRODUCTS GRID ═══════════════════ */
.products-grid {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1rem;
}

.product-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  transition: transform .2s, border-color .2s, box-shadow .2s;
  cursor: pointer;
  animation: cardIn .4s ease-out backwards;
}
.product-card:hover {
  transform: translateY(-3px);
  border-color: var(--gold);
  box-shadow: 0 8px 24px rgba(0,0,0,0.25);
}
[data-theme="light"] .product-card:hover {
  box-shadow: 0 8px 24px rgba(0,0,0,0.1);
}

@keyframes cardIn {
  from { opacity: 0; transform: translateY(12px); }
  to { opacity: 1; transform: translateY(0); }
}

.product-image {
  width: 100%;
  aspect-ratio: 1 / 1;
  background: var(--bg3);
  display: grid;
  place-items: center;
  overflow: hidden;
  position: relative;
}
.product-image img {
  width: 100%;
  height: 100%;
  object-fit: cover;
  transition: transform .4s;
}
.product-card:hover .product-image img { transform: scale(1.05); }
.product-image .placeholder {
  font-size: 2.5rem;
  color: var(--text2);
  opacity: 0.4;
}

.tier-badge {
  position: absolute;
  top: 0.6rem;
  left: 0.6rem;
  width: 32px;
  height: 32px;
  background: rgba(15,14,12,0.85);
  border-radius: 50%;
  padding: 4px;
  backdrop-filter: blur(8px);
}
[data-theme="light"] .tier-badge { background: rgba(255,255,255,0.9); }
.tier-badge img { width: 100%; height: 100%; object-fit: contain; }

.product-body {
  padding: 0.85rem;
  display: flex;
  flex-direction: column;
  gap: 0.4rem;
  flex: 1;
}
.product-name {
  font-size: 0.95rem;
  font-weight: 700;
  color: var(--text);
  line-height: 1.3;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.product-seller {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.78rem;
  color: var(--text2);
}
.product-seller .dot {
  width: 6px;
  height: 6px;
  border-radius: 50%;
  background: var(--gold);
}
.product-price {
  font-size: 1rem;
  font-weight: 800;
  color: var(--gold);
  margin-top: 0.2rem;
}
.product-price .unit {
  font-size: 0.75rem;
  color: var(--text2);
  font-weight: 500;
  margin-right: 0.2rem;
}
.product-moq {
  font-size: 0.75rem;
  color: var(--text2);
}
.product-footer {
  margin-top: auto;
  display: flex;
  gap: 0.4rem;
  flex-wrap: wrap;
}
.tag {
  font-size: 0.7rem;
  padding: 0.25rem 0.6rem;
  border-radius: 6px;
  font-weight: 600;
}
.tag-ship-inside { background: rgba(76,175,80,0.15); color: var(--success); }
.tag-ship-outside { background: rgba(33,150,243,0.15); color: var(--info); }
.tag-ship-intl { background: rgba(201,168,76,0.15); color: var(--gold); }

/* ═══════════════════ SKELETON ═══════════════════ */
.skeleton-card {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 14px;
  overflow: hidden;
}
.skeleton {
  background: linear-gradient(90deg, var(--bg3) 0%, var(--bg4) 50%, var(--bg3) 100%);
  background-size: 200% 100%;
  animation: shimmer 1.4s infinite;
}
.skeleton-img { width: 100%; aspect-ratio: 1/1; }
.skeleton-line { height: 12px; border-radius: 4px; margin: 0.5rem 0.85rem; }
.skeleton-line.short { width: 60%; }
@keyframes shimmer {
  0% { background-position: -200% 0; }
  100% { background-position: 200% 0; }
}

/* ═══════════════════ EMPTY STATE ═══════════════════ */
.empty-state {
  grid-column: 1 / -1;
  padding: 3rem 1rem;
  text-align: center;
}
.empty-icon {
  font-size: 3.5rem;
  margin-bottom: 1rem;
  opacity: 0.5;
}
.empty-text {
  font-size: 1.1rem;
  font-weight: 700;
  color: var(--text);
  margin-bottom: 0.3rem;
}
.empty-sub {
  font-size: 0.9rem;
  color: var(--text2);
}

/* ═══════════════════ PAGINATION ═══════════════════ */
.pagination {
  display: flex;
  justify-content: center;
  gap: 0.4rem;
  margin-top: 2rem;
  flex-wrap: wrap;
}
.page-btn {
  min-width: 40px;
  height: 40px;
  padding: 0 0.8rem;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: 0.9rem;
  font-weight: 600;
  color: var(--text);
  transition: all .2s;
}
.page-btn:hover:not(:disabled) { border-color: var(--gold); color: var(--gold); }
.page-btn.active {
  background: var(--gold);
  border-color: var(--gold);
  color: #0F0E0C;
}
.page-btn:disabled { opacity: 0.4; cursor: not-allowed; }

/* ═══════════════════ BOTTOM NAV ═══════════════════ */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  padding: 0.5rem 0 calc(0.5rem + env(safe-area-inset-bottom));
  z-index: 50;
  backdrop-filter: blur(12px);
  transition: background .3s, border-color .3s;
}
.bottom-nav a {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 0.25rem;
  padding: 0.5rem;
  font-size: 0.72rem;
  color: var(--text2);
  transition: color .2s;
}
.bottom-nav a:hover, .bottom-nav a.active { color: var(--gold); }
.bottom-nav .icon { font-size: 1.3rem; }

/* ═══════════════════ RESPONSIVE ═══════════════════ */

@media (max-width: 1100px) {
  .products-grid { grid-template-columns: repeat(3, 1fr); }
  main { max-width: 900px; }
}

@media (max-width: 768px) {
  .header { padding: 0.6rem 0.8rem; }
  .header-logo img { width: 40px; height: 40px; }
  .header-logo-text .ar { font-size: 0.95rem; }
  .header-logo-text .en { font-size: 0.55rem; letter-spacing: 2px; }
  .back-btn { padding: 0.4rem 0.7rem; font-size: 0.78rem; }
  .header-spacer { width: 55px; }

  main { padding: 0.8rem 0.8rem 1.5rem; }

  .category-header { padding: 1rem; gap: 0.8rem; }
  .category-icon { width: 52px; height: 52px; font-size: 1.6rem; }
  .category-info h1 { font-size: 1.3rem; }

  .products-grid { grid-template-columns: repeat(2, 1fr); gap: 0.7rem; }
  .product-body { padding: 0.7rem; }
  .product-name { font-size: 0.85rem; }
  .product-price { font-size: 0.9rem; }
}

@media (max-width: 380px) {
  .products-grid { gap: 0.5rem; }
  .product-body { padding: 0.55rem; }
  .product-name { font-size: 0.8rem; }
}

  /* ── Pull to Refresh ── */
  #ptr-indicator {
    position: fixed;
    top: 0;
    left: 0;
    right: 0;
    height: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    background: var(--bg2, #1a1917);
    z-index: 9999;
    transition: height 0.1s;
    border-bottom: 1px solid var(--border, rgba(201,168,76,0.2));
  }
  #ptr-indicator.visible { height: 56px; }
  #ptr-indicator.refreshing { height: 56px; }
  .ptr-spinner {
    width: 22px; height: 22px;
    border: 2px solid rgba(201,168,76,0.3);
    border-top-color: #C9A84C;
    border-radius: 50%;
    animation: ptr-spin 0.7s linear infinite;
  }
  .ptr-arrow {
    font-size: 22px;
    transition: transform 0.2s;
    color: #C9A84C;
  }
  @keyframes ptr-spin { to { transform: rotate(360deg); } }
  </style>
</head>

</main>

<nav class="bottom-nav">
  <a href="syriaexpress-landing.html"><span class="icon">🏠</span><span>الرئيسية</span></a>
  <a href="syriaexpress-categories.html" class="active"><span class="icon">📂</span><span>الفئات</span></a>

<!-- ═══════════════════ SCRIPTS ═══════════════════ -->
<script src="logos.js"></script>
<script>
// ===== ACCOUNT LINK =====
(function() {
  try {
    const token = localStorage.getItem('token');
    if (!token) return;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const type = payload.user_type || payload.type || payload.role || '';
    const map = { seller: 'syriaexpress-seller.html', admin: 'syriaexpress-admin.html', buyer: 'syriaexpress-buyer.html' };
    const el = document.getElementById('accountNavLink');
    if (el) el.href = map[type] || 'syriaexpress-buyer.html';
  } catch(e) {}
})();

const API_BASE = 'https://syriaexpress-backend-production.up.railway.app';

// خريطة أيقونات الفئات
const CATEGORY_ICONS = {
  'غذائيات': '🌾',
  'كيماويات ومنظفات': '🧴',
  'مواد كيميائية و منظفات': '🧴',
  'مواد كيميائية ومنظفات': '🧴',
  'كيماويات': '🧴',
  'ألبسة': '🧵',
  'كهربائيات': '📱',
  'مواد بناء': '🧱',
  'بلاستيكيات': '🧺',
  'منتجات بلاستيكية': '🧺',
  'مستلزمات طبية': '💊',
};

// fallback by ID
const CATEGORY_ICONS_BY_ID = {
  'd91a982a-4943-41d2-a10d-190bdcc46dbf': '🌾',
  'dbc84456-4a45-41bb-81b1-6c55866a84ae': '🧴',
  '9cd45ecd-7b06-4908-9e96-0e3e5182372a': '🧵',
  '4a853f88-f000-4a81-ba5a-54f6b17f666f': '📱',
  '0450b35f-331b-4b91-b7d6-0fefbe0c3299': '🧱',
  '2c2ebbf1-d69b-4808-a24b-b24e95cbb81c': '🧺',
  '022f9e74-b115-4ce0-ab15-5951dab17f10': '💊',
};

// الحالة
let state = {
  categoryId: new URLSearchParams(location.search).get('cat') || '',
  categorySlug: '',
  categoryName: '',
  shipping: '',
  search: '',
  page: 1,
  limit: 12,
  total: 0,
  pages: 1,
  viewMode: localStorage.getItem('productsViewMode') || 'grid'
};

let searchTimer = null;

// ═══════════════════ UTILS ═══════════════════
function escapeHtml(str) {
  if (str == null) return '';
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}

function skeletonHTML(count) {
  let html = '';
  for (let i = 0; i < count; i++) {
    html += `
      <div class="skeleton-card">
        <div class="skeleton skeleton-img"></div>
        <div class="skeleton skeleton-line"></div>
        <div class="skeleton skeleton-line short"></div>
        <div class="skeleton skeleton-line short" style="margin-bottom:0.8rem"></div>
      </div>`;
  }
  return html;
}

// ═══════════════════ LOGO ═══════════════════
function initLogo() {
  const img = document.getElementById('headerLogo');
  if (typeof LOGOS !== 'undefined' && LOGOS.main && img) {
    img.src = LOGOS.main;
    img.style.display = 'block';
  }
}

// ═══════════════════ CATEGORY INFO ═══════════════════
async function loadCategoryInfo() {
  if (!state.categoryId) {
    document.getElementById('categoryName').textContent = 'جميع المنتجات';
    document.getElementById('breadcrumbCategory').textContent = 'جميع المنتجات';
    document.getElementById('categoryIcon').textContent = '📦';
    loadProducts();
    return;
  }

  try {
    const res = await fetch(`${API_BASE}/api/categories`);
    const data = await res.json();
    const cats = Array.isArray(data) ? data : (data.categories || []);
    const cat = cats.find(c => c.id === state.categoryId);

    if (cat) {
      state.categoryName = cat.name_ar || cat.name || 'الفئة';
      state.categorySlug = cat.slug || '';
      document.getElementById('categoryName').textContent = state.categoryName;
      document.getElementById('breadcrumbCategory').textContent = state.categoryName;
      document.getElementById('categoryIcon').textContent =
        CATEGORY_ICONS[state.categoryName] || CATEGORY_ICONS_BY_ID[state.categoryId] || '📦';
    } else {
      document.getElementById('categoryName').textContent = 'الفئة';
      document.getElementById('breadcrumbCategory').textContent = 'الفئة';
    }
  } catch (err) {
    console.error('خطأ في جلب الفئة:', err);
    document.getElementById('categoryName').textContent = 'الفئة';
    document.getElementById('breadcrumbCategory').textContent = 'الفئة';
  }

  // حمّل المنتجات بعد محاولة استخراج الـ slug (نجحت أم فشلت)
  loadProducts();
}

// ═══════════════════ PRODUCTS ═══════════════════
async function loadProducts() {
  const grid = document.getElementById('productsGrid');
  grid.innerHTML = skeletonHTML(8);

  try {
    const params = new URLSearchParams();
    // ملاحظة مهمة: الـ backend يحاول فلترة بـ category_slug لكن العمود غير موجود في v_products_full
    // فيرجع خطأ 500. الحل: نجيب كل المنتجات ونفلتر على الفرونت إند بـ category_id.
    if (state.shipping) params.set('shipping', state.shipping);
    if (state.search) params.set('search', state.search);
    // جيب كمية كبيرة إذا نحتاج فلترة بالفئة على الفرونت إند
    params.set('page', state.categoryId ? 1 : state.page);
    params.set('limit', state.categoryId ? 500 : state.limit);

    const res = await fetch(`${API_BASE}/api/products?${params}`);
    const data = await res.json();

    let products = data.products || data.items || (Array.isArray(data) ? data : []);

    // فلترة على الفرونت إند بالـ category_id (لأن الـ backend يفشل مع slug)
    if (state.categoryId) {
      products = products.filter(p => p.category_id === state.categoryId);
      state.total = products.length;
      state.pages = Math.max(1, Math.ceil(state.total / state.limit));
      // pagination يدوي
      const start = (state.page - 1) * state.limit;
      products = products.slice(start, start + state.limit);
    } else {
      state.total = data.total ?? products.length;
      state.pages = data.pages ?? Math.max(1, Math.ceil(state.total / state.limit));
    }

    document.getElementById('totalCount').textContent = state.total;
    document.getElementById('resultsText').innerHTML =
      `تم العثور على <b>${state.total}</b> منتج`;

    if (products.length === 0) {
      grid.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📭</div>
          <div class="empty-text">لا توجد منتجات مطابقة</div>
          <div class="empty-sub">جرّب تعديل معايير البحث أو الفلاتر</div>
        </div>`;
      document.getElementById('pagination').innerHTML = '';
      return;
    }

    grid.innerHTML = products.map((p, i) => renderProduct(p, i)).join('');
    renderPagination();

  } catch (err) {
    console.error('خطأ في تحميل المنتجات:', err);
    grid.innerHTML = `
      <div class="empty-state">
        <div class="empty-icon">⚠️</div>
        <div class="empty-text">تعذّر تحميل المنتجات</div>
        <div class="empty-sub">يُرجى المحاولة لاحقاً</div>
      </div>`;
  }
}

function pickFirst(obj, keys) {
  for (const k of keys) {
    if (k.includes('.')) {
      const parts = k.split('.');
      let v = obj;
      for (const p of parts) { v = v?.[p]; if (v == null) break; }
      if (v != null && String(v).trim() !== '') return String(v).trim();
    } else {
      const v = obj?.[k];
      if (v != null && String(v).trim() !== '') return String(v).trim();
    }
  }
  return '';
}

function renderProduct(p, i) {
  const price = p.price != null ? Number(p.price).toLocaleString('en-US') : '—';
  const unit = p.unit || 'قطعة';

  // الحد الأدنى — الاسم الصحيح بالـ DB: min_order_quantity
  const moq = p.min_order_quantity ?? p.min_order_qty ?? p.moq ?? 1;

  // اسم المنتج — الأسماء الصحيحة بالـ view: name_ar, name_en
  const productName = pickFirst(p, [
    'name_ar', 'name_en', 'name', 'product_name', 'title'
  ]) || 'بدون اسم';

  // اسم الشركة — الأسماء الصحيحة بالـ view: company_name_ar, company_name_en
  const sellerName = pickFirst(p, [
    'company_name_ar',
    'company_name_en',
    'company_name',
    'seller_company_name',
    'seller.company_name_ar',
    'seller.company_name',
    'seller_name',
    'seller.name'
  ]) || 'بائع سوري';

  const tier = p.partner_tier || p.seller?.partner_tier || p.tier;

  // badge للشركاء الذهبيين/الفضيين
  const tierKey = (tier === 'gold' || tier === 'silver') ? `${tier}_partner` : null;
  const tierBadge = (tierKey && typeof LOGOS !== 'undefined' && LOGOS[tierKey])
    ? `<div class="tier-badge"><img src="${LOGOS[tierKey]}" alt="شريك ${tier === 'gold' ? 'ذهبي' : 'فضي'}"/></div>`
    : '';

  // الصورة
  const imgSrc = pickFirst(p, ['image_url', 'image', 'photo', 'photo_url', 'images.0', 'images.0.url']);
  const imgHTML = imgSrc
    ? `<img src="${escapeHtml(imgSrc)}" alt="${escapeHtml(productName)}" loading="lazy" onerror="this.remove()">`
    : `<span class="placeholder">📦</span>`;

  // وسوم الشحن
  const shippingTags = [];
  if (p.ship_inside || p.shipping_inside) shippingTags.push('<span class="tag tag-ship-inside">محلي</span>');
  if (p.ship_outside || p.shipping_outside) shippingTags.push('<span class="tag tag-ship-outside">خارج المحافظة</span>');
  if (p.ship_international || p.shipping_international) shippingTags.push('<span class="tag tag-ship-intl">دولي</span>');

  return `
    <a class="product-card" href="syriaexpress-product.html?id=${encodeURIComponent(p.id)}"
       style="animation-delay:${i * 40}ms">
      <div class="product-image">
        ${imgHTML}
        ${tierBadge}
      </div>
      <div class="product-body">
        <div class="product-name">${escapeHtml(productName)}</div>
        <div class="product-seller"><span class="dot"></span>${escapeHtml(sellerName)}</div>
        <div class="product-price">
          ${price} <span class="unit">ل.س / ${escapeHtml(unit)}</span>
        </div>
        <div class="product-moq">الحد الأدنى: ${moq} ${escapeHtml(unit)}</div>
        ${shippingTags.length ? `<div class="product-footer">${shippingTags.join('')}</div>` : ''}
      </div>
    </a>`;
}

// ═══════════════════ PAGINATION ═══════════════════
function renderPagination() {
  const el = document.getElementById('pagination');
  if (state.pages <= 1) { el.innerHTML = ''; return; }

  let html = '';
  html += `<button class="page-btn" ${state.page === 1 ? 'disabled' : ''} onclick="changePage(${state.page - 1})">→</button>`;

  const pages = new Set([1, state.pages, state.page, state.page - 1, state.page + 1]);
  const sorted = [...pages].filter(p => p >= 1 && p <= state.pages).sort((a, b) => a - b);

  let prev = 0;
  for (const p of sorted) {
    if (p - prev > 1) html += `<span class="page-btn" style="border:none;background:none;cursor:default">…</span>`;
    html += `<button class="page-btn ${p === state.page ? 'active' : ''}" onclick="changePage(${p})">${p}</button>`;
    prev = p;
  }

  html += `<button class="page-btn" ${state.page === state.pages ? 'disabled' : ''} onclick="changePage(${state.page + 1})">←</button>`;
  el.innerHTML = html;
}

function changePage(p) {
  if (p < 1 || p > state.pages || p === state.page) return;
  state.page = p;
  loadProducts();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ═══════════════════ FILTERS & SEARCH ═══════════════════
function initFilters() {
  document.querySelectorAll('#shippingFilters .filter-chip').forEach(chip => {
    chip.addEventListener('click', () => {
      document.querySelectorAll('#shippingFilters .filter-chip').forEach(c => c.classList.remove('active'));
      chip.classList.add('active');
      state.shipping = chip.dataset.shipping;
      state.page = 1;
      loadProducts();
    });
  });

  document.getElementById('searchInput').addEventListener('input', e => {
    clearTimeout(searchTimer);
    searchTimer = setTimeout(() => {
      state.search = e.target.value.trim();
      state.page = 1;
      loadProducts();
    }, 400);
  });
}

// ═══════════════════ VIEW MODE TOGGLE ═══════════════════
function applyViewMode(mode) {
  state.viewMode = mode;
  localStorage.setItem('productsViewMode', mode);

  const grid = document.getElementById('productsGrid');
  if (mode === 'list') grid.classList.add('list-view');
  else grid.classList.remove('list-view');

  document.querySelectorAll('.view-btn').forEach(b => {
    b.classList.toggle('active', b.dataset.view === mode);
  });
}

function initViewToggle() {
  document.querySelectorAll('.view-btn').forEach(btn => {
    btn.addEventListener('click', () => applyViewMode(btn.dataset.view));
  });
  applyViewMode(state.viewMode); // تطبيق التفضيل المحفوظ
}

// ═══════════════════ INIT ═══════════════════
document.addEventListener('DOMContentLoaded', () => {
  initLogo();
  initFilters();
  initViewToggle();
  loadCategoryInfo(); // يستدعي loadProducts() بالداخل بعد ما يجيب الـ slug
});
</script>
<script>
  // ── Pull to Refresh (iOS PWA compatible) ──
  (function() {
    let startY = 0, currentY = 0, pulling = false;
    const threshold = 65;

    const ind = document.createElement('div');
    ind.id = 'ptr-indicator';
    ind.innerHTML = '<div class="ptr-arrow">↓</div>';
    document.body.prepend(ind);

    function getScrollTop() {
      return window.pageYOffset || document.documentElement.scrollTop || document.body.scrollTop || 0;
    }

    document.addEventListener('touchstart', function(e) {
      if (getScrollTop() <= 0) {
        startY = e.touches[0].pageY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', function(e) {
      if (!pulling) return;
      currentY = e.touches[0].pageY;
      const dy = currentY - startY;
      if (dy > 8 && getScrollTop() <= 0) {
        const arrow = ind.querySelector('.ptr-arrow');
        ind.classList.add('visible');
        const progress = Math.min(dy / threshold, 1);
        if (arrow) {
          arrow.style.transform = 'rotate(' + (progress * 180) + 'deg)';
          arrow.style.opacity = 0.4 + progress * 0.6;
        }
      }
    }, { passive: true });

    document.addEventListener('touchend', function(e) {
      if (!pulling) return;
      pulling = false;
      const dy = (e.changedTouches[0].pageY - startY);
      if (dy >= threshold && getScrollTop() <= 0) {
        ind.innerHTML = '<div class="ptr-spinner"></div>';
        ind.classList.add('refreshing');
        setTimeout(function() { location.reload(true); }, 400);
      } else {
        ind.classList.remove('visible');
        setTimeout(function() {
          ind.innerHTML = '<div class="ptr-arrow">↓</div>';
        }, 200);
      }
    }, { passive: true });
  })();
</script>
