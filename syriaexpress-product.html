<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تفاصيل المنتج — سوريا إكسبريس</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
<script>
(function() {
  var saved = localStorage.getItem('theme');
  if (saved === 'light') document.documentElement.setAttribute('data-theme', 'light');
})();
</script>
<style>
:root {
  --bg: #0F0E0C;
  --bg2: #1A1916;
  --bg3: #252420;
  --text: #F0EDE6;
  --text2: #A09880;
  --gold: #C9A84C;
  --gold2: #E8C96A;
  --border: rgba(201,168,76,0.18);
  --card: #1A1916;
  --shadow: 0 2px 16px rgba(0,0,0,0.4);
  --green: #2ECC71;
  --red: #E74C3C;
}
[data-theme="light"] {
  --bg: #F5F3EF;
  --bg2: #FFFFFF;
  --bg3: #E8E4DC;
  --text: #1A1816;
  --text2: #6B6050;
  --border: rgba(201,168,76,0.25);
  --card: #FFFFFF;
  --shadow: 0 2px 16px rgba(0,0,0,0.08);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Cairo', sans-serif;
  min-height: 100vh;
  padding-bottom: 80px;
}

/* ===== HEADER ===== */
.header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: var(--bg);
  border-bottom: 2px solid var(--gold);
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 10px 16px;
  gap: 8px;
}
.back-btn {
  text-decoration: none;
  color: var(--text2);
  font-size: 14px;
  border: 1px solid var(--border);
  padding: 6px 12px;
  border-radius: 8px;
  white-space: nowrap;
  transition: color 0.2s, border-color 0.2s;
}
.back-btn:hover { color: var(--gold); border-color: var(--gold); }
.header-logo {
  display: flex;
  align-items: center;
  gap: 8px;
  text-decoration: none;
  flex: 1;
  justify-content: center;
}
.header-logo-text { text-align: right; }
.header-logo-text .ar {
  font-family: 'Amiri', serif;
  color: var(--gold);
  font-size: 18px;
  line-height: 1.2;
}
.header-logo-text .en {
  color: var(--text2);
  font-size: 9px;
  letter-spacing: 1.5px;
}
#headerLogo { width: 42px; height: 42px; object-fit: contain; }
.header-cart {
  color: var(--text2);
  font-size: 22px;
  text-decoration: none;
  width: 40px;
  text-align: center;
}

/* ===== BREADCRUMB ===== */
.breadcrumb {
  padding: 10px 16px;
  font-size: 12px;
  color: var(--text2);
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.breadcrumb a { color: var(--text2); text-decoration: none; }
.breadcrumb a:hover { color: var(--gold); }
.breadcrumb span { color: var(--text2); }

/* ===== MAIN ===== */
main {
  max-width: 700px;
  margin: 0 auto;
  padding: 0 16px 16px;
}

/* ===== PRODUCT IMAGE ===== */
.product-image-wrap {
  border-radius: 14px;
  overflow: hidden;
  background: var(--bg3);
  aspect-ratio: 16/9;
  display: flex;
  align-items: center;
  justify-content: center;
  margin-bottom: 16px;
  position: relative;
}
.product-image-wrap img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.product-image-placeholder {
  font-size: 64px;
  opacity: 0.3;
}
.product-category-badge {
  position: absolute;
  top: 10px;
  right: 10px;
  background: rgba(201,168,76,0.18);
  border: 1px solid var(--gold);
  color: var(--gold);
  font-size: 11px;
  padding: 3px 10px;
  border-radius: 20px;
  backdrop-filter: blur(4px);
}

/* ===== PRODUCT INFO ===== */
.product-title {
  font-family: 'Amiri', serif;
  font-size: 28px;
  font-weight: 700;
  margin-bottom: 10px;
  line-height: 1.3;
}
.seller-row {
  display: flex;
  align-items: center;
  gap: 10px;
  margin-bottom: 16px;
}
.seller-logo {
  width: 38px;
  height: 38px;
  border-radius: 8px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 18px;
  overflow: hidden;
  flex-shrink: 0;
}
.seller-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 8px; }
.seller-name {
  font-weight: 700;
  font-size: 15px;
  color: var(--text);
}
.verified-badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  color: var(--green);
  background: rgba(46,204,113,0.1);
  border: 1px solid rgba(46,204,113,0.3);
  padding: 2px 8px;
  border-radius: 20px;
  margin-right: auto;
}

/* ===== PRICE CARD ===== */
.price-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
  margin-bottom: 16px;
}
.price-row {
  display: flex;
  align-items: baseline;
  gap: 6px;
  margin-bottom: 8px;
  justify-content: flex-end;
}
.price-amount {
  font-family: 'Amiri', serif;
  font-size: 34px;
  font-weight: 700;
  color: var(--gold);
}
.price-unit {
  color: var(--text2);
  font-size: 14px;
}
.min-order-row {
  text-align: left;
  font-size: 13px;
  color: var(--text2);
  direction: rtl;
}
.min-order-row strong { color: var(--text); }

/* ===== QUANTITY ===== */
.qty-section {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 16px;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  flex-wrap: wrap;
  gap: 10px;
}
.qty-label { font-size: 14px; color: var(--text2); }
.qty-controls {
  display: flex;
  align-items: center;
  gap: 0;
  border: 1px solid var(--border);
  border-radius: 10px;
  overflow: hidden;
}
.qty-btn {
  background: var(--bg3);
  border: none;
  color: var(--text);
  width: 38px;
  height: 38px;
  font-size: 18px;
  cursor: pointer;
  transition: background 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
}
.qty-btn:hover { background: var(--gold); color: #0F0E0C; }
.qty-display {
  width: 60px;
  text-align: center;
  font-weight: 700;
  font-size: 16px;
  background: var(--bg2);
  border: none;
  outline: none;
  color: var(--text);
  padding: 8px 4px;
  font-family: 'Cairo', sans-serif;
}
.qty-total {
  font-size: 13px;
  color: var(--text2);
  width: 100%;
  text-align: right;
}
.qty-total strong { color: var(--gold); font-size: 15px; }

/* ===== ACTIONS ===== */
.actions-row {
  display: flex;
  gap: 10px;
  margin-bottom: 20px;
}
.btn-cart {
  flex: 1;
  background: var(--gold);
  color: #0F0E0C;
  border: none;
  border-radius: 12px;
  padding: 14px 20px;
  font-family: 'Cairo', sans-serif;
  font-size: 16px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: background 0.2s, transform 0.1s;
}
.btn-cart:hover { background: var(--gold2); }
.btn-cart:active { transform: scale(0.98); }
.btn-cart.added {
  background: var(--green);
}
.btn-save {
  width: 50px;
  height: 50px;
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  color: var(--text2);
  font-size: 20px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: color 0.2s, border-color 0.2s;
  flex-shrink: 0;
}
.btn-save.saved { color: #e74c3c; border-color: #e74c3c; }
.btn-save:hover { color: var(--gold); border-color: var(--gold); }

/* ===== SECTION ===== */
.section {
  margin-bottom: 20px;
}
.section-title {
  font-size: 15px;
  font-weight: 700;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  gap: 6px;
}
.section-title::after {
  content: '';
  flex: 1;
  height: 1px;
  background: var(--border);
  margin-right: 8px;
}

/* ===== SHIPPING ===== */
.shipping-options {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
}
.ship-badge {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 8px 14px;
  font-size: 13px;
  display: flex;
  align-items: center;
  gap: 5px;
  color: var(--text);
}
.ship-badge.active {
  border-color: var(--gold);
  background: rgba(201,168,76,0.1);
  color: var(--gold);
}

/* ===== DESCRIPTION ===== */
.description-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 14px;
  font-size: 14px;
  color: var(--text2);
  line-height: 1.7;
  min-height: 60px;
}

/* ===== SELLER CARD ===== */
.seller-card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 16px;
}
.seller-card-header {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 14px;
}
.seller-card-logo {
  width: 52px;
  height: 52px;
  border-radius: 10px;
  background: var(--bg3);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 24px;
  overflow: hidden;
  flex-shrink: 0;
}
.seller-card-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 10px; }
.seller-card-info { flex: 1; }
.seller-card-name { font-weight: 700; font-size: 16px; margin-bottom: 2px; }
.seller-card-city { font-size: 12px; color: var(--text2); }
.seller-stats {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: 8px;
  margin-bottom: 14px;
}
.seller-stat {
  text-align: center;
  background: var(--bg3);
  border-radius: 8px;
  padding: 8px;
}
.seller-stat-val {
  font-weight: 700;
  font-size: 17px;
  color: var(--gold);
  font-family: 'Amiri', serif;
}
.seller-stat-lbl { font-size: 11px; color: var(--text2); }
.btn-seller-page {
  display: block;
  width: 100%;
  text-align: center;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 10px;
  color: var(--text);
  text-decoration: none;
  font-size: 13px;
  margin-bottom: 10px;
  transition: border-color 0.2s;
}
.btn-seller-page:hover { border-color: var(--gold); color: var(--gold); }
.contact-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}
.btn-call {
  background: var(--gold);
  color: #0F0E0C;
  border: none;
  border-radius: 10px;
  padding: 11px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-decoration: none;
}
.btn-whatsapp {
  background: #25D366;
  color: #fff;
  border: none;
  border-radius: 10px;
  padding: 11px;
  font-family: 'Cairo', sans-serif;
  font-size: 13px;
  font-weight: 700;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 5px;
  text-decoration: none;
}

/* ===== BOTTOM NAV ===== */
.bottom-nav {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  background: var(--bg2);
  border-top: 1px solid var(--border);
  display: flex;
  justify-content: space-around;
  align-items: center;
  padding: 8px 0 12px;
  z-index: 100;
}
.nav-item {
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 3px;
  text-decoration: none;
  color: var(--text2);
  font-size: 10px;
  transition: color 0.2s;
}
.nav-item:hover { color: var(--gold); }
.nav-item.active { color: var(--gold); }
.nav-icon { font-size: 22px; }

/* ===== LOADING ===== */
.loading-state {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 60px 20px;
  gap: 16px;
  color: var(--text2);
}
.spinner {
  width: 36px;
  height: 36px;
  border: 3px solid var(--border);
  border-top-color: var(--gold);
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

.error-state {
  text-align: center;
  padding: 60px 20px;
  color: var(--text2);
}
.error-state h3 { color: var(--red); margin-bottom: 8px; }

/* ===== RESPONSIVE ===== */
@media (min-width: 768px) {
  main { padding: 0 24px 24px; }
  .product-title { font-size: 34px; }
  .price-amount { font-size: 40px; }
  #headerLogo { width: 48px; height: 48px; }
  .header-logo-text .ar { font-size: 20px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="header">
  <a href="javascript:history.back()" class="back-btn">← رجوع</a>
  <a href="syriaexpress-landing.html" class="header-logo">
    <div class="header-logo-text">
      <div class="ar">سوريا إكسبريس</div>
      <div class="en">B2B MARKETPLACE</div>
    </div>
    <img id="headerLogo" src="" alt="logo" style="display:none" onerror="this.style.display='none'">
  </a>
  <a href="syriaexpress-cart.html" class="header-cart">🛒</a>
</div>

<!-- BREADCRUMB -->
<div class="breadcrumb" id="breadcrumb">
  <a href="syriaexpress-landing.html">الرئيسية</a>
  <span>›</span>
  <a href="syriaexpress-categories.html">الفئات</a>
  <span>›</span>
  <span id="breadCat">...</span>
  <span>›</span>
  <span id="breadProduct">...</span>
</div>

<!-- MAIN -->
<main id="mainContent">
  <div class="loading-state" id="loadingState">
    <div class="spinner"></div>
    <span>جارٍ تحميل المنتج...</span>
  </div>
</main>

<!-- BOTTOM NAV -->
<nav class="bottom-nav">
  <a href="syriaexpress-landing.html" class="nav-item">
    <span class="nav-icon">🏠</span>
    <span>الرئيسية</span>
  </a>
  <a href="syriaexpress-categories.html" class="nav-item">
    <span class="nav-icon">📦</span>
    <span>الفئات</span>
  </a>
  <a href="syriaexpress-cart.html" class="nav-item">
    <span class="nav-icon">🛒</span>
    <span>سلتي</span>
  </a>
  <a id="accountNavLink" href="syriaexpress-buyer.html" class="nav-item">
    <span class="nav-icon">👤</span>
    <span>حسابي</span>
  </a>
</nav>

<script src="https://ayhamghnaim.github.io/syriaexpress-frontend/logos.js"></script>
<script>
// ===== INIT =====
const API_BASE = 'https://syriaexpress-backend-production.up.railway.app';
const params = new URLSearchParams(location.search);
const productId = params.get('id');

// Logo injection
if (typeof LOGOS !== 'undefined' && LOGOS.main) {
  const el = document.getElementById('headerLogo');
  el.src = LOGOS.main;
  el.style.display = 'block';
}

// ===== ACCOUNT LINK =====
(function initAccountLink() {
  try {
    const token = localStorage.getItem('token');
    if (!token) return;
    const payload = JSON.parse(atob(token.split('.')[1]));
    const type = payload.user_type || payload.type || payload.role || '';
    const map = {
      seller: 'syriaexpress-seller.html',
      admin:  'syriaexpress-admin.html',
      buyer:  'syriaexpress-buyer.html'
    };
    const el = document.getElementById('accountNavLink');
    if (el) el.href = map[type] || 'syriaexpress-buyer.html';
  } catch(e) {}
})();

// State
let product = null;
let seller = null;
let quantity = 1;
let isSaved = false;
let cartCount = 0;

// ===== LOAD =====
async function loadProduct() {
  if (!productId) {
    showError('لم يتم تحديد المنتج');
    return;
  }
  try {
    const res = await fetch(`${API_BASE}/api/products/${productId}`);
    if (!res.ok) throw new Error('فشل تحميل المنتج');
    const data = await res.json();

    // Normalize field names from API response
    product = {
      id: data.id,
      seller_id: data.seller_id,
      name: data.name_ar || data.name || 'منتج',
      description: data.description_ar || data.description || '',
      price: parseFloat(data.price) || 0,
      unit: data.unit || 'وحدة',
      min_order: data.min_order_quantity || data.min_order || 1,
      image_url: data.image_url || '',
      category_name: data.category_name_ar || data.category_name || '',
      shipping_local: data.ship_inside !== false,
      shipping_national: data.ship_outside !== false,
      shipping_international: data.ship_international === true,
      status: data.status,
    };

    // Seller info is embedded in the product response
    seller = {
      id: data.seller_id,
      company_name: data.company_name_ar || data.company_name_en || 'بائع',
      city: data.seller_governorate || '',
      logo_url: data.seller_logo_url || '',
      phone: data.seller_phone || '',
      is_verified: data.seller_verified || false,
      completed_orders: data.completed_orders ?? null,
      active_products: data.active_products ?? null,
      rating: data.rating || null,
    };

    quantity = product.min_order;

    // Check saved
    const saved = JSON.parse(localStorage.getItem('savedProducts') || '[]');
    isSaved = saved.includes(productId);

    renderProduct();
  } catch(e) {
    showError(e.message);
  }
}

function showError(msg) {
  document.getElementById('mainContent').innerHTML = `
    <div class="error-state">
      <h3>⚠ خطأ</h3>
      <p>${msg}</p>
      <br>
      <a href="syriaexpress-categories.html" class="btn-seller-page" style="display:inline-block;width:auto;padding:10px 24px">العودة للفئات</a>
    </div>`;
}

function renderProduct() {
  // Breadcrumb
  document.getElementById('breadCat').textContent = product.category_name || 'الفئة';
  document.getElementById('breadProduct').textContent = product.name || '';

  const hasImg = product.image_url;
  const sellerLogoHtml = seller?.logo_url
    ? `<img src="${seller.logo_url}" alt="logo">`
    : '🏭';
  const sellerCardLogoHtml = seller?.logo_url
    ? `<img src="${seller.logo_url}" alt="logo">`
    : '🏭';
  const isVerified = seller?.is_verified;
  
  const shippingLocal = product.shipping_local !== false;
  const shippingNational = product.shipping_national !== false;
  const shippingIntl = product.shipping_international !== false;

  const totalPrice = (quantity * (product.price || 0)).toLocaleString('ar-SY');

  document.getElementById('mainContent').innerHTML = `
    <!-- IMAGE -->
    <div class="product-image-wrap">
      ${hasImg
        ? `<img src="${product.image_url}" alt="${product.name}" onerror="this.parentElement.innerHTML='<div class=\\'product-image-placeholder\\'>📦</div>'">`
        : '<div class="product-image-placeholder">📦</div>'
      }
      ${product.category_name ? `<div class="product-category-badge">${product.category_name}</div>` : ''}
    </div>

    <!-- TITLE + SELLER ROW -->
    <h1 class="product-title">${product.name || 'منتج'}</h1>
    <div class="seller-row">
      <div class="seller-logo">${sellerLogoHtml}</div>
      <span class="seller-name">${seller?.company_name || 'بائع'}</span>
      ${isVerified ? '<span class="verified-badge">✓ موثَّق</span>' : ''}
    </div>

    <!-- PRICE -->
    <div class="price-card">
      <div class="price-row">
        <span class="price-amount">${(product.price || 0).toLocaleString('ar-SY')}</span>
        <span class="price-unit">ل.س / ${product.unit || 'وحدة'}</span>
      </div>
      <div class="min-order-row">
        الحدّ الأدنى للطلب: <strong>${product.min_order || 1} ${product.unit || 'وحدة'}</strong>
      </div>
    </div>

    <!-- QUANTITY -->
    <div class="qty-section">
      <span class="qty-label">الكمية:</span>
      <div class="qty-controls">
        <button class="qty-btn" onclick="changeQty(1)">+</button>
        <input class="qty-display" id="qtyInput" type="number" value="${quantity}" min="${product.min_order || 1}" onchange="setQtyFromInput(this.value)">
        <button class="qty-btn" onclick="changeQty(-1)">−</button>
      </div>
      <div class="qty-total">الإجمالي: <strong id="qtyTotal">${totalPrice} ل.س</strong></div>
    </div>

    <!-- ACTIONS -->
    <div class="actions-row">
      <button class="btn-cart" id="cartBtn" onclick="addToCart()">
        🛒 أضف للسلة
      </button>
      <button class="btn-save ${isSaved ? 'saved' : ''}" id="saveBtn" onclick="toggleSave()">
        ${isSaved ? '❤️' : '🤍'}
      </button>
    </div>

    <!-- SHIPPING -->
    <div class="section">
      <div class="section-title">🚚 خيارات الشحن</div>
      <div class="shipping-options">
        ${shippingLocal ? '<div class="ship-badge active">🏙️ شحن محلي</div>' : ''}
        ${shippingNational ? '<div class="ship-badge active">🗺️ خارج المحافظة</div>' : ''}
        ${shippingIntl ? '<div class="ship-badge">✈️ شحن دولي</div>' : ''}
      </div>
    </div>

    <!-- DESCRIPTION -->
    <div class="section">
      <div class="section-title">📝 وصف المنتج</div>
      <div class="description-box">
        ${product.description || 'لا يوجد وصف لهذا المنتج.'}
      </div>
    </div>

    <!-- SELLER CARD -->
    ${seller ? `
    <div class="section">
      <div class="section-title">🏭 معلومات البائع</div>
      <div class="seller-card">
        <div class="seller-card-header">
          <div class="seller-card-logo">${sellerCardLogoHtml}</div>
          <div class="seller-card-info">
            <div class="seller-card-name">${seller.company_name || 'بائع'}</div>
            <div class="seller-card-city">${seller.city || ''}</div>
          </div>
          ${isVerified ? '<span class="verified-badge">✓ موثَّق</span>' : ''}
        </div>
        <div class="seller-stats">
          <div class="seller-stat">
            <div class="seller-stat-val">${seller.completed_orders ?? 0}</div>
            <div class="seller-stat-lbl">طلب منجز</div>
          </div>
          <div class="seller-stat">
            <div class="seller-stat-val">${seller.active_products ?? 0}</div>
            <div class="seller-stat-lbl">منتج نشط</div>
          </div>
          <div class="seller-stat">
            <div class="seller-stat-val">${seller.rating ? seller.rating.toFixed(1) : '—'}</div>
            <div class="seller-stat-lbl">التقييم</div>
          </div>
        </div>
        <a href="syriaexpress-seller-public.html?id=${seller.id}" class="btn-seller-page">
          زيارة صفحة البائع ←
        </a>
        <div class="contact-row">
          ${seller.phone
            ? `<a href="tel:${seller.phone}" class="btn-call">📞 اتصال</a>
               <a href="https://wa.me/${seller.phone.replace(/\D/g,'')}" target="_blank" class="btn-whatsapp">📱 واتساب</a>`
            : `<button class="btn-call" disabled style="opacity:.4;cursor:not-allowed">📞 اتصال</button>
               <button class="btn-whatsapp" disabled style="opacity:.4;cursor:not-allowed">📱 واتساب</button>`
          }
        </div>
      </div>
    </div>
    ` : ''}
  `;
}

// ===== QUANTITY =====
function changeQty(delta) {
  const min = product?.min_order || 1;
  quantity = Math.max(min, quantity + delta);
  document.getElementById('qtyInput').value = quantity;
  updateTotal();
}
function setQtyFromInput(val) {
  const min = product?.min_order || 1;
  quantity = Math.max(min, parseInt(val) || min);
  document.getElementById('qtyInput').value = quantity;
  updateTotal();
}
function updateTotal() {
  const total = (quantity * (product?.price || 0)).toLocaleString('ar-SY');
  const el = document.getElementById('qtyTotal');
  if (el) el.innerHTML = `الإجمالي: <strong>${total} ل.س</strong>`;
}

// ===== CART =====
function addToCart() {
  const cart = JSON.parse(localStorage.getItem('cart') || '[]');
  const existing = cart.find(i => i.id === productId);
  if (existing) {
    existing.quantity += quantity;
  } else {
    cart.push({
      id: productId,
      name: product.name,
      price: product.price,
      unit: product.unit,
      image_url: product.image_url,
      seller_name: seller?.company_name || '',
      min_order: product.min_order || 1,
      quantity
    });
  }
  localStorage.setItem('cart', JSON.stringify(cart));
  
  const btn = document.getElementById('cartBtn');
  if (btn) {
    btn.classList.add('added');
    btn.innerHTML = '✓ تمت الإضافة للسلة';
    setTimeout(() => {
      btn.classList.remove('added');
      btn.innerHTML = '🛒 أضف للسلة';
    }, 2000);
  }
}

// ===== SAVE =====
function toggleSave() {
  const saved = JSON.parse(localStorage.getItem('savedProducts') || '[]');
  const idx = saved.indexOf(productId);
  if (idx > -1) {
    saved.splice(idx, 1);
    isSaved = false;
  } else {
    saved.push(productId);
    isSaved = true;
  }
  localStorage.setItem('savedProducts', JSON.stringify(saved));
  const btn = document.getElementById('saveBtn');
  if (btn) {
    btn.className = `btn-save ${isSaved ? 'saved' : ''}`;
    btn.innerHTML = isSaved ? '❤️' : '🤍';
  }
}

// ===== START =====
loadProduct();
</script>
