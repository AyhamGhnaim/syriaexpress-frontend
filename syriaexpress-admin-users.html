<style>
  :root {
    --bg: #0F0E0C;
    --bg2: #1a1814;
    --bg3: #222018;
    --gold: #C9A84C;
    --gold2: #e8c96a;
    --text: #f0ece4;
    --text2: #a09880;
    --border: #2e2b24;
    --success: #4CAF50;
    --warning: #FF9800;
    --danger: #e05555;
    --info: #2196F3;
  }
  [data-theme="light"] {
    --bg: #F5F3EF;
    --bg2: #FFFFFF;
    --bg3: #E8E4DC;
    --gold: #C9A84C;
    --gold2: #b8922d;
    --text: #1a1814;
    --text2: #6b6456;
    --border: #d4cfc5;
    --success: #2e7d32;
    --warning: #e65100;
    --danger: #c62828;
    --info: #1565c0;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    min-height: 100vh;
    padding-bottom: 100px;
  }

  .header {
    background: var(--bg2);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    z-index: 100;
  }
  .header-logo { display: flex; align-items: center; gap: 8px; text-decoration: none; }
  .header-logo img { height: 36px; }
  .header-logo-text .ar { font-family: 'Amiri', serif; color: var(--gold); font-size: 16px; }
  .header-logo-text .en { color: var(--text2); font-size: 9px; letter-spacing: 2px; }
  .header-spacer { width: 60px; }
  .header-logo img { height: 42px; }
  @media (min-width: 768px) { .header-logo img { height: 48px; } }
  .back-btn {
    background: var(--bg3);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 14px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 13px;
    text-decoration: none;
  }

  .container { padding: 16px; max-width: 600px; margin: 0 auto; }
  @media (min-width: 768px) {
    .container { max-width: 900px; padding: 20px 24px; }
    .stats-row { grid-template-columns: repeat(4, 1fr); gap: 12px; }
    .user-card { margin-bottom: 12px; }
    .user-name { font-size: 15px; }
    .user-email { font-size: 12px; }
  }
  @media (min-width: 1200px) {
    .container { max-width: 1100px; }
    .stats-row { gap: 16px; }
    .stat-card { padding: 16px 12px; }
    .stat-value { font-size: 26px; }
  }

  /* Stats */
  .stats-row {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-bottom: 16px;
  }
  .stat-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 8px;
    text-align: center;
  }
  .stat-value { font-size: 22px; font-weight: 700; color: var(--gold); }
  .stat-label { font-size: 10px; color: var(--text2); margin-top: 2px; }

  /* Search */
  .search-wrap {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
  }
  .search-input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Cairo', sans-serif;
    font-size: 14px;
    outline: none;
    direction: rtl;
  }
  .search-input::placeholder { color: var(--text2); }

  /* Filters */
  .filters {
    display: flex;
    gap: 8px;
    margin-bottom: 16px;
    overflow-x: auto;
    scrollbar-width: none;
  }
  .filters::-webkit-scrollbar { display: none; }
  .filter-btn {
    flex-shrink: 0;
    background: var(--bg2);
    border: 1px solid var(--border);
    color: var(--text2);
    padding: 7px 14px;
    border-radius: 20px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    cursor: pointer;
    transition: all 0.2s;
    font-weight: 600;
  }
  .filter-btn.active {
    background: var(--gold);
    border-color: var(--gold);
    color: #000;
  }

  /* User Card */
  .user-card {
    background: var(--bg2);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    margin-bottom: 10px;
  }
  .user-main {
    padding: 12px 14px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .user-avatar {
    width: 44px; height: 44px;
    border-radius: 50%;
    background: var(--bg3);
    border: 2px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 18px;
    font-weight: 700;
    color: var(--gold);
    flex-shrink: 0;
  }
  .user-info { flex: 1; min-width: 0; }
  .user-name { font-size: 14px; font-weight: 700; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-email { font-size: 11px; color: var(--text2); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .user-meta { font-size: 11px; color: var(--text2); margin-top: 2px; }

  .type-badge {
    display: inline-flex;
    align-items: center;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
    flex-shrink: 0;
  }
  .type-buyer  { background: rgba(33,150,243,0.15); color: var(--info); border: 1px solid rgba(33,150,243,0.3); }
  .type-seller { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .type-admin  { background: rgba(224,85,85,0.15); color: var(--danger); border: 1px solid rgba(224,85,85,0.3); }

  /* Expand */
  .user-expand {
    display: none;
    padding: 0 14px 12px;
    border-top: 1px solid var(--border);
  }
  .user-expand.open { display: block; }
  .expand-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 8px;
    margin-bottom: 12px;
    padding-top: 12px;
  }
  .expand-field .lbl { font-size: 11px; color: var(--text2); margin-bottom: 2px; }
  .expand-field .val { font-size: 13px; font-weight: 600; }

  /* Seller extra */
  .seller-extra {
    background: var(--bg3);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 10px 12px;
    margin-bottom: 10px;
  }
  .seller-extra-title { font-size: 11px; color: var(--text2); margin-bottom: 8px; font-weight: 600; }
  .ver-status {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 3px 8px;
    border-radius: 10px;
    font-size: 11px;
    font-weight: 700;
  }

  /* Actions */
  .user-actions { display: flex; gap: 8px; }
  .action-btn {
    flex: 1;
    padding: 8px;
    border-radius: 8px;
    font-family: 'Cairo', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    border: none;
    transition: all 0.2s;
    text-align: center;
  }
  .btn-make-seller { background: rgba(201,168,76,0.15); color: var(--gold); border: 1px solid rgba(201,168,76,0.3); }
  .btn-make-buyer  { background: rgba(33,150,243,0.15); color: var(--info); border: 1px solid rgba(33,150,243,0.3); }
  .btn-make-admin  { background: rgba(224,85,85,0.1); color: var(--danger); border: 1px solid rgba(224,85,85,0.3); }

  .modal-overlay {
    display: none;

    inset: 0;
    background: rgba(0,0,0,0.65);
    z-index: 500;
    align-items: center;

  .expand-toggle {
    background: none;

  /* Loading / Empty */

  .nav-icon { font-size: 20px; }
    /* ── شعار التوثيق ── */

  /* ── Pull to Refresh ── */

<script>
// تحميل اللوغو من logos.js
(function() {
  function trySetLogo() {
    if (typeof LOGOS !== 'undefined' && LOGOS.main) {
      var el = document.getElementById('headerLogo');
      if (el) { el.src = LOGOS.main; el.style.display = 'inline-block'; }
    } else {
      setTimeout(trySetLogo, 100);
    }
  }
  trySetLogo();
})();

const API = 'https://syriaexpress-backend.onrender.com';
let allUsers = [];
let currentFilter = 'all';

function getToken() { return localStorage.getItem('token'); }

function formatDate(d) {
  if (!d) return '—';
  return new Date(d).toLocaleDateString('ar-SY', { year: 'numeric', month: 'short', day: 'numeric' });
}

function getTypeInfo(t) {
  const map = {
    buyer:  { label: 'مشتري', cls: 'type-buyer',  icon: '🛒' },
    seller: { label: 'بائع',  cls: 'type-seller', icon: '🏪' },
    admin:  { label: 'أدمن',  cls: 'type-admin',  icon: '⚙️' },
  };
  return map[t] || { label: t, cls: 'type-buyer', icon: '👤' };
}

function getVerLabel(s) {
  const map = {
    pending:  { label: 'انتظار',     color: 'var(--warning)' },
    approved: { label: 'موثق',       color: 'var(--success)' },
    rejected: { label: 'مرفوض',     color: 'var(--danger)' },
  };
  return map[s] || { label: s, color: 'var(--text2)' };
}

function buildCard(u) {
  const type = getTypeInfo(u.user_type);
  const initials = (u.name || u.full_name || '?').charAt(0).toUpperCase();
  const isSeller = u.user_type === 'seller';
  const ver = u.verification_status ? getVerLabel(u.verification_status) : null;

  return `
    <div class="user-card" id="user-${u.id}">
      <div class="user-main">
        <div class="user-avatar">${u.avatar_url ? `<img src="${u.avatar_url}" style="width:100%;height:100%;object-fit:cover;border-radius:50%;" onerror="this.outerHTML='${initials}'">` : initials}</div>
        <div class="user-info">
          <div class="user-name">${u.name || u.full_name || '—'}</div>
          ${u.company_name_ar ? `<div style="font-size:12px;color:var(--gold);font-weight:600;margin-top:1px">${u.company_name_ar}</div>` : ''}
          <div class="user-email">${u.email || '—'}</div>
          <div class="user-meta">انضم: ${formatDate(u.created_at)}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px">
          <div class="type-badge ${type.cls}">${type.icon} ${type.label}</div>
          ${u.user_type === 'seller' && u.verification_status === 'rejected' ? '<div class="type-badge" style="background:rgba(248,113,113,0.15);color:#f87171;border:1px solid rgba(248,113,113,0.3);font-size:10px">✕ مرفوض</div>' : ''}
          ${u.user_type === 'seller' && u.verification_status === 'pending' ? '<div class="type-badge" style="background:rgba(251,146,60,0.15);color:#fb923c;border:1px solid rgba(251,146,60,0.3);font-size:10px">⏳ قيد المراجعة</div>' : ''}
          ${u.user_type === 'seller' && (u.verification_status === 'verified' || u.verification_status === 'approved') ? verifiedBadgeHTML() : ''}
          <button class="expand-toggle" onclick="toggleExpand('${u.id}')">
            تفاصيل ▾
          </button>
        </div>
      </div>

      <div class="user-expand" id="expand-${u.id}">
        <div class="expand-grid">
          <div class="expand-field">
            <div class="lbl">الهاتف</div>
            <div class="val">${u.phone || '—'}</div>
          </div>
          <div class="expand-field">
            <div class="lbl">المحافظة</div>
            <div class="val">${u.governorate || '—'}</div>
          </div>
          <div class="expand-field">
            <div class="lbl">الحالة</div>
            <div class="val" style="color:${u.is_active === false ? 'var(--danger)' : 'var(--success)'}">
              ${u.is_active === false ? 'موقوف' : 'نشط'}
            </div>
          </div>
          <div class="expand-field">
            <div class="lbl">آخر دخول</div>
            <div class="val">${formatDate(u.last_login)}</div>
          </div>
        </div>

        ${isSeller && u.company_name_ar ? `
        <div class="seller-extra">
          <div class="seller-extra-title">معلومات الشركة</div>
          <div style="font-size:13px;font-weight:700;margin-bottom:4px">${u.company_name_ar}</div>
          <div style="font-size:12px;color:var(--text2);margin-bottom:6px">${u.activity_type || ''}</div>
          ${ver ? `<span class="ver-status" style="background:${ver.color}22;color:${ver.color};border:1px solid ${ver.color}44">${ver.label}</span>` : ''}
        </div>
        ` : ''}

        <div class="user-actions">
          ${u.user_type !== 'admin' ? `<button class="action-btn btn-make-admin" onclick="changeType('${u.id}', 'admin')">⚙️ أدمن</button>` : ''}
          ${u.user_type !== 'seller' ? `<button class="action-btn btn-make-seller" onclick="changeType('${u.id}', 'seller')">🏪 بائع</button>` : ''}
          ${u.user_type !== 'buyer' ? `<button class="action-btn btn-make-buyer" onclick="changeType('${u.id}', 'buyer')">🛒 مشتري</button>` : ''}
          <button class="action-btn" style="background:rgba(251,146,60,0.12);color:#fb923c;border:1px solid rgba(251,146,60,0.3)" onclick="toggleSuspend('${u.id}', ${u.is_active !== false})">${u.is_active === false ? '✅ تفعيل' : '⏸ توقيف'}</button>
          <button class="action-btn btn-delete" onclick="openDeleteModal('${u.id}', '${(u.name || u.full_name || '').replace(/'/g, "\\'")}')">🗑️</button>
        </div>
      </div>
    </div>
  `;
}

async function loadUsers() {
  const token = getToken();
  if (!token) { window.location.href = 'login.html'; return; }

  document.getElementById('loadingState').style.display = 'block';
  document.getElementById('usersContainer').innerHTML = '';
  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('errorMsg').style.display = 'none';

  try {
    const res = await fetch(`${API}/api/admin/users`, {
      headers: { 'Authorization': `Bearer ${token}` }
    });
    const data = await res.json();
    document.getElementById('loadingState').style.display = 'none';

    if (!res.ok) {
      showError(data.error || 'حدث خطأ — تأكد أنك مسجل كـ admin');
      return;
    }

    allUsers = Array.isArray(data) ? data : (data.users || []);
    updateStats();
    renderUsers();

  } catch (err) {
    document.getElementById('loadingState').style.display = 'none';
    showError('فشل الاتصال بالخادم');
  }
}

function updateStats() {
  document.getElementById('sTotal').textContent = allUsers.length;
  document.getElementById('sSellers').textContent = allUsers.filter(u => u.user_type === 'seller').length;
  document.getElementById('sBuyers').textContent = allUsers.filter(u => u.user_type === 'buyer').length;
  document.getElementById('sAdmins').textContent = allUsers.filter(u => u.user_type === 'admin').length;
}

function setFilter(filter, btn) {
  currentFilter = filter;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderUsers();
}

function renderUsers() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  let filtered = allUsers;
  if (currentFilter !== 'all') {
    filtered = filtered.filter(u => u.user_type === currentFilter);
  }
  if (search) {
    filtered = filtered.filter(u =>
      (u.name || '').toLowerCase().includes(search) ||
      (u.full_name || '').toLowerCase().includes(search) ||
      (u.email || '').toLowerCase().includes(search)
    );
  }

  if (!filtered.length) {
    document.getElementById('usersContainer').innerHTML = '';
    document.getElementById('emptyState').style.display = 'block';
    return;
  }

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('usersContainer').innerHTML = filtered.map(buildCard).join('');
}

function toggleExpand(id) {
  const el = document.getElementById(`expand-${id}`);
  el.classList.toggle('open');
}

async function toggleSuspend(userId, isCurrentlyActive) {
  const action = isCurrentlyActive ? 'توقيف' : 'تفعيل';
  if (!confirm(`هل تريد ${action} هذا الحساب؟`)) return;
  const token = localStorage.getItem('token');
  try {
    const res = await fetch(`${API}/api/admin/users/${userId}/status`, {
      method: 'PATCH',
      headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${token}` },
      body: JSON.stringify({ is_active: !isCurrentlyActive })
    });
    if (res.ok) {
      showToast(isCurrentlyActive ? 'تم توقيف الحساب ✓' : 'تم تفعيل الحساب ✓');
      loadUsers();
    } else {
      const data = await res.json();
      showError(data.error || 'فشل تغيير حالة الحساب');
    }
  } catch (e) {
    showError('فشل الاتصال بالخادم');
  }
}

async function changeType(userId, newType) {
  const user = allUsers.find(u => u.id === userId);
  const typeName = { buyer: 'مشتري', seller: 'بائع', admin: 'أدمن' }[newType];
  if (!confirm(`تحويل "${user?.name || user?.full_name}" إلى ${typeName}؟`)) return;

  const token = getToken();
  try {
    const res = await fetch(`${API}/api/admin/users/${userId}`, {
      method: 'PATCH',
      headers: {
        'Content-Type': 'application/json',
        'Authorization': `Bearer ${token}`
      },
      body: JSON.stringify({ user_type: newType })
    });

    if (res.ok) {
      showToast(`تم تغيير النوع إلى ${typeName} ✓`);
      loadUsers();
    } else {
      const data = await res.json();
      showError(data.error || 'فشل التغيير');
    }
  } catch (err) {
    showError('فشل الاتصال بالخادم');
  }
}

let deleteTargetId = null;

function openDeleteModal(userId, userName) {
  deleteTargetId = userId;
  document.getElementById('deleteModalName').textContent = userName || 'هذا المستخدم';
  document.getElementById('deleteConfirmBtn').disabled = false;
  document.getElementById('deleteConfirmBtn').textContent = '🗑️ حذف نهائياً';
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  deleteTargetId = null;
  document.getElementById('deleteModal').classList.remove('open');
}

async function confirmDelete() {
  if (!deleteTargetId) return;
  const btn = document.getElementById('deleteConfirmBtn');
  btn.disabled = true;
  btn.textContent = 'جارٍ الحذف...';

  const token = getToken();
  const idToDelete = deleteTargetId;
  try {
    const res = await fetch(`${API}/api/admin/users/${idToDelete}`, {
      method: 'DELETE',
      headers: { 'Authorization': `Bearer ${token}` }
    });

    closeDeleteModal();
    if (res.ok) {
      allUsers = allUsers.filter(u => u.id !== idToDelete);
      updateStats();
      renderUsers();
      showToast('تم حذف المستخدم بنجاح ✓');
    } else {
      const data = await res.json().catch(() => ({}));
      showError(data.error || 'فشل حذف المستخدم');
    }
  } catch (err) {
    closeDeleteModal();
    showError('فشل الاتصال بالخادم');
  }
}

function showError(msg) {
  const el = document.getElementById('errorMsg');
  el.textContent = msg;
  el.style.display = 'block';
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => { t.style.display = 'none'; }, 2500);
}

loadUsers();
</script>
<script>
  // ── Pull to Refresh ──
  (function() {
    let startY = 0, pulling = false, threshold = 70;
    const ind = document.createElement('div');
    ind.id = 'ptr-indicator';
    ind.innerHTML = '<div class="ptr-arrow">↓</div>';
    document.body.prepend(ind);
    const arrow = ind.querySelector('.ptr-arrow');

    document.addEventListener('touchstart', e => {
      if (window.scrollY === 0) {
        startY = e.touches[0].clientY;
        pulling = true;
      }
    }, { passive: true });

    document.addEventListener('touchmove', e => {
      if (!pulling) return;
      const dy = e.touches[0].clientY - startY;
      if (dy > 10) {
        ind.classList.add('visible');
        const progress = Math.min(dy / threshold, 1);
        arrow.style.transform = `rotate(${progress * 180}deg)`;
        arrow.style.opacity = 0.4 + progress * 0.6;
      }
    }, { passive: true });

    document.addEventListener('touchend', e => {
      if (!pulling) return;
      pulling = false;
      const dy = e.changedTouches[0].clientY - startY;
      if (dy >= threshold) {
        ind.innerHTML = '<div class="ptr-spinner"></div>';
        ind.classList.add('refreshing');
        setTimeout(() => location.reload(), 500);
      } else {
        ind.classList.remove('visible');
        setTimeout(() => { ind.innerHTML = '<div class="ptr-arrow">↓</div>'; }, 200);
      }
    }, { passive: true });
  })();
</script>
</body>
