<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <link rel="manifest" href="/manifest.json">
  <link rel="apple-touch-icon" href="/apple-touch-icon.png">
  <meta name="theme-color" content="#C9A84C">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>سوريا إكسبريس — تقارير المبيعات</title>
  <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Cairo:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    /* ===== Theme Variables ===== */
    :root {
      --bg: #0F0E0C;
      --bg2: #1a1917;
      --bg3: #252320;
      --gold: #C9A84C;
      --gold2: #e8c96a;
      --gold-dim: #a68a3a;
      --border: #2e2b24;
      --border-gold: rgba(201,168,76,0.25);
      --text: #fff;
      --text2: #b5b0a5;
      --text3: #7a7670;
      --green: #4CAF50;
      --red: #e05555;
      --blue: #60a5fa;
      --orange: #fb923c;
      --purple: #a78bfa;
      --radius: 14px;
      --shadow: 0 2px 16px rgba(0,0,0,.4);
    }

    [data-theme="light"] {
      --bg: #F5F3EF;
      --bg2: #FFFFFF;
      --bg3: #E8E4DC;
      --border: #d5d0c8;
      --text: #1a1917;
      --text2: #5a5650;
      --text3: #8a8680;
      --border-gold: rgba(201,168,76,0.35);
      --shadow: 0 2px 16px rgba(0,0,0,.08);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Cairo', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      direction: rtl;
      padding-bottom: 40px;
      transition: background .3s, color .3s;
    }

    /* ===== Header ===== */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg2);
      border-bottom: 1px solid var(--border-gold);
      position: sticky;
      top: 0;
      z-index: 100;
      transition: background .3s;
    }
    @media (min-width: 768px) {
      .header { padding: 14px 32px; }
    }

    .back-btn {
      background: var(--bg3);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 8px 14px;
      border-radius: 8px;
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      cursor: pointer;
      text-decoration: none;
      transition: background .2s;
    }
    .back-btn:hover { opacity: 0.85; }

    .header-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }
    .header-logo img {
      height: 42px;
      width: 42px;
      object-fit: contain;
    }
    @media (min-width: 768px) {
      .header-logo img { height: 48px; width: 48px; }
    }
    .header-logo-text { text-align: center; }
    .header-logo-text .ar {
      font-family: 'Amiri', serif;
      font-size: 17px;
      font-weight: 700;
      color: var(--gold);
      line-height: 1.2;
    }
    @media (min-width: 768px) {
      .header-logo-text .ar { font-size: 20px; }
    }
    .header-logo-text .en {
      font-size: 9px;
      color: var(--text3);
      letter-spacing: 2px;
      font-weight: 600;
    }
    .header-spacer { width: 70px; }

    /* ===== Page Container ===== */
    .page-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 16px;
    }
    @media (min-width: 768px) {
      .page-container { max-width: 900px; padding: 24px 32px; }
    }
    @media (min-width: 1200px) {
      .page-container { max-width: 1100px; }
    }

    /* ===== Page Title ===== */
    .page-title {
      font-family: 'Amiri', serif;
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 6px;
    }
    .page-subtitle {
      font-size: 13px;
      color: var(--text3);
      margin-bottom: 20px;
    }

    /* ===== Period Filters ===== */
    .period-filters {
      display: flex;
      gap: 8px;
      margin-bottom: 20px;
      overflow-x: auto;
      padding-bottom: 4px;
      -webkit-overflow-scrolling: touch;
    }
    .period-filters::-webkit-scrollbar { display: none; }
    .period-btn {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: var(--bg2);
      color: var(--text2);
      font-family: 'Cairo', sans-serif;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .2s;
    }
    .period-btn.active {
      background: var(--gold);
      color: #000;
      border-color: var(--gold);
    }
    [data-theme="light"] .period-btn.active { color: #fff; }

    /* ===== Stats Cards ===== */
    .stats-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 20px;
    }
    @media (min-width: 768px) {
      .stats-row { grid-template-columns: repeat(4, 1fr); gap: 14px; }
    }
    .stat-card {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 14px;
      text-align: center;
      transition: background .3s, border-color .3s;
    }
    .stat-icon { font-size: 24px; margin-bottom: 8px; }
    .stat-value {
      font-size: 22px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 2px;
      direction: ltr;
      display: inline-block;
    }
    .stat-label { font-size: 11px; color: var(--text2); }
    .stat-change {
      font-size: 11px;
      margin-top: 4px;
      font-weight: 600;
    }
    .stat-change.up { color: var(--green); }
    .stat-change.down { color: var(--red); }
    .stat-change.neutral { color: var(--text3); }

    /* ===== Section ===== */
    .section {
      background: var(--bg2);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px;
      margin-bottom: 16px;
      transition: background .3s, border-color .3s;
    }
    @media (min-width: 768px) {
      .section { padding: 20px 24px; }
    }
    .section-title {
      font-size: 15px;
      font-weight: 700;
      color: var(--gold);
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ===== Two Column Layout (Desktop) ===== */
    @media (min-width: 768px) {
      .two-col {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 16px;
      }
      .two-col .section { margin-bottom: 0; }
    }

    /* ===== Order Status Breakdown ===== */
    .status-list { display: flex; flex-direction: column; gap: 10px; }
    .status-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .status-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .status-label {
      font-size: 13px;
      color: var(--text2);
      flex: 1;
    }
    .status-count {
      font-size: 14px;
      font-weight: 700;
      color: var(--text);
      min-width: 30px;
      text-align: left;
    }
    .status-bar-wrap {
      flex: 2;
      height: 8px;
      background: var(--bg3);
      border-radius: 4px;
      overflow: hidden;
    }
    .status-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width .6s ease;
    }

    /* ===== Bar Chart ===== */
    .chart-container {
      display: flex;
      align-items: flex-end;
      gap: 6px;
      height: 160px;
      padding-top: 10px;
      direction: ltr;
    }
    @media (min-width: 768px) {
      .chart-container { height: 200px; gap: 10px; }
    }
    .chart-bar-group {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      height: 100%;
      justify-content: flex-end;
    }
    .chart-bar {
      width: 100%;
      max-width: 40px;
      background: var(--gold);
      border-radius: 4px 4px 0 0;
      transition: height .6s ease;
      min-height: 2px;
      position: relative;
    }
    .chart-bar:hover {
      background: var(--gold2);
    }
    .chart-bar-value {
      font-size: 10px;
      color: var(--text2);
      font-weight: 600;
      text-align: center;
    }
    .chart-bar-label {
      font-size: 10px;
      color: var(--text3);
      text-align: center;
      white-space: nowrap;
    }
    @media (min-width: 768px) {
      .chart-bar { max-width: 50px; }
      .chart-bar-value, .chart-bar-label { font-size: 11px; }
    }

    /* ===== Top Products ===== */
    .top-product {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 10px 0;
      border-bottom: 1px solid var(--bg3);
    }
    .top-product:last-child { border-bottom: none; }
    .top-product-rank {
      width: 28px;
      height: 28px;
      border-radius: 50%;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      flex-shrink: 0;
    }
    .top-product-rank.r1 { background: rgba(201,168,76,0.2); }
    .top-product-rank.r2 { background: rgba(180,180,180,0.15); color: #bbb; }
    .top-product-rank.r3 { background: rgba(205,127,50,0.15); color: #cd7f32; }
    .top-product-img {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      background: var(--bg3);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      color: var(--text3);
      overflow: hidden;
      flex-shrink: 0;
    }
    .top-product-img img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .top-product-info {
      flex: 1;
      min-width: 0;
    }
    .top-product-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .top-product-orders {
      font-size: 11px;
      color: var(--text3);
    }
    .top-product-revenue {
      font-size: 13px;
      font-weight: 700;
      color: var(--gold);
      white-space: nowrap;
    }

    /* ===== Empty State ===== */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text3);
    }
    .empty-state .icon { font-size: 40px; margin-bottom: 8px; }
    .empty-state .text { font-size: 14px; }

    /* ===== Loading ===== */
    .loading-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--text2);
    }
    .spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Header -->
<div class="header">
  <!-- يمين: زر رجوع -->
  <a href="syriaexpress-seller.html" class="back-btn">← رجوع</a>
  <!-- وسط: اللوغو -->
  <a href="syriaexpress-landing.html" class="header-logo">
    <div class="header-logo-text">
      <div class="ar">سوريا إكسبريس</div>
      <div class="en">B2B MARKETPLACE</div>
    </div>
    <img id="headerLogo" src="" alt="logo" style="display:none" onerror="this.style.display='none'">
  </a>
  <!-- يسار: فراغ لتوازن الترويسة -->
  <div class="header-spacer"></div>
</div>

<!-- Loading -->
<div class="loading-state" id="loadingState">
  <div class="spinner"></div>
  <div>جارٍ تحميل التقارير...</div>
</div>

<!-- Content -->
<div class="page-container" id="pageContent" style="display:none">

  <div class="page-title">📊 تقارير المبيعات</div>
  <div class="page-subtitle" id="reportPeriodLabel">—</div>

  <!-- Period Filter -->
  <div class="period-filters">
    <button class="period-btn active" data-period="month">هذا الشهر</button>
    <button class="period-btn" data-period="week">هذا الأسبوع</button>
    <button class="period-btn" data-period="quarter">آخر 3 أشهر</button>
    <button class="period-btn" data-period="year">هذا العام</button>
    <button class="period-btn" data-period="all">الكل</button>
  </div>

  <!-- Stats Row -->
  <div class="stats-row" id="statsRow">
    <div class="stat-card">
      <div class="stat-icon">💰</div>
      <div class="stat-value" id="totalRevenue">—</div>
      <div class="stat-label">إجمالي المبيعات (ل.س)</div>
      <div class="stat-change neutral" id="revenueChange"></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📦</div>
      <div class="stat-value" id="totalOrders">—</div>
      <div class="stat-label">عدد الطلبات</div>
      <div class="stat-change neutral" id="ordersChange"></div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">📈</div>
      <div class="stat-value" id="avgOrderValue">—</div>
      <div class="stat-label">متوسط قيمة الطلب</div>
    </div>
    <div class="stat-card">
      <div class="stat-icon">✅</div>
      <div class="stat-value" id="completionRate">—</div>
      <div class="stat-label">معدل الإتمام</div>
    </div>
  </div>

  <!-- Two Column: Order Status + Top Products -->
  <div class="two-col">

    <!-- Order Status Breakdown -->
    <div class="section">
      <div class="section-title">📋 حالة الطلبات</div>
      <div class="status-list" id="statusList">
        <div class="empty-state"><div class="text">لا توجد بيانات</div></div>
      </div>
    </div>

    <!-- Top Products -->
    <div class="section">
      <div class="section-title">🏆 الأكثر مبيعاً</div>
      <div id="topProducts">
        <div class="empty-state"><div class="text">لا توجد بيانات</div></div>
      </div>
    </div>

  </div>

  <!-- Monthly Chart -->
  <div class="section" style="margin-top:16px;">
    <div class="section-title">📊 المبيعات الشهرية</div>
    <div class="chart-container" id="monthlyChart">
      <div class="empty-state" style="width:100%;"><div class="text">لا توجد بيانات</div></div>
    </div>
  </div>

</div>

<script src="logos.js"></script>
<script>
// ===== تطبيق الثيم تلقائياً =====
(function() {
  const saved = localStorage.getItem('theme');
  if (saved === 'light') {
    document.documentElement.setAttribute('data-theme', 'light');
  }
})();

const API_BASE = 'https://syriaexpress-backend.onrender.com';
const token = localStorage.getItem('token');

if (!token) location.href = 'login.html';

// Logo
if (typeof LOGOS !== 'undefined' && LOGOS.main) {
  const logoEl = document.getElementById('headerLogo');
  logoEl.src = LOGOS.main;
  logoEl.style.display = 'block';
}

// ===== Data =====
let allOrders = [];
let allProducts = [];
let currentPeriod = 'month';

// ===== Arabic month names =====
const MONTHS_AR = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];

// ===== Status config =====
const STATUS_CONFIG = {
  pending:    { label: 'بانتظار الموافقة', color: '#fb923c' },
  confirmed:  { label: 'مؤكّد',           color: '#60a5fa' },
  processing: { label: 'قيد التجهيز',     color: '#a78bfa' },
  shipped:    { label: 'تم الشحن',        color: '#38bdf8' },
  delivered:  { label: 'تم التسليم',      color: '#4ade80' },
  cancelled:  { label: 'ملغى',            color: '#e05555' },
  rejected:   { label: 'مرفوض',           color: '#ef4444' }
};

// ===== Load Data =====
loadData();

async function loadData() {
  try {
    // Fetch orders
    const ordersRes = await fetch(`${API_BASE}/api/orders/seller`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (ordersRes.ok) {
      const od = await ordersRes.json();
      allOrders = od.orders || od || [];
    }

    // Fetch products
    const prodRes = await fetch(`${API_BASE}/api/products/my`, {
      headers: { 'Authorization': 'Bearer ' + token }
    });
    if (prodRes.ok) {
      const pd = await prodRes.json();
      allProducts = pd.products || pd || [];
    }

    document.getElementById('loadingState').style.display = 'none';
    document.getElementById('pageContent').style.display = 'block';

    renderReports();
    setupFilters();

  } catch(e) {
    console.error(e);
    document.getElementById('loadingState').innerHTML = `
      <div style="font-size:40px;margin-bottom:12px;">⚠️</div>
      <div>تعذّر تحميل البيانات</div>`;
  }
}

// ===== Period Filter =====
function setupFilters() {
  document.querySelectorAll('.period-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentPeriod = btn.dataset.period;
      renderReports();
    });
  });
}

// ===== Filter orders by period =====
function filterByPeriod(orders, period) {
  const now = new Date();
  let start;

  switch(period) {
    case 'week':
      start = new Date(now);
      start.setDate(start.getDate() - 7);
      break;
    case 'month':
      start = new Date(now.getFullYear(), now.getMonth(), 1);
      break;
    case 'quarter':
      start = new Date(now);
      start.setMonth(start.getMonth() - 3);
      break;
    case 'year':
      start = new Date(now.getFullYear(), 0, 1);
      break;
    case 'all':
    default:
      return orders;
  }

  return orders.filter(o => new Date(o.created_at) >= start);
}

function getPeriodLabel(period) {
  const now = new Date();
  switch(period) {
    case 'week':    return 'آخر 7 أيام';
    case 'month':   return MONTHS_AR[now.getMonth()] + ' ' + now.getFullYear();
    case 'quarter': return 'آخر 3 أشهر';
    case 'year':    return 'عام ' + now.getFullYear();
    case 'all':     return 'جميع الفترات';
    default:        return '';
  }
}

// ===== Render All Reports =====
function renderReports() {
  const filtered = filterByPeriod(allOrders, currentPeriod);
  document.getElementById('reportPeriodLabel').textContent = getPeriodLabel(currentPeriod);

  renderStats(filtered);
  renderStatusBreakdown(filtered);
  renderTopProducts(filtered);
  renderMonthlyChart();
}

// ===== 1. Stats Cards =====
function renderStats(orders) {
  const totalRevenue = orders.reduce((sum, o) => sum + (parseFloat(o.total_amount || ((o.quantity||0)*(o.price||0)) + (o.shipping_price||0) || 0)), 0);
  const totalOrders = orders.length;
  const delivered = orders.filter(o => o.status === 'delivered').length;
  const completionRate = totalOrders > 0 ? Math.round((delivered / totalOrders) * 100) : 0;
  const avgValue = totalOrders > 0 ? Math.round(totalRevenue / totalOrders) : 0;

  document.getElementById('totalRevenue').textContent = totalRevenue > 0 ? Number(totalRevenue).toLocaleString() : '0';
  document.getElementById('totalOrders').textContent = totalOrders;
  document.getElementById('avgOrderValue').textContent = avgValue > 0 ? Number(avgValue).toLocaleString() : '0';
  document.getElementById('completionRate').textContent = completionRate + '%';

  // Compare with previous period
  const prevOrders = getPreviousPeriodOrders();
  if (prevOrders !== null) {
    const prevRevenue = prevOrders.reduce((sum, o) => sum + (parseFloat(o.total_amount || o.total || 0)), 0);
    const prevCount = prevOrders.length;

    renderChange('revenueChange', totalRevenue, prevRevenue);
    renderChange('ordersChange', totalOrders, prevCount);
  }
}

function getPreviousPeriodOrders() {
  const now = new Date();
  let prevStart, prevEnd;

  switch(currentPeriod) {
    case 'month':
      prevStart = new Date(now.getFullYear(), now.getMonth() - 1, 1);
      prevEnd = new Date(now.getFullYear(), now.getMonth(), 0);
      break;
    case 'week':
      prevEnd = new Date(now);
      prevEnd.setDate(prevEnd.getDate() - 7);
      prevStart = new Date(prevEnd);
      prevStart.setDate(prevStart.getDate() - 7);
      break;
    case 'quarter':
      prevEnd = new Date(now);
      prevEnd.setMonth(prevEnd.getMonth() - 3);
      prevStart = new Date(prevEnd);
      prevStart.setMonth(prevStart.getMonth() - 3);
      break;
    default:
      return null;
  }

  return allOrders.filter(o => {
    const d = new Date(o.created_at);
    return d >= prevStart && d <= prevEnd;
  });
}

function renderChange(elementId, current, previous) {
  const el = document.getElementById(elementId);
  if (!el || previous === 0) {
    if (el) el.textContent = '';
    return;
  }

  const pct = Math.round(((current - previous) / previous) * 100);
  if (pct > 0) {
    el.className = 'stat-change up';
    el.textContent = `▲ ${pct}% عن الفترة السابقة`;
  } else if (pct < 0) {
    el.className = 'stat-change down';
    el.textContent = `▼ ${Math.abs(pct)}% عن الفترة السابقة`;
  } else {
    el.className = 'stat-change neutral';
    el.textContent = 'بلا تغيير';
  }
}

// ===== 2. Order Status Breakdown =====
function renderStatusBreakdown(orders) {
  const container = document.getElementById('statusList');

  if (!orders.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">📋</div><div class="text">لا توجد طلبات في هذه الفترة</div></div>';
    return;
  }

  // Count by status
  const counts = {};
  orders.forEach(o => {
    const s = o.status || 'pending';
    counts[s] = (counts[s] || 0) + 1;
  });

  const total = orders.length;

  container.innerHTML = Object.entries(counts)
    .sort((a, b) => b[1] - a[1])
    .map(([status, count]) => {
      const cfg = STATUS_CONFIG[status] || { label: status, color: '#888' };
      const pct = Math.round((count / total) * 100);
      return `
        <div class="status-row">
          <span class="status-dot" style="background:${cfg.color}"></span>
          <span class="status-label">${cfg.label}</span>
          <div class="status-bar-wrap">
            <div class="status-bar-fill" style="width:${pct}%;background:${cfg.color}"></div>
          </div>
          <span class="status-count">${count}</span>
        </div>`;
    }).join('');
}

// ===== 3. Top Products =====
function renderTopProducts(orders) {
  const container = document.getElementById('topProducts');

  if (!orders.length) {
    container.innerHTML = '<div class="empty-state"><div class="icon">🏆</div><div class="text">لا توجد طلبات في هذه الفترة</div></div>';
    return;
  }

  // Aggregate by product
  const productStats = {};
  orders.forEach(o => {
    const items = o.items || o.order_items || [];
    items.forEach(item => {
      const pid = item.product_id;
      if (!productStats[pid]) {
        productStats[pid] = {
          name: item.product_name || item.name || 'منتج',
          image_url: item.image_url || item.product_image || null,
          orders: 0,
          revenue: 0
        };
      }
      productStats[pid].orders += (item.quantity || 1);
      productStats[pid].revenue += parseFloat(item.subtotal || item.total || 0);
    });
  });

  // If no item-level data, show by order count
  let products = Object.values(productStats);
  if (!products.length) {
    // Fallback: count orders only
    container.innerHTML = '<div class="empty-state"><div class="text">لا تتوفّر بيانات تفصيلية للمنتجات</div></div>';
    return;
  }

  products.sort((a, b) => b.orders - a.orders);
  const top5 = products.slice(0, 5);

  container.innerHTML = top5.map((p, i) => {
    const rankClass = i < 3 ? ` r${i + 1}` : '';
    const imgHTML = p.image_url
      ? `<img src="${p.image_url}" alt="${p.name}">`
      : '📦';
    return `
      <div class="top-product">
        <div class="top-product-rank${rankClass}">${i + 1}</div>
        <div class="top-product-img">${imgHTML}</div>
        <div class="top-product-info">
          <div class="top-product-name">${p.name}</div>
          <div class="top-product-orders">${p.orders} وحدة مباعة</div>
        </div>
        <div class="top-product-revenue">${p.revenue > 0 ? Number(p.revenue).toLocaleString() + ' ل.س' : ''}</div>
      </div>`;
  }).join('');
}

// ===== 4. Monthly Chart (last 6 months) =====
function renderMonthlyChart() {
  const container = document.getElementById('monthlyChart');
  const now = new Date();

  // Build last 6 months
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date(now.getFullYear(), now.getMonth() - i, 1);
    months.push({
      year: d.getFullYear(),
      month: d.getMonth(),
      label: MONTHS_AR[d.getMonth()].slice(0, 3),
      fullLabel: MONTHS_AR[d.getMonth()],
      revenue: 0,
      orders: 0
    });
  }

  // Aggregate orders into months
  allOrders.forEach(o => {
    const d = new Date(o.created_at);
    const m = months.find(m => m.year === d.getFullYear() && m.month === d.getMonth());
    if (m) {
      m.revenue += parseFloat(o.total_amount || o.total || 0);
      m.orders += 1;
    }
  });

  const maxRevenue = Math.max(...months.map(m => m.revenue), 1);

  if (maxRevenue <= 1 && allOrders.length === 0) {
    container.innerHTML = '<div class="empty-state" style="width:100%;"><div class="icon">📊</div><div class="text">لا توجد بيانات كافية لعرض الرسم البياني</div></div>';
    return;
  }

  container.innerHTML = months.map(m => {
    const pct = Math.max((m.revenue / maxRevenue) * 100, 2);
    const formattedRev = m.revenue > 0 ? (m.revenue >= 1000000 ? (m.revenue / 1000000).toFixed(1) + 'M' : m.revenue >= 1000 ? (m.revenue / 1000).toFixed(0) + 'K' : m.revenue) : '0';
    return `
      <div class="chart-bar-group">
        <div class="chart-bar-value">${formattedRev}</div>
        <div class="chart-bar" style="height:${pct}%" title="${m.fullLabel}: ${Number(m.revenue).toLocaleString()} ل.س — ${m.orders} طلب"></div>
        <div class="chart-bar-label">${m.label}</div>
      </div>`;
  }).join('');
}
